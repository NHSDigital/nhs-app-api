version: "3.2"
services:
  nhsonline.stub-data:
    image: nhsonline.backend.stub-data
    build:
      context: .
      dockerfile: NHSOnline.Backend.Worker.Stubs/Dockerfile
    environment:
      - WIREMOCK_AUTHORITY=nhsonline.stubs:8080
    depends_on:
      - nhsonline.stubs
  nhsonline.stubs:
    image: rodolpheche/wiremock
    command: --local-response-templating
    ports:
      - "8080:8080"
  nhsonline.redis-data.sds:
    image: nhsonline.azurecr.io/nhsonline-redis-data:latest
    environment:
      - REDIS_HOST=nhsonline.redis.sds
    depends_on:
      - nhsonline.redis.sds
  nhsonline.redis.sds:
    image: bitnami/redis:4.0.8-r7
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    ports:
      - "6379:6379"
    volumes:
      - 'redis_data:/bitnami/redis'
  nhsonline.redis.session:
    image: bitnami/redis:4.0.8-r7
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    ports:
      - "6380:6379"
volumes:
  redis_data:
    driver: local
