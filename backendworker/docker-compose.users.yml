version: "3.2"
services:
  nhsonline.mongodb:
    image: mongo:latest
    ports:
    - "27017:27017"
  users.local.bitraft.io:
    image: nhsonline.backend.usersapi
    build:
      context: .
      dockerfile: NHSOnline.Backend.UsersApi/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://*:8083
      - PORT=8088
      - CORS_AUTHORITY=*
      - AZURE_NOTIFICATION_HUB_PATH=nhsapp-nonlive
      - AZURE_NOTIFICATION_HUB_CONNECTION_STRING=Endpoint=sb://nhsapp-nonlive.servicebus.windows.net/;SharedAccessKeyName=DefaultFullSharedAccessSignature;SharedAccessKey=
      - AZURE_NOTIFICATION_HUB_SHARED_ACCESS_KEY=
      - VERSION_TAG=users_docker_main
      - USERS_MONGO_DATABASE_HOST=nhsonline.mongodb
      - USERS_MONGO_DATABASE_PORT=27017
      - USERS_MONGO_DATABASE_USERNAME=
      - USERS_MONGO_DATABASE_PASSWORD=
