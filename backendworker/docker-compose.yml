version: "3.2"
services:
  nhsonline.mongodb.session:
    image: mongo:latest
    ports:
    - "27017:27017"
  api.local.bitraft.io:
    image: nhsonline.backend.pfsapi
    build:
      context: .
      dockerfile: NHSOnline.Backend.PfsApi/Dockerfile
    depends_on:
      - nhsonline.redis.sds
    ports:
      - "8082:8082"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://*:8082
      - PORT=8082
      - CORS_AUTHORITY=*
      - TPP_CERTIFICATE_PASSWORD=
      - TPP_CERTIFICATE_PATH=./certs/TppNhsTest.pfx
      - VISION_SENDER_USERNAME=Username123123asdas
      - VISION_SENDER_USERFULLNAME=Name
      - VISION_SENDER_USERIDENTITY=65489761321654
      - VISION_SENDER_USERROLE=ROSU
      - EMIS_CERTIFICATE_PATH=
      - VISION_CERT_PASSPHRASE=
      - GP_PROVIDER_ENABLED_EMIS=true
      - GP_PROVIDER_ENABLED_TPP=true
      - GP_PROVIDER_ENABLED_VISION=true
      - GP_PROVIDER_ENABLED_MICROTEST=true
      - NDOP_CERTIFICATE_PASSWORD
      - NDOP_CERTIFICATE_PATH=./certs/ndopJwtTest.pfx
      - NDOP_CLAIM_AUDIENCE=https://ndopapp-int1.thunderbird.service.nhs.uk
      - NDOP_CLAIM_ISSUER=https://www-preview.devuks1.nonlive.nhsapp.service.nhs.uk
      - ORGAN_DONATION_BASE_URL=https://nhsbt-apim-dev01.azure-api.net/uat3/odr/v1/
      - ORGAN_DONATION_CERT_PATH=./certs/OrganDonation.pfx
      - ORGAN_DONATION_CERT_PASSPHRASE=
      - ORGAN_DONATION_INTEGRATION_ENABLED=true
      - ORGAN_DONATION_REFERENCE_DATA_EXPIRY_SECONDS=86400
      - STUB_TERMS_AND_CONDITIONS=true
      - ConfigurationSettings__CookieDomain=.bitraft.io
      - VERSION_TAG=backendworker_docker_main
      - SESSION_MONGO_DATABASE_HOST=nhsonline.mongodb.session
      - SESSION_MONGO_DATABASE_PORT=27017
      - SESSION_MONGO_DATABASE_USERNAME=
      - SESSION_MONGO_DATABASE_PASSWORD=
      - POSTCODE_LOOKUP_SEARCH_RADIUS_KM=10
      - GP_LOOKUP_API_RESULTS_LIMIT=20
      - GP_LOOKUP_API_KEY=
      - NHS_SEARCH_BASE_URL=
      - BROTHER_MAILER_URL=
      - BROTHER_MAILER_ADDRESSBOOK_ID=
      - BROTHER_MAILER_SIG=
      - BROTHER_MAILER_USER_ID=
  cid.local.bitraft.io:
    image: nhsonline.backend.cidapi
    build:
      context: .
      dockerfile: NHSOnline.Backend.CidApi/Dockerfile
    depends_on:
      - nhsonline.redis.sds
    ports:
      - "8084:8084"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://*:8084
      - PORT=8084
      - CORS_AUTHORITY=*
      - TPP_CERTIFICATE_PASSWORD
      - TPP_CERTIFICATE_PATH=./certs/TppNhsTest.pfx
      - VISION_CERT_PASSPHRASE
      - GP_PROVIDER_ENABLED_EMIS=true
      - GP_PROVIDER_ENABLED_TPP=true
      - GP_PROVIDER_ENABLED_VISION=true
      - GP_PROVIDER_ENABLED_MICROTEST=true
      - NDOP_CERTIFICATE_PASSWORD
      - NDOP_CERTIFICATE_PATH=./certs/ndopJwtTest.pfx
      - NDOP_CLAIM_AUDIENCE=https://ndopapp-int1.thunderbird.service.nhs.uk
      - NDOP_CLAIM_ISSUER=https://www-preview.devuks1.nonlive.nhsapp.service.nhs.uk
      - STUB_TERMS_AND_CONDITIONS=true
      - SESSION_MONGO_DATABASE_HOST=nhsonline.mongodb.session
      - SESSION_MONGO_DATABASE_PORT=27017
      - SESSION_MONGO_DATABASE_USERNAME=
      - SESSION_MONGO_DATABASE_PASSWORD=
  servicejourneyrulesapi.local.bitraft.io:
    image: nhsonline.backend.servicejourneyrulesapi
    build:
      context: .
      dockerfile: NHSOnline.Backend.ServiceJourneyRulesApi/Dockerfile
    ports:
      - "8086:8086"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://*:8086
      - PORT=8086
      - CORS_AUTHORITY=*
      - VERSION_TAG=servicejourneyrules_docker_main
      - SESSION_MONGO_DATABASE_HOST=nhsonline.mongodb.session
      - SESSION_MONGO_DATABASE_PORT=27017
      - SESSION_MONGO_DATABASE_USERNAME=
      - SESSION_MONGO_DATABASE_PASSWORD=      
  nhsonline.stubs:
    image: rodolpheche/wiremock
    ports:
      - "8080:8080"
  nhsonline.redis-data.sds:
    image: nhsapp.azurecr.io/nhsonline-redis-data:latest
    environment:
      - MODE=development
      - REDIS_HOST=nhsonline.redis.sds
    depends_on:
      - nhsonline.redis.sds
  nhsonline.redis.sds:
    image: bitnami/redis:4.0.8-r7
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    ports:
      - "6379:6379"
    volumes:
      - 'redis_data:/bitnami/redis'
  nhsonline.redis-data.sds:
    image: nhsapp.azurecr.io/nhsonline-redis-data:latest
    environment:
      - MODE=development
      - REDIS_HOST=nhsonline.redis.sds
    depends_on:
      - nhsonline.redis.sds
  mongo_seed:
    image: mongo:latest
    links:
      - nhsonline.mongodb.session
    command: /bin/bash -c "sleep 5; mongo --host nhsonline.mongodb.session --eval 'db.session.createIndex({_ts:1},{expireAfterSeconds:60})' development"
    depends_on:
      - nhsonline.mongodb.session
volumes:
  redis_data:
    driver: local
