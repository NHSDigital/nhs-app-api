version: "3.2"
services:
  nhsonline.mongodb.session:
    image: mongo:latest
    ports:
    - "27017:27017"
  api.local.bitraft.io:
    image: nhsonline.backend.worker
    build:
      context: .
      dockerfile: NHSOnline.Backend.Worker/Dockerfile
    depends_on:
      - nhsonline.redis.sds
    ports:
      - "8082:8082"
    environment:
      - BACKENDWORKER_RUNMODE=pfs
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://*:8082
      - PORT=8082
      - CORS_AUTHORITY=*
      - EMIS_BASE_URL=https://nhs70apptest.emishealth.com/PFS/
      - STUB_TERMS_AND_CONDITIONS=true
      - ConfigurationSettings__CookieDomain=.bitraft.io
      - SESSION_MONGO_DATABASE_HOST=nhsonline.mongodb.session
      - SESSION_MONGO_DATABASE_PORT=27017
      - SESSION_MONGO_DATABASE_USERNAME=
      - SESSION_MONGO_DATABASE_PASSWORD=
  nhsonline.redis-data.sds:
    image: nhsapp.azurecr.io/nhsonline-redis-data:latest
    environment:
      - MODE=development
      - REDIS_HOST=nhsonline.redis.sds
    depends_on:
      - nhsonline.redis.sds
  nhsonline.redis.sds:
    image: bitnami/redis:4.0.8-r7
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    ports:
      - "6379:6379"
    volumes:
      - 'redis_data:/bitnami/redis'
  mongo_seed:
    image: mongo:latest
    links:
      - nhsonline.mongodb.session
    command: /bin/bash -c "sleep 5; mongo --host nhsonline.mongodb.session --eval 'db.session.createIndex({_ts:1},{expireAfterSeconds:60})' development"
    depends_on:
      - nhsonline.mongodb.session
volumes:
  redis_data:
    driver: local
