openapi: 3.0.2
info:
  version: 0.0.1
  title: NHS App Sub-API - Shared Components
  description: NHS App Sub-API - components shared between multiple functional areas
paths: {}
components:
  schemas:
    Necessity:
      type: string
      enum:
        - NotAllowed
        - Optional
        - Mandatory
    PfsErrorResponse:
      type: object
      description: Error response from backend api.
      properties:
        errorCode:
          type: integer
          description: Error code
        errorMessage:
          type: string
          description: Error message
        serviceDeskReference: 
          type: string
          description: Six character service desk reference code.