openapi: 3.0.2
info:
  version: 0.0.6
  title: NHS App Sub-API - User Sessions.
  description: NHS App Sub-API - endpoints pertaining to User Sessions.
paths:
  /session:
    get:
      tags:
        - session
      summary: Returns the user session created and returned from the POST to /session
      description: Returns the user session created and returned from the POST to /session
      responses:
        "200":
          description: Successfully retrieved user session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSessionResponse"
        "401":
          description: User session has expired.
        "500":
          description: An unexpected error occurred during the processing of the request.
    post:
      tags:
        - session
      summary: Creates a user session for an authenticated user.
      description: Given an OAuth authorisation code and PKCE code verifier, creates and
        returns a user session.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSessionRequest"
        description: OAuth details for the session to be created.
        required: true
        x-name: UserSession
      responses:
        "201":
          description: Successfully authenticated. The session ID is returned in a cookie
            name `NHSO-Session-Id`. This cookie should be included in subsequent
            requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostUserSessionResponse"
        "400":
          description: Bad request. Supplied OAuth details are incomplete or invalid
          content:
            application/json:
              schema:
                $ref: "./nhsonline.shared.yaml#/components/schemas/PfsErrorResponse"
        "403":
          description: Forbidden. Can occur if the IM1 connection token received from
            Citizen ID does not successfully authenticate with the GP system.
          content:
            application/json:
              schema:
                $ref: "./nhsonline.shared.yaml#/components/schemas/PfsErrorResponse"
        "464":
          description: ODS code associated with a user is not supported or no nhs number
            found.
          content:
            application/json:
              schema:
                $ref: "./nhsonline.shared.yaml#/components/schemas/PfsErrorResponse"
        "465":
          description: User did not meet the minimum age requirement.
          content:
            application/json:
              schema:
                $ref: "./nhsonline.shared.yaml#/components/schemas/PfsErrorResponse"
        "500":
          description: An unexpected error occurred during the processing of the request.
          content:
            application/json:
              schema:
                $ref: "./nhsonline.shared.yaml#/components/schemas/PfsErrorResponse"
        "502":
          description: Bad response received from upstream system.
          content:
            application/json:
              schema:
                $ref: "./nhsonline.shared.yaml#/components/schemas/PfsErrorResponse"
        "504":
          description: Timeout when calling upstream system.
          content:
            application/json:
              schema:
                $ref: "./nhsonline.shared.yaml#/components/schemas/PfsErrorResponse"
    delete:
      tags:
        - session
      summary: Deletes a user session for an authenticated user.
      description: Given a valid session cookie deletes the users session and signs the
        user out. Requires NHSO-Session-Id cookie obtained from post session
        endpoint.
      responses:
        "204":
          description: Successfully deleted session and user signed out
        "401":
          description: User session has expired.
        "500":
          description: An unexpected error occurred during the processing of the request.
        "502":
          description: Session storage is unavailable
  /session/extend:
    post:
      tags:
        - session
      summary: Extends a user session for an authenticated user.
      description: Extends a user session for an authenticated user, by calling an upstream
        endpoint. Requires NHSO-Session-Id cookie obtained from post session
        endpoint.
      responses:
        "200":
          description: Successfully extended.
        "401":
          description: User session has expired.
        "500":
          description: An unexpected error occurred during the processing of the request.
        "502":
          description: Could not extend service. Can occur if already timed out, or there
            is a problem with the request.
        "504":
          description: Timeout when calling upstream system.
          content:
            application/json:
              schema:
                $ref: "./nhsonline.shared.yaml#/components/schemas/PfsErrorResponse"
components:
  schemas:
    UserSessionRequest:
      type: object
      required:
        - authCode
        - codeVerifier
        - redirectUrl
      properties:
        authCode:
          type: string
          description: OAuth authorization code.
        codeVerifier:
          type: string
          description: PKCE code verifier.
        redirectUrl:
          type: string
          description: Redirect url provided when signing in to Citizen ID
    UserSessionResponse:
      type: object
      properties:
        name:
          type: string
          description: User's name
        sessionTimeout:
          type: integer
          description: User's session timeout period in seconds.
        odsCode:
          type: string
          description: Unique code that identifies a user's GP practice
        token:
          type: string
          description: User's session CsrfToken
        nhsNumber:
          type: string
          description: User's NHS number
        accessToken:
          type: string
          description: User's access token which allows NHS Login to identify them
        im1MessagingEnabled:
          type: boolean
          description: Patient to Practice Messaging has been enabled at the practice level for the current user
        proofLevel:
          type: string
          description: User's proof level
          enum:
            - "P5"
            - "P9"
    PostUserSessionResponse:
      allOf:
        - $ref: "#/components/schemas/UserSessionResponse"
        - type: object
          properties:
            serviceJourneyRules:
              $ref: servicejourneyrules.yaml#/components/schemas/ServiceJourneyRulesResponse