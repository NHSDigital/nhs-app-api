openapi: 3.0.2
info:
  version: 0.0.1
  title: NHS App Messages-API
  description: NHS App Messages-API - endpoints pertaining to Messages.
paths:
  /users/me/messages:
    get:
      security:
        - nhsLoginBearerAuth: []
      tags:
        - messages
      summary: Retrieve messages
      description: Retrieves a list of messages pertaining to the authorized user.
      parameters:
        - in: header
          name: NHSO-Request-ID
          required: false
          description: A request identifier, should provide something unique on each separate request to allow NHS App to easily retrieve relevant log entries for debugging purposes.
          schema:
            type: string
        - in: query
          name: senderId
          required: false
          description: The id of sender to filter by. This parameter is incompatible with `summary`.
          schema:
            type: string
        - in: query
          name: summary
          required: false
          description: Indicates to return only the latest message per sender. This parameter is incompatible with `senderId`.
          schema:
            type: boolean
      responses:
        "200":
          description: Successful operation. Messages are retrieved.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SenderMessagesResponse"
        "204":
          description: Successful operation. Content is empty.
        "400":
          description: Either `senderId` or `summary` is required.
        "401":
          $ref: '#/components/responses/UnauthorizedError'
        "500":
          $ref: '#/components/responses/UnexpectedError'
        "502":
          $ref: '#/components/responses/UnexpectedError'
  /users/me/messages/{messageId}:
    get:
      security:
        - nhsLoginBearerAuth: []
      tags:
        - messages
      summary: Retrieve message
      description: Retrieves a message pertaining to the authorized user.
      parameters:
        - in: header
          name: NHSO-Request-ID
          required: false
          description: A request identifier, should provide something unique on each separate request to allow NHS App to easily retrieve relevant log entries for debugging purposes.
          schema:
            type: string
        - in: path
          name: messageId
          required: true
          description: A unique identifier for a message.
          schema:
            type: string
      responses:
        "200":
          description: Successful operation. Message is retrieved.
          content:
            application/json:
              schema:
                  $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/UnauthorizedError'
        "500":
          $ref: '#/components/responses/UnexpectedError'
        "502":
          $ref: '#/components/responses/UnexpectedError'
    patch:
      security:
        - nhsLoginBearerAuth: []
      tags:
        - messages
      summary: Updates the message
      description: Updates the message pertaining to the authorized user using Json Patch operations
      parameters:
        - in: header
          name: NHSO-Request-ID
          required: false
          description: A request identifier, should provide something unique on each separate request to allow NHS App to easily retrieve relevant log entries for debugging purposes.
          schema:
            type: string
        - in: path
          name: messageId
          required: true
          description: A unique identifier for a message.
          schema:
            type: string
      requestBody:
        x-name: PatchMessageRequest
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchBody'
        description: Details of the message to be created
        required: true
      responses:
        "204":
          description: Successful operation. Message updated with Json Patch.
        "400":
          description: Bad request. Supplied request contains an invalid Json Patch operation.
        "401":
          $ref: '#/components/responses/UnauthorizedError'
        "404":
          description: Message to be updated cannot be found.
        "500":
          $ref: '#/components/responses/UnexpectedError'
        "502":
          $ref: '#/components/responses/UnexpectedError'
  /users/{nhsLoginId}/messages/{messageId}:
    patch:
      security:
        - nhsLoginBearerAuth: []
      tags:
        - messages
      summary: Updates the message
      description: Updates the message pertaining to the authorized user using Json Patch operations
      parameters:
        - in: header
          name: NHSO-Request-ID
          required: false
          description: A request identifier, should provide something unique on each separate request to allow NHS App to easily retrieve relevant log entries for debugging purposes.
          schema:
            type: string
        - in: path
          name: nhsLoginId
          required: true
          description: Unique identifier of a user
          schema:
            type: string    
        - in: path
          name: messageId
          required: true
          description: A unique identifier for a message.
          schema:
            type: string
      requestBody:
        x-name: PatchMessageRequest
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchBody'
        description: Details of the message to be created
        required: true
      responses:
        "204":
          description: Successful operation. Message updated with Json Patch.
        "400":
          description: Bad request. Supplied request contains an invalid Json Patch operation.
        "401":
          $ref: '#/components/responses/UnauthorizedError'
        "404":
          description: Message to be updated cannot be found.
        "500":
          $ref: '#/components/responses/UnexpectedError'
        "502":
          $ref: '#/components/responses/UnexpectedError'        
  /users/me/messages/metadata:
    get:
      security:
        - nhsLoginBearerAuth: []
      tags:
        - messages
      summary: Retrieve messages metadata
      description: Retrieves unread messages count pertaining to the authorized user.
      parameters:
        - in: header
          name: NHSO-Request-ID
          required: false
          description: A request identifier, should provide something unique on each separate request to allow NHS App to easily retrieve relevant log entries for debugging purposes.
          schema:
            type: string
      responses:
        "200":
          description: Successful operation. Unread messages count is retrieved.
          content:
            application/json:
              schema:
                  $ref: "#/components/schemas/MessagesMetadataResponse"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/UnauthorizedError'
        "500":
          $ref: '#/components/responses/UnexpectedError'
        "502":
          $ref: '#/components/responses/UnexpectedError'
  /users/me/messages/{messageId}/link-clicked/metrics:
    post:
      security:
        - nhsLoginBearerAuth: []
      tags:
        - messages
      summary: Logs metrics for clicked links
      description: Logs metrics for clicked links
      parameters:
        - in: header
          name: NHSO-Request-ID
          required: false
          description: A request identifier, should provide something unique on each separate request to allow NHS App to easily retrieve relevant log entries for debugging purposes.
          schema:
            type: string
        - in: path
          name: messageId
          required: true
          description: A unique identifier for a message.
          schema:
            type: string
      requestBody:
        x-name: LinkClickedMessage
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkClickedMessage"
        description: Details of the link clicked by the user
        required: true
      responses:
        "200":
          description: Successful operation.
        "400":
          description: Bad request. Supplied request contains invalid details.
        "401":
          $ref: '#/components/responses/UnauthorizedError'
        "500":
          $ref: '#/components/responses/UnexpectedError'
        "502":
          $ref: '#/components/responses/UnexpectedError'
  /users/{nhsLoginId}/messages:
    post:
      tags:
        - messages
      summary: Creates a message
      description: Creates a message based on a nhsLoginId
      parameters:
        - in: path
          name: nhsLoginId
          required: true
          description: Unique identifier of a user
          schema:
            type: string
      requestBody:
        x-name: AddMessageRequest
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMessageRequest"
        description: Details of the message to be created
        required: true
      responses:
        "201":
          description: Successful operation. Message is created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddMessageResponse"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/UnauthorizedError'
        "500":
          $ref: '#/components/responses/UnexpectedError'
        "502":
          $ref: '#/components/responses/UnexpectedError'
components:
  securitySchemes:
    nhsLoginBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    UnauthorizedError:
      description: Access token is missing or invalid.
    UnexpectedError:
      description: An unexpected error occurred processing the request.
    BadRequest:
      description: Bad request. Supplied request is invalid.
  schemas:
    AddMessageRequest:
      type: object
      required:
        - sender
        - body
      properties:
        sender:
          type: string
        version:
          type: integer
        body:
          type: string
        senderContext:
          $ref: "#/components/schemas/AddMessageSenderContext"
      example:
        sender: b1f99cf0-278d-49ca-a325-0a1504799488
        version: 0
        body: Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
        senderContext:
          supplierId: 7e874122-d6c0-47c1-96eb-0a2532b51675
          senderId: B82041
          communicationId: 1c92e18e-6221-4bfd-8d30-d535e16dacd1
          transmissionId: 2c92e18e-6221-4bfd-8d30-d535e16dacd2
          communicationCreatedDateTime: 2020-10-26T15:06:37.35Z
          requestReference: RequestReference
          campaignId: c40b8210-2217-43d8-9016-333f04388e40
          odsCode: OdsCode
          nhsNumber: NhsNumber
          nhsLoginId: 123-456-789
    AddMessageResponse:
      type: object
      properties:
        messageId:
          type: string
      example:
        id: 51020e00-8b87-4bcd-a0ff-d862184275fa
    AddMessageSenderContext:
      type: object
      properties:
        supplierId:
          type: string
        senderId:
          type: string
        communicationId:
          type: string
        transmissionId:
          type: string
        communicationCreatedDateTime:
          type: string
          format: date-time
        requestReference:
          type: string
        campaignId:
          type: string
        odsCode:
          type: string
        nhsNumber:
          type: string
        nhsLoginId:
          type: string
    LinkClickedMessage:
      type: object
      required:
        - link
      properties:
        link:
          type: string
      example:
        link: "https://www.google.com/"
    MessageResponse:
      type: object
      properties:
        id:
          type: string
        senderId:
          type: string
        sender:
          type: string
        version:
          type: integer
        body:
          type: string
        sendTime:
          type: string
          format: date-time
          description: Message sent time.
        read:
          type: boolean
        reply:
          type: object
          description: Message reply options
          properties:
            options:
              type: array
              description: Array of reply options for a message
              items:
                $ref: "#/components/schemas/ReplyOption"
            response:
              type: string
            responseSentDateTime:
              type: string
              format: date-time
              description: Response received time.
            status:
              type: string
            responseCompletedDateTime:
              type: string
              format: date-time
              description: Response completed time.  
      example:
        id: 9fbd0bea-5a63-4fd4-b4be-4bcd9c063227
        senderId: B82041
        sender: b1f99cf0-278d-49ca-a325-0a1504799488
        version: 0
        body: Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
        sendTime: 2019-09-17T02:15:12.35Z
        read: true
    MessagesMetadataResponse:
      type: object
      properties:
        unreadMessageCount:
          type: integer
      example:
        unreadMessageCount: 6
    ReplyOption:
      type: object
      properties:
        code:
          type: string
        display:
          type: string
    SenderMessagesResponse:
      type: object
      properties:
        sender:
          type: string
          description: The sender's name.
        unreadCount:
          type: integer
          description: The number of unread messages.
        messages:
          type: array
          description: Array of messages per sender for an authorized user.
          items:
            $ref: "#/components/schemas/MessageResponse"
    PatchBody:
      type: array
      items:
        $ref: "#/components/schemas/PatchOperation"
    PatchOperation:
      type: object
      description: A JSONPatch document as defined by RFC 6902
      required:
        - "op"
        - "path"
      properties:
        op:
          type: string
          description: The operation to be performed
          enum:
            - "add"
            - "remove"
            - "replace"
            - "move"
            - "copy"
            - "test"
        path:
          type: string
          description: A JSON-Pointer
        value:
          type: object
          description: The value to be used within the operations.
        from:
          type: string
          description: A string containing a JSON Pointer value.