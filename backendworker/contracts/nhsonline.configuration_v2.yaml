openapi: 3.0.2
info:
  version: 2.0.1
  title: NHS App Sub-API - Configuration V2
  description: NHS App Sub-API - endpoints pertaining to configuration.
paths:
  /configuration:
    get:
      tags:
        - configuration
      summary: Gets a collection of configuration values.
      description: Gets a collection of configuration values.
      responses:
        "200":
          description: Returns configuration for the app.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConfigurationResponseV2"
        "400":
          description: Either the device name was not provided or the device version number
            was not in the correct format.
        "500":
          description: An unexpected error occurred processing the request.
components:
  schemas:
    GetConfigurationResponseV2:
      type: object
      properties:
        minimumSupportedAndroidVersion:
          type: string
          description: Returns the minimum version of NHS App that is supported by Android.
        minimumSupportediOSVersion:
          type: string
          description: Returns the minimum version of NHS App that is supported by iOS.
        fidoServerUrl:
          type: string
          description: Returns the URL of the FIDO server for the given environment.
        knownServices:
          type: array
          description: Returns a list of know services for the NHS App.
          items:
            $ref: "#/components/schemas/RootService"
    RootService:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        javaScriptInteractionMode:
          $ref: '#/components/schemas/JavaScriptInteractionMode'
        menuTab:
          $ref: '#/components/schemas/MenuTab'
        integrationLevel:
          $ref: '#/components/schemas/IntegrationLevel'
        showSpinner:
          type: boolean
        showThirdPartyWarning:
          type: boolean
        requiresAssertedLoginIdentity:
          type: boolean
        validateSession:
          type: boolean
        subServices:
          type: array
          items:
            $ref: "#/components/schemas/SubService"
    SubService:
      type: object
      properties:
        path:
          type: string
        queryString:
          type: string
        javaScriptInteractionMode:
          $ref: '#/components/schemas/JavaScriptInteractionMode'
        menuTab:
          $ref: '#/components/schemas/MenuTab'
        integrationLevel:
          $ref: '#/components/schemas/IntegrationLevel'
        showSpinner:
          type: boolean
        showThirdPartyWarning:
          type: boolean
        requiresAssertedLoginIdentity:
          type: boolean
        validateSession:
          type: boolean
    MenuTab:
      type: string
      enum:
        - None
        - Symptoms
        - Appointments
        - Prescriptions
        - MyRecord
        - More
    IntegrationLevel:
      type: string
      enum:
        - Gold
        - GoldOverlay
        - GoldWithNoHeaders
        - SilverWithoutWebNavigation
        - SilverWithWebNavigation
        - Bronze
    JavaScriptInteractionMode:
      type: string
      enum:
        - None
        - NhsApp
        - NhsLogin
        - SilverThirdParty