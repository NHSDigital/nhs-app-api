swagger: '2.0'

info:
  version: 0.0.1
  title: NHS Online Service Journey Rules API
  description: This is the API for NHS Online Service Journey Rules

schemes:
  - https

paths:
  /api/servicejourneyrules:
    get:
      tags:
        - service-journey-rules
      summary: Gets the service journey rules for an ods code
      description: This call returns the service journey rules for an ods code.
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: query
          name: odsCode
          type: string
          required: true
          description: ods code of patients practice
      responses:
        200:
          description: Successful operation. Service Journey Rules returned
          schema:
            $ref: "servicejourneyrules.definitions.yaml#/definitions/ServiceJourneyRulesResponse"
        500:
          description: An unexpected error occurred processing the request.
