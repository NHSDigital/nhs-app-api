openapi: 3.0.2
info:
  version: 0.0.1
  title: NHS App Sub-API - Linked accounts
  description: NHS App Sub-API - endpoints pertaining to linked accounts require
    NHSO-Session-Id cookie in header from session endpoint.
paths:
  /linked-accounts:
    get:
      tags:
        - linked-accounts
      summary: Gets the linked accounts for a given patient.
      responses:
        "200":
          description: Returns an object with linked accounts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkedAccountsResponse"
        "401":
          description: User session missing or expired.
        "500":
          description: An unexpected error occurred processing the request.
        "502":
          description: Bad response received from upstream system.
        "504":
          description: Timeout when calling upstream system.
          content:
            application/json:
              schema:
                $ref: "./nhsonline.shared.yaml#/components/schemas/PfsErrorResponse"
components:
  schemas:
    LinkedAccount:
      type: object
      properties:
        id:
          type: string
          description: Id to identify the person
        name:
          type: string
          description: Person's name
        dateOfBirth:
          type: string
          format: date-time
    LinkedAccountsResponse:
      type: object
      properties:
        linkedAccounts:
          type: array
          description: Array of accounts you can act on behalf of.
          items:
            $ref: "#/components/schemas/LinkedAccount"
