openapi: 3.0.2
info:
  version: 0.0.5
  title: NHS App Sub-API - Configuration
  description: NHS App Sub-API - endpoints pertaining to configuration.
paths:
  /configuration:
    get:
      tags:
        - configuration
      summary: Gets a collection of configuration values.
      description: Gets a collection of configuration values.
      parameters:
        - in: query
          name: deviceName
          required: true
          description: name of the device (android or ios)
          schema:
            type: string
            format: string
        - in: query
          name: nativeAppVersion
          required: true
          description: version number of the NHS App installed on the device
          schema:
            type: string
            format: string
      responses:
        "200":
          description: Returns configuration for the app.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConfigurationResponse"
        "400":
          description: Either the device name was not provided or the device version number
            was not in the correct format.
        "500":
          description: An unexpected error occurred processing the request.
components:
  schemas:
    GetConfigurationResponse:
      type: object
      properties:
        isDeviceSupported:
          type: boolean
          description: Returns true if the version of NHS App installed on device is
            supported, otherwise false.
        fidoServerUrl:
          type: string
          description: Returns the URL of the FIDO server for the given environment.