swagger: "2.0"

info:
  version: 0.0.5
  title: NHS App Sub-API - Configuration
  description: NHS App Sub-API - endpoints pertaining to configuration.

paths:
  /configuration:
    get:
      tags:
        - configuration
      summary: Gets a collection of configuration values.
      description: Gets a collection of configuration values.
      produces:
        - application/json
      parameters:
        - in: query
          name: deviceName
          type: string
          format: string
          required: true
          description: name of the device (android or ios)
        - in: query
          name: nativeAppVersion
          type: string
          format: string
          required: true
          description: version number of the NHS App installed on the device
      responses:
        200:
          description: Returns configuration for the app.
          schema:
            $ref: "#/definitions/GetConfigurationResponse"
        400:
          description: Either the device name was not provided or the device version number was not in the correct format.
        500:
          description: An unexpected error occurred processing the request.

definitions:
  GetConfigurationResponse:
    type: object
    properties:
      isDeviceSupported:
        type: boolean
        description: Returns true if the version of NHS App installed on device is supported, otherwise false.
      isThrottlingEnabled:
        type: boolean
        description: Returns true if throttling is enabled on the environment, otherwise false.
      fidoServerUrl:
        type: string
        description: Returns the URL of the FIDO server for the given environemnt.

