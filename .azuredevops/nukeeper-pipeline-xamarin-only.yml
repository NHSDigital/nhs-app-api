---
trigger: none

schedules:
  - cron: 0 0 * * 0
    displayName: Once a week at 00:00 on Sunday - Xamarin only packages
    branches:
      include:
        - develop
    always: true

resources:
  - repo: self

jobs:
  - job:
    displayName: NuKeeper

    variables:
      - group: nukeeper-variable-group
      - name: dotnet.cli.telemetry.optout
        value: true
      - name: dotnet.nologo
        value: true
      - name: XAMARIN_ONLY_RUN
        value: true
      - name: XAMARIN_SLACK_URI
        value: $[variables.xamarin_slack_webhook_uri]

    pool:
      vmImage: 'windows-latest'

    steps:
      - template: templates/nuget-authenticate.yml

      - task: UseDotNet@2
        displayName: 'Use .NET Core sdk 3.1'
        inputs:
          packageType: sdk
          version: 3.1.x
          installationPath: $(Agent.ToolsDirectory)/dotnet

      - task: Bash@3
        displayName: Install NuKeeper
        inputs:
          targetType: inline
          script: |
            dotnet tool install nukeeper --global

      - task: Bash@3
        displayName: Configure git
        inputs:
          targetType: inline
          script: |
            git config --global user.name NuKeeper
            git config --global user.email nhsapp.ops@nhs.net

      - task: Bash@3
        name: NuKeeperMinor
        displayName: NuKeeper Minor
        inputs:
          targetType: filePath
          filePath: buildscripts/run_nukeeper.sh
        env:
          Nukeeper_azure_devops_token: $(System.AccessToken)
          CHANGE: minor

      - task: Bash@3
        displayName: NuKeeper Major
        inputs:
          targetType: filePath
          filePath: buildscripts/run_nukeeper.sh
        env:
          Nukeeper_azure_devops_token: $(System.AccessToken)
          CHANGE: major