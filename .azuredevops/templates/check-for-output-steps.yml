parameters:
  - name: description
    type: string

  - name: test.path
    type: string

  - name: test.path.exists.variable.name
    type: string

  - name: mandatory
    type: boolean
    default: true

steps:
  - task: Bash@3
    displayName: Check for ${{ parameters.description }}
    condition: succeededOrFailed()
    env:
      DESCRIPTION: ${{ parameters['description'] }}
      TEST_PATH: ${{ parameters['test.path'] }}
      TEST_PATH_EXISTS_VARIABLE_NAME: ${{ parameters['test.path.exists.variable.name'] }}
      MANDATORY: ${{ parameters['mandatory'] }}
    inputs:
      targetType: 'inline'
      script: |
        if [ -e "$TEST_PATH" ]; then
          echo "$TEST_PATH_EXISTS_VARIABLE_NAME=True"
          echo "##vso[task.setvariable variable=$TEST_PATH_EXISTS_VARIABLE_NAME]True"
        elif [ "$MANDATORY" == "True" ]; then
          if [ "$AGENT_JOBSTATUS" == "Succeeded" ] || [ "$AGENT_JOBSTATUS" == "SucceededWithIssues" ]; then
            echo "##vso[task.logissue type=error]Missing $DESCRIPTION ($TEST_PATH)"
            echo "##vso[task.complete result=Failed;]FAILED"
          else
            echo "##vso[task.logissue type=warning]Missing $DESCRIPTION ($TEST_PATH)"
          fi
        fi
