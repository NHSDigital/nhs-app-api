parameters:
  - name: configuration
    type: string
    default: 'BrowserStack - Release'
  - name: apkFilename
    type: string
    default: 'com.nhs.online.nhsonline.browserstack.apk'
  - name: keyStoreFile
    type: string
    default: 'AndroidDebugSigningKeyStore'
  - name: apksignerKeystorePassword
    type: string
    default: '$(android.debug.key.store.password)'
  - name: keystoreAlias
    type: string
    default: 'debug'
  - name: nativeVersion
    type: string
  - name: buildNumber
    type: string
  - name: nhsLoginConfiguration
    type: string
    default: ' '


jobs:
  - job:
    displayName: Build Xamarin Android - ${{ parameters.configuration }}
    dependsOn:
    pool:
      vmImage: 'windows-2019'

    variables:
      output.directory: '$(build.binariesDirectory)/xamarin-android'

    steps:
      - task: NuGetAuthenticate@0
        displayName: NuGet Authenticate

      - task: DownloadSecureFile@1
        name: android_key_store
        inputs:
          secureFile: '${{ parameters.keyStoreFile }}'

      - task: JavaToolInstaller@0
        inputs:
          versionSpec: '11'
          jdkArchitectureOption: 'x64'
          jdkSourceOption: 'PreInstalled'

      - task: ShellScript@2
        displayName: Build Android app bundle '${{ parameters.configuration }}' - ${{ parameters.nativeVersion }}' - ${{ parameters.buildNumber }}'
        env:
          ANDROID_KEY_STORE_LOCATION: '$(android_key_store.secureFilePath)'
          ANDROID_KEY_STORE_PASSWORD: '${{ parameters.apksignerKeystorePassword }}'
          ANDROID_KEY_STORE_KEY_ALIAS: '${{ parameters.keystoreAlias }}'
          CONFIGURATION: '${{ parameters.configuration }}'
          NATIVE_VERSION_NUMBER: '${{ parameters.nativeVersion }}'
          NATIVE_ANDROID_BUILD_NUMBER: '${{ parameters.buildNumber }}'
        inputs:
          scriptPath: xamarin/buildscripts/03_build_android_aab.sh

      - task: Bash@3
        displayName: Copy AAB
        inputs:
          targetType: 'inline'
          script: |
            mkdir -p "$OUTPUT_DIRECTORY"
            for aab in $(find xamarin/NHSOnline.App.Android/bin -name '*-Signed.aab'); do
              echo "$aab" => "$OUTPUT_DIRECTORY/$(basename $aab | sed -r -e 's/-Signed//')"
              cp "$aab" "$OUTPUT_DIRECTORY/$(basename $aab | sed -r -e 's/-Signed//')"
            done

      - task: ShellScript@2
        displayName: Build Android apk '${{ parameters.configuration }}  - ${{ parameters.nativeVersion }}' - ${{ parameters.buildNumber }}'
        env:
          ANDROID_KEY_STORE_LOCATION: '$(android_key_store.secureFilePath)'
          ANDROID_KEY_STORE_PASSWORD: '${{ parameters.apksignerKeystorePassword }}'
          ANDROID_KEY_STORE_KEY_ALIAS: '${{ parameters.keystoreAlias }}'
          CONFIGURATION: '${{ parameters.configuration }}'
          NATIVE_VERSION_NUMBER: '${{ parameters.nativeVersion }}'
          NATIVE_ANDROID_BUILD_NUMBER: '${{ parameters.buildNumber }}'
          NHS_LOGIN_CONFIGURATION: '${{ parameters.nhsLoginConfiguration }}'
        inputs:
          scriptPath: xamarin/buildscripts/04_build_android_apk.sh

      - task: Bash@3
        displayName: Copy APK
        inputs:
          targetType: 'inline'
          script: |
            for apk in $(find xamarin/NHSOnline.App.Android/bin -name '*-Signed.apk'); do
              echo "$apk" => "$OUTPUT_DIRECTORY/$(basename $apk | sed -r -e 's/-Signed//')"
              cp "$apk" "$OUTPUT_DIRECTORY/$(basename $apk | sed -r -e 's/-Signed//')"
            done

      - task: PublishBuildArtifacts@1
        displayName: Publish build outputs
        inputs:
          pathtoPublish: '$(output.directory)'
          artifactName: Xamarin Android Clients
