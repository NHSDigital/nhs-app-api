parameters:
  - name: job.name
    type: string
    default: Native
  - name: job.condition
    type: string
    default: succeeded()
  - name: tranche.tag
    type: string
    default: ''

jobs:
  - job:
    displayName: Tranche Android ${{ parameters['job.name'] }}
    timeoutInMinutes: 180
    condition: ${{ parameters['job.condition'] }}
    variables:
      - template: integration-tests-variables.yml
        parameters:
          additionalVariables:
            tests.name: "Android ${{ parameters['job.name'] }}"
            tests.script: "03_integration_test_run_browserstack_android.sh"
            native.app.path.android: "$(System.ArtifactsDirectory)/Android Package Files/browserstack/app-browserstack-unsigned.apk"
            browserstack.build: $(Build.BuildNumber)
            tranche.tag: ${{ parameters['tranche.tag'] }}
    steps:
      - task: DownloadBuildArtifacts@0
        displayName: Download APK
        inputs:
          downloadType: single
          artifactName: Android Package Files
          itemPattern: '**/app-browserstack-unsigned.apk'

      - template: integration-tests-steps.yml
