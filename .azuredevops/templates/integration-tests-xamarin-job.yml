parameters:
  - name: runMainTests
    type: boolean
    default: false
  - name: runUpgradeTests
    type: boolean
    default: false
  - name: runCanaryTests
    type: boolean
    default: false
  - name: runFlipbookTests
    type: boolean
    default: false
  - name: nativeVersion
    type: string

jobs:
  - job:
    displayName: Build and Integration Test
    timeoutInMinutes: 180

    variables:
      previous.xitmain.jobattempt.foldername: ''

    steps:
      - template: set-branch-tag-steps.yml
      - template: docker-login-steps.yml
      - template: nuget-authenticate.yml

      - task: DownloadBuildArtifacts@0
        displayName: Download Android App
        inputs:
          downloadType: single
          artifactName: Xamarin Android Clients
          itemPattern: |
            Xamarin Android Clients/com.nhs.online.nhsonline.browserstack.apk

      - task: DownloadBuildArtifacts@0
        displayName: Download iOS
        inputs:
          downloadType: single
          artifactName: Xamarin iOS Clients
          itemPattern: |
            Xamarin iOS Clients/NHSOnline.App.BrowserStack.ipa

      - task: PowerShell@2
        displayName: Set Previous XIT Main Attempt Folder Name Variable
        condition: and(ne(variables['System.JobAttempt'], '1'), eq('${{ parameters['runMainTests'] }}', 'True'))
        inputs:
          targetType: 'inline'
          script: |
            [int] $previousJobAttempt = ([int] $(System.JobAttempt)) - 1
            [string] $previousJobAttemptFolderName = "Xamarin Integration Test Files Attempt-$previousJobAttempt"
            Write-Host "Setting the name of the previous job attempt XIT Main output folder to '$previousJobAttemptFolderName'."
            Write-Host "##vso[task.setvariable variable=previous.xitmain.jobattempt.foldername;]$previousJobAttemptFolderName"

      - task: DownloadPipelineArtifact@2
        displayName: Download Previous XIT Main Test Results
        condition: and(ne(variables['System.JobAttempt'], '1'), eq('${{ parameters['runMainTests'] }}', 'True'))
        inputs:
          artifactName: '$(previous.xitmain.jobattempt.foldername)'
          path: '$(System.ArtifactsDirectory)/$(previous.xitmain.jobattempt.foldername)'

      - task: Bash@3
        displayName: Initialise Secrets
        env:
          AZURE_NOTIFICATION_HUBS__0__AZURE_NOTIFICATION_HUB_SHARED_ACCESS_KEY: $(azure.notification.hub.shared.access.key)
          COSMOS_SQL_API_CONNECTION_STRING: $(cosmos.sqlapi.connection.string)
        inputs:
          targetType: 'inline'
          script: |
            mkdir -p ~/.nhsonline/secrets
            mkdir -p ~/.nhsonline/secure-stubs-certificate
            echo "$AZURE_NOTIFICATION_HUBS__0__AZURE_NOTIFICATION_HUB_SHARED_ACCESS_KEY" > ~/.nhsonline/secrets/azure_notification_hub_key_bdd
            echo "$COSMOS_SQL_API_CONNECTION_STRING" > ~/.nhsonline/secrets/cosmos_sql_api_connection_string_bdd

      - task: ShellScript@2
        displayName: Generate Secure Stubs Certificate
        inputs:
          scriptPath: buildscripts/create-secure-stub-certificate.sh

      - task: ShellScript@2
        displayName: Restore Packages
        inputs:
          scriptPath: xamarinintegrationtests/buildscripts/01_restore_packages.sh

      - task: ShellScript@2
        displayName: Build
        inputs:
          scriptPath: xamarinintegrationtests/buildscripts/02_build.sh

      - task: ShellScript@2
        displayName: Build test SJR config
        inputs:
          scriptPath: xamarinintegrationtests/buildscripts/03_build_test_sjr.sh

      - task: ShellScript@2
        displayName: Package Integration Tests
        inputs:
          scriptPath: xamarinintegrationtests/buildscripts/05_package_integration_tests.sh

      - task: ShellScript@2
        displayName: Run Integration Tests
        timeoutInMinutes: 180
        continueOnError: ${{ or(eq(variables['Build.SourceBranchName'], 'develop'), eq(variables['Build.SourceBranch'], 'refs/tags/')) }}
        env:
          BrowserStack__Key: $(browserstack.access.key)
          NhsApp__AppVersionNumber: ${{ parameters['nativeVersion'] }}
          Android__PlayStorePassword: $(browserstack.playstore.password)
          BrowserStack__Build: $(Build.BuildNumber)
          TestExecution__RetryOnFlakyErrors: true
          NATIVE_APP_PATH_ANDROID: "$(System.ArtifactsDirectory)/Xamarin Android Clients/com.nhs.online.nhsonline.browserstack.apk"
          NATIVE_APP_PATH_IOS: "$(System.ArtifactsDirectory)/Xamarin iOS Clients/NHSOnline.App.BrowserStack.ipa"
          USE_APP_UPGRADE_CONFIG: ${{ parameters['runUpgradeTests'] }}
          MAIN_RUN: ${{ parameters['runMainTests'] }}
          CANARY_RUN: ${{ parameters['runCanaryTests'] }}
          FLIPBOOK_RUN: ${{ parameters['runFlipbookTests'] }}
          JOB_ATTEMPT: $(System.JobAttempt)
          XIT_MAIN_PREVIOUS_ATTEMPT_FOLDER_PATH: "$(System.ArtifactsDirectory)/$(previous.xitmain.jobattempt.foldername)"
        inputs:
          scriptPath: xamarinintegrationtests/buildscripts/06_run_integration_tests.sh

      - template: check-for-output-steps.yml
        parameters:
          description: Integration Tests Results
          test.path: "xamarinintegrationtests/TestResults"
          test.path.exists.variable.name: integration.tests.results.exists

      - task: Bash@3
        displayName: Fix Tests Results Paths
        condition: and(succeededOrFailed(), eq(variables['integration.tests.results.exists'], 'True'))
        inputs:
          targetType: 'inline'
          script: |
            find xamarinintegrationtests/TestResults -name '*.trx' -exec \
              sed \
                -ir \
                -e 's#storage="/src/#storage="xamarinintegrationtests/#' \
                -e 's#codeBase="/src/#codeBase="xamarinintegrationtests/#' \
                -e 's# in /src/# in xamarinintegrationtests/#' \
                \{\} \;
            find xamarinintegrationtests/TestResults -name '*.trx' -exec cat \{\} \;

      - task: ShellScript@2
        displayName: Generate Report
        condition: and(succeededOrFailed(), eq(variables['integration.tests.results.exists'], 'True'))
        inputs:
          scriptPath: xamarinintegrationtests/buildscripts/07_run_generate_integration_test_result_json.sh

      - task: PublishPipelineArtifact@1
        displayName: Publish Xamarin Integration Test Results
        condition: and(succeededOrFailed(), eq(variables['integration.tests.results.exists'], 'True'))
        inputs:
          targetPath: 'xamarinintegrationtests/TestResults'
          ${{ if eq(parameters['runCanaryTests'], true) }}:
            artifactName: 'Xamarin Integration Canary Test Files Attempt-$(System.JobAttempt)'
          ${{ if eq(parameters['runUpgradeTests'], true) }}:
            artifactName: 'Xamarin Integration Upgrade Test Files Attempt-$(System.JobAttempt)'
          ${{ if eq(parameters['runFlipbookTests'], true) }}:
            artifactName: 'Xamarin Integration Flipbook Test Files Attempt-$(System.JobAttempt)'
          ${{ if and(eq(parameters['runUpgradeTests'], false), eq(parameters['runCanaryTests'], false), eq(parameters['runFlipbookTests'], false))  }}:
            artifactName: 'Xamarin Integration Test Files Attempt-$(System.JobAttempt)'

      - task: Bash@3
        displayName: Set Generated Flipbook Artefact Name Variable
        condition: succeededOrFailed()
        inputs:
          targetType: 'inline'
          script: |
            if [[ "$(System.JobAttempt)" != "1" ]]; then
              echo "##vso[task.setvariable variable=native.xamarin.flipbookInterimFolderName]GeneratedFlipbookScreenshots$(System.JobAttempt)"
            fi

      - task: PublishPipelineArtifact@1
        displayName: Publish Xamarin Integration Test Flipbook
        condition: and(succeededOrFailed(), eq(variables['integration.tests.results.exists'], 'True'),  eq('${{ parameters['runFlipbookTests'] }}', 'True'))
        inputs:
          targetPath: 'xamarinintegrationtests/flipbookgeneration/flipbook'
          artifactName: $(native.xamarin.flipbookInterimFolderName)

      - task: PublishTestResults@2
        displayName: Publish Test Results
        condition: and(succeededOrFailed(), eq(variables['integration.tests.results.exists'], 'True'))
        inputs:
          ${{ if eq(parameters['runCanaryTests'], true) }}:
            testRunTitle: 'Xamarin Integration Canary Tests'
          ${{ if eq(parameters['runUpgradeTests'], true) }}:
            testRunTitle: 'Xamarin Integration Upgrade Tests'
          ${{ if and(eq(parameters['runUpgradeTests'], false), eq(parameters['runCanaryTests'], false))  }}:
            testRunTitle: 'Xamarin Integration Tests'
          testResultsFormat: VSTest
          testResultsFiles: xamarinintegrationtests/TestResults/*.trx
          failTaskOnFailedTests: false
          mergeTestResults: true
