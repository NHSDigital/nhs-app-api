parameters:
  - name: configuration
    type: string
    default: 'Browserstack - Release'
  - name: certSecureFile
    type: string
    default: 'iOSDevelopmentCertificate.p12'
  - name: certPwd
    type: string
    default: '$(ios.development.certificate.password)'
  - name: provProfileSecureFile
    type: string
    default: 'iOSDevelopmentBrowserStack.mobileprovision'

jobs:
  - job:
    displayName: Build Xamarin iOS - ${{ parameters.configuration }}
    dependsOn:
    pool:
      vmImage: 'macos-latest'

    variables:
      output.directory: '$(build.binariesDirectory)/$(build.configuration)'

    steps:
      - task: NuGetAuthenticate@0
        displayName: NuGet Authenticate

      - task: InstallAppleCertificate@2
        displayName: 'Install Apple certificate'
        inputs:
          certSecureFile: '${{ parameters.certSecureFile }}'
          certPwd: '${{ parameters.certPwd }}'

      - task: InstallAppleProvisioningProfile@1
        displayName: 'Install provisioning profile'
        inputs:
          provProfileSecureFile: ${{ parameters.provProfileSecureFile }}
          removeProfile: true

      - task: ShellScript@2
        displayName: Build iOS '${{ parameters.configuration }}'
        env:
          CONFIGURATION: '${{ parameters.configuration }}'
          IPA_PACKAGE_DIR: '$(output.directory)'
        inputs:
          scriptPath: xamarin/buildscripts/04_build_ios.sh

      - template: check-for-output-steps.yml
        parameters:
          description: build outputs
          test.path: '$(output.directory)'
          test.path.exists.variable.name: output.directory.exists

      - task: PublishBuildArtifacts@1
        displayName: Publish build outputs
        condition: and(succeededOrFailed(), eq(variables['output.directory.exists'], 'True'))
        inputs:
          pathtoPublish: '$(output.directory)'
          artifactName: Xamarin iOS Clients
