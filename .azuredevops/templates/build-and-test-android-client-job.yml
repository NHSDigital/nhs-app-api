jobs:
  - job: build_and_unit_test_android
    displayName: Build and Unit Test
    variables:
      unit.tests.results.path: android/app/build/test-results
      code.coverage.report.path: android/app/build/reports/jacoco/jacocoTestReport/html
    steps:
      - template: set-branch-tag-steps.yml
      - template: docker-login-steps.yml

      - task: Cache@2
        displayName: Android Gradle Cache
        inputs:
          key: gradle | $(Agent.OS) | android/build.gradle | android/app/build.gradle
          restoreKeys: gradle
          path: /home/vsts/.gradle

      - task: MavenAuthenticate@0
        displayName: 'Maven Authenticate'
        inputs:
          artifactsFeeds: nhsapp

      - task: DownloadSecureFile@1
        name: android_debug_key_store
        inputs:
          secureFile: 'AndroidDebugSigningKeyStore'

      - task: Bash@3
        displayName: Run Unit Tests
        inputs:
          filePath: android/buildscripts/01_run_unit_tests.sh

      - template: check-for-output-steps.yml
        parameters:
          description: unit tests results
          test.path: ${{ variables['unit.tests.results.path'] }}
          test.path.exists.variable.name: unit.tests.results.exists

      - task: PublishTestResults@2
        displayName: Publish unit tests results
        condition: and(succeededOrFailed(), eq(variables['unit.tests.results.exists'], 'True'))
        inputs:
          testRunTitle: Unit Tests Android Client
          testResultsFormat: JUnit
          testResultsFiles: '**/TEST-*.xml'
          searchFolder: '$(Build.SourcesDirectory)/$(unit.tests.results.path)'
          failTaskOnFailedTests: false
          mergeTestResults: true

      - template: check-for-output-steps.yml
        parameters:
          description: code coverage report
          test.path: ${{ variables['code.coverage.report.path'] }}
          test.path.exists.variable.name: code.coverage.report.exists

      - task: PublishBuildArtifacts@1
        displayName: Publish code coverage report
        condition: and(succeededOrFailed(), eq(variables['code.coverage.report.exists'], 'True'))
        inputs:
          pathToPublish: '$(Build.SourcesDirectory)/$(code.coverage.report.path)'
          artifactName: Android Client Code Coverage Report

      # Feature branch build and release
      - template: android-client-build-and-release-job.yml
        parameters:
          displayName: $(native.android.target)
          buildCondition: "succeeded()"
          releaseCondition: "and(succeeded(), eq(variables['native.android.upload'], 'True'))"
          target: $(native.android.target)
          keyStoreLocation: $(android_debug_key_store.secureFilePath)
          keyStorePassword: $(android.debug.key.store.password)

      # Tagged build - Preview Release
      - template: android-client-build-and-release-job.yml
        parameters:
          displayName: 'Preview Release'
          buildCondition: "and(succeeded(), or(eq(variables['source.tag'], 'True'), eq(variables['source.develop'], 'True')), ne(variables['native.android.target'], 'previewRelease'))"
          releaseCondition: "false"
          target: previewRelease
          keyStoreLocation: $(android_debug_key_store.secureFilePath)
          keyStorePassword: $(android.debug.key.store.password)

      # Tagged build - Sandpit
      - template: android-client-build-and-release-job.yml
        parameters:
          displayName: 'Onboarding Sandpit'
          buildCondition: "and(succeeded(), eq(variables['source.tag'], 'True'), ne(variables['native.android.target'], 'onboardingsandpit'))"
          target: onboardingsandpit
          keyStoreLocation: $(android_debug_key_store.secureFilePath)
          keyStorePassword: $(android.debug.key.store.password)

      # Tagged build - AOS
      - template: android-client-build-and-release-job.yml
        parameters:
          displayName: 'Onboarding AOS'
          buildCondition: "and(succeeded(), eq(variables['source.tag'], 'True'), ne(variables['native.android.target'], 'onboardingaos'))"
          target: onboardingaos
          keyStoreLocation: $(android_debug_key_store.secureFilePath)
          keyStorePassword: $(android.debug.key.store.password)

      - task: DownloadSecureFile@1
        name: android_key_store
        condition: and(succeeded(), eq(variables['source.tag'], 'True'))
        inputs:
          secureFile: 'AndroidSigningKeyStore'

      # Tagged build - Demo
      - template: android-client-build-and-release-secure-apps-job.yml
        parameters:
          displayName: 'Demo (Staging)'
          buildCondition: "and(succeeded(), eq(variables['source.tag'], 'True'))"
          target: demo
          keyStoreLocation: $(android_key_store.secureFilePath)
          keyStorePassword: $(android.key.store.password)

      # Tagged build - Release
      - template: android-client-build-and-release-secure-apps-job.yml
        parameters:
          displayName: Release
          buildCondition: "and(succeeded(), eq(variables['source.tag'], 'True'))"
          target: release
          keyStoreLocation: $(android_key_store.secureFilePath)
          keyStorePassword: $(android.key.store.password)

      - task: PublishBuildArtifacts@1
        displayName: Publish android package files
        inputs:
          pathToPublish: '$(Build.SourcesDirectory)/android/app/build/outputs/apk'
          artifactName: Android Package Files

      - template: check-for-output-steps.yml
        parameters:
          description: mapping file check
          test.path: '$(Build.SourcesDirectory)/android/app/build/outputs/mapping'
          test.path.exists.variable.name: android.mapping.folder.exists
          mandatory: false

      - task: PublishBuildArtifacts@1
        condition: and(succeeded(), eq(variables['android.mapping.folder.exists'], 'True'))
        displayName: Publish android mapping files
        inputs:
          pathToPublish: '$(Build.SourcesDirectory)/android/app/build/outputs/mapping'
          artifactName: Android Package Files

      # ACR Firewall - Remove host agent IP
      - template: acr_firewall.yml
        parameters:
          mode: remove
          acr: nhsapp
      - template: acr_firewall.yml
        parameters:
          mode: remove
          acr: nhsapprelease
