jobs:
    - job: secret_scanning
      displayName: Scan commit history for secrets
      steps: 
        - task: Bash@3
          displayName: Scan commit history for secrets - GitLeaks
          inputs:
            targetType: 'inline'
            script: docker run -v ${PWD}:/repo zricethezav/gitleaks:latest --path="/repo" --verbose --redact --config-path="/repo/gitleaks.config" --leaks-exit-code=0