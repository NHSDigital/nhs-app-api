jobs:
  - job:
    displayName: Generate Xamarin integration test flipbook
    steps:
      - template: docker-login-steps.yml

      - task: DownloadPipelineArtifact@2
        inputs:
          artifact: $(native.xamarin.flipbookInterimFolderName)
          path: xamarinintegrationtests/flipbookgeneration/flipbook

      - task: ShellScript@2
        displayName: Build
        inputs:
          scriptPath: xamarinintegrationtests/buildscripts/09_build_flipbook.sh

      - task: Bash@3
        displayName: Set Flipbook Artefact Name Variable
        condition: succeededOrFailed()
        inputs:
          targetType: 'inline'
          script: |
            formattedDate=$(date '+%Y-%m-%d')
            echo "##vso[task.setvariable variable=native.xamarin.flipbookPdfName]flipbook_${formattedDate}_$(System.JobAttempt)"

      - task: ShellScript@2
        displayName: Generate Xamarin integration test flipbook
        env:
          FLIPBOOK_NAME: $(native.xamarin.flipbookPdfName)
        inputs:
          scriptPath: xamarinintegrationtests/buildscripts/10_flipbook_generate.sh

      - task: PublishPipelineArtifact@1
        displayName: Publish Xamarin tests flipbook
        inputs:
          artifactName: Flipbook
          targetPath: 'xamarinintegrationtests/flipbookgeneration/flipbook/$(native.xamarin.flipbookPdfName).pdf'