parameters:
  - name: displayName
    type: string
  - name: buildCondition
    type: string
    default: false
  - name: target
    type: string
  - name: keyStoreLocation
    type: string
  - name: keyStorePassword
    type: string
  - name: track
    type: string
    default: internal
  - name: releaseCondition
    type: string
    default: ''

steps:
  # Build Android Client
  - task: Bash@3
    displayName: Build ${{ parameters.displayName }}
    condition: eq(${{ parameters.buildCondition }}, true)
    env:
      TARGET: ${{ parameters.target }}
      ANDROID_KEY_STORE_LOCATION: ${{ parameters.keyStoreLocation }}
      ANDROID_KEY_STORE_PASSWORD: ${{ parameters.keyStorePassword }}
    inputs:
      filePath: android/buildscripts/02_build.sh

  # Upload to google play store
  - task: GooglePlayRelease@3
    displayName: Release ${{ parameters.displayName }} to Google Play
    condition: eq(${{ coalesce(parameters.releaseCondition, parameters.buildCondition) }}, true)
    inputs:
      apkFile: '**/${{ parameters.target }}/*.apk'
      serviceEndpoint: nhsapp-google-play-store
      track: ${{ parameters.track }}
      shouldUploadMappingFile: true
      mappingFilePath: '**/${{ parameters.target }}/mapping.txt'
