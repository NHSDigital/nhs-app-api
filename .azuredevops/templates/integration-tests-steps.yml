
steps:
  - template: set-branch-tag-steps.yml
  - template: docker-login-steps.yml
  - template: integration-tests-gradle-cache.yml

  - task: ShellScript@2
    displayName: Run
    timeoutInMinutes: 180
    env:
      AZURE_NOTIFICATION_HUB_SHARED_ACCESS_KEY: $(azure.notification.hub.shared.access.key)
      BROWSERSTACK_ACCESS_KEY: $(browserstack.access.key)
    inputs:
      scriptPath: bddtests/buildscripts/$(tests.script)

  - template: check-for-output-steps.yml
    parameters:
      description: serenity report
      test.path: $(report.path.serenity)
      test.path.exists.variable.name: report.path.serenity.exists

  - task: ArchiveFiles@2
    displayName: Zip serenity report
    condition: and(succeededOrFailed(), eq(variables['report.path.serenity.exists'], 'True'))
    inputs:
      rootFolderOrFile: $(report.path.serenity)
      includeRootFolder: true
      archiveType: zip
      archiveFile: '$(Build.ArtifactStagingDirectory)/$(tests.name)/serenity_report.zip'

  - template: check-for-output-steps.yml
    parameters:
      description: docker logs
      test.path: $(report.path.docker.logs)
      test.path.exists.variable.name: report.path.docker.logs.exists

  - task: ArchiveFiles@2
    displayName: Zip docker logs
    condition: and(succeededOrFailed(), eq(variables['report.path.docker.logs.exists'], 'True'))
    inputs:
      rootFolderOrFile: $(report.path.docker.logs)
      includeRootFolder: true
      archiveType: zip
      archiveFile: '$(Build.ArtifactStagingDirectory)/$(tests.name)/docker_logs.zip'

  - template: check-for-output-steps.yml
    parameters:
      description: junit logs
      test.path: $(report.path.junit.logs)
      test.path.exists.variable.name: report.path.junit.logs.exists

  - task: PublishTestResults@2
    displayName: Publish test results
    condition: and(succeededOrFailed(), eq(variables['report.path.junit.logs.exists'], 'True'))
    inputs:
      testRunTitle: Integration Tests $(tests.name)
      testResultsFormat: JUnit
      testResultsFiles: '**/TEST-*.xml'
      searchFolder: '$(Build.SourcesDirectory)/$(report.path.junit.logs)'
      failTaskOnFailedTests: false
      mergeTestResults: true

  - task: ArchiveFiles@2
    displayName: Zip junit logs
    condition: and(succeededOrFailed(), eq(variables['report.path.junit.logs.exists'], 'True'))
    inputs:
      rootFolderOrFile: $(report.path.junit.logs)
      includeRootFolder: true
      archiveType: zip
      archiveFile: '$(Build.ArtifactStagingDirectory)/$(tests.name)/junit_logs.zip'

  - template: check-for-output-steps.yml
    parameters:
      description: pa11y report
      test.path: $(report.path.pa11y)
      test.path.exists.variable.name: report.path.pa11y.exists
      mandatory: false

  - task: ArchiveFiles@2
    displayName: Zip pa11y report
    condition: and(succeededOrFailed(), eq(variables['report.path.pa11y.exists'], 'True'))
    inputs:
      rootFolderOrFile: $(report.path.pa11y)
      includeRootFolder: true
      archiveType: zip
      archiveFile: '$(Build.ArtifactStagingDirectory)/$(tests.name)/pally_report.zip'

  - template: check-for-output-steps.yml
    parameters:
      description: test artifacts
      test.path: $(Build.ArtifactStagingDirectory)/$(tests.name)
      test.path.exists.variable.name: artifacts.directory.exists

  - task: PublishBuildArtifacts@1
    displayName: Publish artifacts
    condition: and(succeededOrFailed(), eq(variables['artifacts.directory.exists'], 'True'))
    inputs:
      pathToPublish: '$(Build.ArtifactStagingDirectory)/$(tests.name)'
      artifactName: Integration Tests $(tests.name)
