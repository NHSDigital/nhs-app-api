steps:
  - task: Docker@2
    displayName: Login to docker registry
    inputs:
      command: login
      containerRegistry: nhsappcontainers
  - ${{ if or(eq(variables['Build.SourceBranchName'], 'develop'), startsWith(variables['Build.SourceBranch'], 'refs/tags/')) }}:
    - task: Docker@2
      displayName: Login to release docker registry
      inputs:
        command: login
        containerRegistry: nhsappcontainersrelease

