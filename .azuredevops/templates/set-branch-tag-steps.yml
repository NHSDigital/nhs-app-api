
steps:
  - task: DownloadBuildArtifacts@0
    displayName: Download variables
    inputs:
      buildType: current
      artifactName: variables

  - task: Bash@3
    displayName: Set branch.tag variable
    inputs:
      pwsh: true
      targetType: inline
      script: |
        BRANCH_TAG=$(<"$SYSTEM_ARTIFACTSDIRECTORY/variables/branchTag")
        echo "##vso[task.setvariable variable=branch.tag]$BRANCH_TAG"
        echo "branch.tag: $BRANCH_TAG"
