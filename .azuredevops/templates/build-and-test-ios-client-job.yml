jobs:
  - job: build_and_unit_test_ios
    displayName: Build and Unit Test
    pool:
      vmImage: 'macos-latest'
    steps:
      - template: set-branch-tag-steps.yml

      - task: Bash@3
        displayName: Configure git authentication
        env:
          SYSTEM_ACCESSTOKEN: $(System.AccessToken)
        inputs:
          targetType: 'inline'
          script: |
            git config --global 'http.https://nhsapp@dev.azure.com/.extraheader' "AUTHORIZATION: bearer $SYSTEM_ACCESSTOKEN"

      - task: CocoaPods@0
        displayName: Install CocoaPods
        inputs:
          forceRepoUpdate: false
          projectDirectory: $(Build.SourcesDirectory)/ios/NHSOnline

      - task: Xcode@5
        displayName: 'Build and Run Unit Tests'
        inputs:
          xcodeDeveloperDir: /Applications/Xcode_10.1.app
          xcWorkspacePath: ios/NHSOnline/NHSOnline.xcworkspace
          sdk: iphonesimulator
          scheme: NHSOnline
          configuration: Development
          actions: test
          signingOption: auto
          destinationPlatformOption: iOS
          destinationSimulators: 'iPhone 8'
          publishJUnitResults: false

      - template: check-for-output-steps.yml
        parameters:
          description: unit tests results
          test.path: "./build/reports/junit.xml"
          test.path.exists.variable.name: unit.tests.results.exists

      - task: PublishTestResults@2
        displayName: Publish unit tests results
        condition: and(succeededOrFailed(), eq(variables['unit.tests.results.exists'], 'True'))
        inputs:
          testRunTitle: Unit Tests iOS
          testResultsFormat: JUnit
          testResultsFiles: './build/reports/junit.xml'
          failTaskOnFailedTests: false
          mergeTestResults: true

      - task: Bash@3
        displayName: Generate coverage report
        inputs:
          targetType: 'inline'
          script: |
            set -e
            gem install slather
            cd ios/NHSOnline/
            slather coverage --workspace NHSOnline.xcworkspace --scheme NHSOnline --cobertura-xml --output-directory reports/coverage NHSOnline.xcodeproj
            mv reports/coverage/cobertura.xml reports/coverage/ios-cobertura.xml

      - template: check-for-output-steps.yml
        parameters:
          description: coverage report
          test.path: "ios/NHSOnline/reports/coverage/ios-cobertura.xml"
          test.path.exists.variable.name: unit.tests.coverage.exists

      - task: PublishBuildArtifacts@1
        displayName: Publish unit test coverage
        condition: and(succeededOrFailed(), eq(variables['unit.tests.coverage.exists'], 'True'))
        inputs:
          pathToPublish: 'ios/NHSOnline/reports/coverage'
          artifactName: 'coverage'

      - task: InstallAppleCertificate@2
        displayName: 'Install Dev Apple certificate'
        inputs:
          certSecureFile: 'iOSDevelopmentCertificate.p12'
          certPwd: '$(ios.development.certificate.password)'

      - task: InstallAppleProvisioningProfile@1
        displayName: 'Install Development provisioning profile'
        inputs:
          provProfileSecureFile: 'iOSDevelopment$(ios.target).mobileprovision'
          removeProfile: true

      - task: Xcode@5
        displayName: 'Build $(ios.target)'
        inputs:
          xcodeDeveloperDir: /Applications/Xcode_10.1.app
          xcWorkspacePath: ios/NHSOnline/NHSOnline.xcworkspace
          sdk: iphoneos
          scheme: NHSOnline Dev
          configuration: $(ios.target)
          actions: build
          packageApp: true
          exportPath: ipa/$(ios.target)
          signingOption: manual
          signingIdentity: $(APPLE_CERTIFICATE_SIGNING_IDENTITY)
          provisioningProfileName: 'NHS App Dev $(ios.target)'
          provisioningProfileUuid: $(APPLE_PROV_PROFILE_UUID)

      - task: PublishBuildArtifacts@1
        displayName: Publish iOS package files
        inputs:
          pathToPublish: '$(Build.SourcesDirectory)/ipa'
          artifactName: iOS Package Files
