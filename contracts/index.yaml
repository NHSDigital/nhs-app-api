---
  swagger: "2.0"
  info: 
    version: "0.0.3"
    title: "NHS Online API"
    description: "This is the API for NHS online."
  schemes: 
    - "https"
  paths: 
    /v1/patient/appointmentslots: 
      get: 
        tags: 
          - "appointmentslots"
        summary: "Gets a list of available appointments for the logged on user."
        description: "For a given date range, returns lists of clinicians, appointment sessions, locations and available appointment slots for the logged in user. Requires NHSO-Session-ID cookie in header from session end point"
        produces: 
          - "application/json"
        parameters: 
          - 
            in: "query"
            name: "fromDate"
            type: "string"
            format: "date-time"
            required: true
            description: "Appointment search from date."
          - 
            in: "query"
            name: "toDate"
            type: "string"
            format: "date-time"
            required: true
            description: "Appointment search to date."
        responses: 
          200: 
            description: "Returns list of available slots and associated meta data. Returns empty collection of slots if GP system does not return a list of available slots."
            schema: 
              type: "object"
              properties: 
                clinicians: 
                  type: "array"
                  description: "Array of attending Clinicians."
                  items: 
                    type: "object"
                    properties: 
                      id: 
                        type: "string"
                        description: "Clinician Identifier."
                      displayName: 
                        type: "string"
                        description: "Clinician Name."
                appointmentSessions: 
                  type: "array"
                  description: "Array of Appointment Sessions."
                  items: 
                    type: "object"
                    properties: 
                      id: 
                        type: "string"
                        description: "Appointment Session Identifier."
                      displayName: 
                        type: "string"
                        description: "Appointment Session Name."
                locations: 
                  type: "array"
                  description: "Array of Locations."
                  items: 
                    type: "object"
                    properties: 
                      id: 
                        type: "string"
                        description: "Location Identifier."
                      displayName: 
                        type: "string"
                        description: "Location Name."
                slots: 
                  type: "array"
                  description: "Available Appointment Slots."
                  items: 
                    type: "object"
                    properties: 
                      id: 
                        type: "string"
                        description: "Slot Identifier."
                      startTime: 
                        type: "string"
                        format: "date-time"
                        description: "Appointment Slot Start Date Time."
                      endTime: 
                        type: "string"
                        format: "date-time"
                        description: "Appointment Slot End Date Time."
                      locationId: 
                        type: "string"
                        description: "Location Identifier"
                      appointmentSessionId: 
                        type: "string"
                        description: "GP system appointment session Identifier."
                      clinicianIds: 
                        type: "array"
                        description: "Array of Clinicians, accounts for joint sessions."
                        items: 
                          type: "string"
          400: 
            description: "Bad request. All headers must be provided."
          401: 
            description: "User session has expired."
          500: 
            description: "An unexpected error occured processing the request."
          502: 
            description: "The GP system is currently unavailable."
          504: 
            description: "The GP system did not respond in a timely fashion."
    /v1/session: 
      post: 
        tags: 
          - "session"
        summary: "Creates a user session for an authenticated user."
        description: "Given an OAuth authorisation code and PKCE code verifier, creates and returns a user session."
        consumes: 
          - "application/json"
        parameters: 
          - 
            in: "body"
            name: "userSession"
            required: true
            description: "OAuth details for the session to be created."
            schema: 
              type: "object"
              required: 
                - "authCode"
                - "codeVerifier"
              properties: 
                authCode: 
                  type: "string"
                  description: "OAuth authorization code."
                codeVerifier: 
                  type: "string"
                  description: "PKCE code verifier."
        responses: 
          201: 
            description: "Successfully authenticated. The session ID is returned in a cookie name `NHSO-Session-ID`. This cookie should be included in subsequent requests."
            schema: 
              type: "object"
              properties: 
                givenName: 
                  type: "string"
                  description: "User's given name"
                familyName: 
                  type: "string"
                  description: "User's family name."
          400: 
            description: "Bad request. Supplied OAuth details are incomplete or invalid"
          403: 
            description: "Forbidden. Can occur if the IM1 connection token received from Citizen ID does not successfully authenticate with the GP system."
          500: 
            description: "An unexpected error occurred during the processing of the request."
          502: 
            description: "The GP system is currently unavailable."
          504: 
            description: "The GP system did not respond in a timely fashion."

