swagger: "2.0"

info:
  version: 0.0.5
  title: NHS App Sub-API - My Record
  description: NHS App Sub-API - endpoints pertaining to patient record. All require an NHSO-Session-Id cookie (obtained from Session endpoint).

paths:
  /my-record:
    get:
      tags:
        - myrecord
      summary: Gets the record for the logged on user.
      description: Returns the users medical record for the logged in user. Requires NHSO-Session-Id cookie (obtained from session endpoint).
      produces:
        - application/json
      responses:
        200:
          description: Returns myrecord data for the logged in user.
          schema:
            $ref: '#/definitions/MyRecordResponse'
        401:
          description: User session has expired.
        500:
          description: An unexpected error occurred processing the request.
        502:
          description: The GP system is currently unavailable.
        504:
          description: The GP system did not respond in a timely fashion.
 
definitions:
  MyRecordResponse:
    type: object
    properties:
      hasSummaryRecordAccess:
        type: boolean
        description: Shows if the patient has access to their summary record.
      hasDetailedRecordAccess:
        type: boolean
        description: Shows if the patient has access to their detailed record.
      allergies:
        type: object
        description: An object containing all allergy details.
        $ref: '#/definitions/Allergies'
      medications:
        type: object
        description:  An object containing all medication details.
        $ref: '#/definitions/Medications'

  Allergies:
    type: object
    properties:
      hasAccess:
        type: boolean
        description: Does the patient have access to this data.
      hasErrored:
        type: boolean
        description: Some error occurred when attempting to retrieve this error.
      data:
        type: array
        description: An array of allergy information objects.
        items:
          $ref: '#/definitions/AllergyItem'

  AllergyItem:
    type: object
    properties:
      name:
        type: string
        description: The name of the allergy.
      date:
        type: string
        format: date-time
        description: When the record was entered.

  Medications:
    type: object
    properties:
      hasAccess:
        type: boolean
        description: Does the patient have access to this data.
      hasErrored:
        type: boolean
        description: Some error occurred when attempting to retrieve this error.
      data:
        type: object
        properties:
          acuteMedications:
            type: array
            description: Array of acuteMedications
            items:
              $ref: '#/definitions/MedicationItem'
          currentRepeatMedications:
            type: array
            description: Array of acuteMedications
            items:
              $ref: '#/definitions/MedicationItem'
          discontinuedRepeatMedications:
            type: array
            description: Array of acuteMedications
            items:
              $ref: '#/definitions/MedicationItem'

  MedicationItem:
    type: object
    properties:
      date:
        type: string
        format: date-time
        description: The date/time of the item.
      lineItems:
        type: array
        description: An array of line items.
        items:
          $ref: '#/definitions/LineItem'

  LineItem:
    type: object
    properties:
      text:
        type: string
        description: When the record was entered.
      lineItems:
        type: array
        description: An array of line items
        items:
          type: string
          