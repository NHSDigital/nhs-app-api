swagger: "2.0"

info:
  version: 0.0.4
  title: NHS Online Sub-API - Appointments
  description: NHS Online Sub-API - endpoints pertaining to appointments. All require an NHSO-Session-ID cookie (obtained from Session end point).

paths:
  /appointment-slots:
    get:
      tags:
        - appointment-slots
      summary: Gets a list of available appointments for the logged on user.
      description: For a given date range, returns lists of clinicians, appointment sessions, locations and available appointment slots for the logged in user. Requires NHSO-Session-ID cookie (obtained from Session end point).
      produces:
        - application/json
      parameters:
        - in: query
          name: fromDate
          type: string
          format: date-time
          required: false
          description: Appointment search from date. If not supplied and no toDate supplied, defaults to current datetime. If not supplied but toDate supplied, defaults to start of the day two weeks before toDate.
        - in: query
          name: toDate
          type: string
          format: date-time
          required: false
          description: Appointment search to date. If not supplied and no fromDate supplied, defaults to end of the day two weeks after current datetime. If not supplied but fromDate supplied, defaults to end of the day two weeks after fromDate.
      responses:
        200:
          description: Returns list of available slots and associated meta data. Returns empty collection of slots if GP system does not return a list of available slots.
          schema:
            $ref: "#/definitions/AppointmentSlotsResponse"
        400:
          description: Bad request. A querystring parameter is not in the expected format.
        401:
          description: User session has expired.
        500:
          description: An unexpected error occured processing the request.
        502:
          description: The GP system is currently unavailable.
        504:
          description: The GP system did not respond in a timely fashion.
definitions:
  AppointmentSlotsResponse:
    type: object
    properties:
      clinicians:
        type: array
        description: Array of attending Clinicians.
        items:
         $ref: '#/definitions/Clinician'
      appointmentSessions:
        type: array
        description: Array of Appointment Sessions.
        items:
          $ref: '#/definitions/AppointmentSession'
      locations:
        type: array
        description: Array of Locations.
        items:
          $ref: '#/definitions/Location'
      slots:
        type: array
        description: Available Appointment Slots.
        items:
          $ref: '#/definitions/Slot'
  AppointmentSession:
    type: object
    properties:
        id:
         type: string
         description: Appointment Session Identifier.
        displayName:
         type: string
         description: Appointment Session Name.
  Clinician:
    type: object
    properties:
      id:
        type: string
        description: Clinician Identifier.
      displayName:
        type: string
        description: Clinician Name.
  Location:
    type: object
    properties:
      id:
        type: string
        description: Location Identifier.
      displayName:
        type: string
        description: Location Name.
  Slot:
    type: object
    properties:
      id:
        type: string
        description: Slot Identifier.
      startTime:
        type: string
        format: date-time
        description: Appointment Slot Start Date Time.
      endTime:
        type: string
        format: date-time
        description: Appointment Slot End Date Time.
      locationId:
        type: string
        description: Location Identifier
      appointmentSessionId:
        type: string
        description: GP system appointment session Identifier.
      clinicianIds:
        type: array
        description: Array of Clinicians, accounts for joint sessions.
        items:
          type: string