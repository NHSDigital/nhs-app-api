version: "3.4"

secrets:
  terms_conditions_cosmos_auth_key:
    file: "~/.nhsonline/secrets/terms_conditions_cosmos_auth_key"

services:

  pfs.local.bitraft.io:
    environment:
      STUB_TERMS_AND_CONDITIONS: 'false'
      TERMS_CONDITIONS_COSMOS_AUTH_KEY: /run/secrets/terms_conditions_cosmos_auth_key
    secrets:
      - terms_conditions_cosmos_auth_key
