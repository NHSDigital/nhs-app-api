version: "3.4"

secrets:
  tpp_cert:
    file: "./docker/stubbed/certs/TestCert.pfx"
  tpp_cert_passphrase:
    file: "./docker/stubbed/certs/TestCert.password"
  microtest_cert:
    file: "./docker/stubbed/certs/TestCert.pfx"
  microtest_cert_passphrase:
    file: "./docker/stubbed/certs/TestCert.password"
  auth_signing_private_key:
    file: "./docker/stubbed/certs/private_key.pem"
  auth_signing_rsapass:
    file: "./docker/stubbed/certs/private_key.password"
  vision_cert:
    file: "./docker/stubbed/certs/TestCert.pfx"
  vision_cert_passphrase:
    file: "./docker/stubbed/certs/TestCert.password"

services:

  web.local.bitraft.io:
    env_file:
      - ./docker/stubbed/env/gplookup_connectivity.env

  pfs.local.bitraft.io:
    env_file:
      - ./docker/stubbed/env/emis_connectivity.env
      - ./docker/stubbed/env/ers_connectivity.env
      - ./docker/stubbed/env/gplookup_connectivity.env
      - ./docker/stubbed/env/microtest_connectivity.env
      - ./docker/stubbed/env/onlineconsultationsproviders_connectivity.env
      - ./docker/stubbed/env/organdonation_connectivity.env
      - ./docker/stubbed/env/spine_connectivity.env
      - ./docker/stubbed/env/tpp_connectivity.env
      - ./docker/stubbed/env/vision_connectivity.env
      - ./docker/stubbed/env/knownservices.env

  cid.local.bitraft.io:
    env_file:
      - ./docker/stubbed/env/emis_connectivity.env
      - ./docker/stubbed/env/microtest_connectivity.env
      - ./docker/stubbed/env/tpp_connectivity.env
      - ./docker/stubbed/env/vision_connectivity.env

  userinfo.local.bitraft.io:
    env_file:
      - ./docker/stubbed/env/qualtrics_connectivity.env

  stubs.local.bitraft.io:
    networks:
      default:
        aliases:
          - auth.nhslogin.stubs.local.bitraft.io
          - uaf.nhslogin.stubs.local.bitraft.io
          - settings.nhslogin.stubs.local.bitraft.io
          - paycasso.stubs.local.bitraft.io
          - pkb.stubs.local.bitraft.io
          - engage.stubs.local.bitraft.io
          - gncr.stubs.local.bitraft.io
          - substrakt.stubs.local.bitraft.io
