version: "3.4"

services:

  minimock.local.bitraft.io:
    image: ${MINIMOCK_DOCKER_REGISTRY:-local}/nhsonline-minimock:${MINIMOCK_DOCKER_TAG:-latest}
    ports:
      - "8080:8080"
    env_file:
      - ./docker/performance/env/minimock.env

  web.local.bitraft.io:
    env_file:
      - ./docker/performance/env/web.env
      - ./docker/performance/env/gplookup_connectivity.env

  pfs.local.bitraft.io:
    env_file:
      - ./docker/performance/env/emis_connectivity.env
      - ./docker/performance/env/gplookup_connectivity.env
      - ./docker/performance/env/im1cache_database.env
      - ./docker/performance/env/microtest_connectivity.env
      - ./docker/performance/env/nhslogin_connectivity.env
      - ./docker/performance/env/organdonation_connectivity.env
      - ./docker/performance/env/session_database.env
      - ./docker/performance/env/spine_connectivity.env
      - ./docker/performance/env/tpp_connectivity.env
      - ./docker/performance/env/vision_connectivity.env
      - ./docker/performance/env/olc_connectivity.env
      - ./docker/performance/env/pfs.env
    volumes:
      - ./docker/performance/mockcerts:/app/mockcerts

  users.local.bitraft.io:
    env_file:
      - ./docker/performance/env/nhslogin_connectivity.env
      - ./docker/performance/env/notificationhub_connectivity.env
      - ./docker/performance/env/users.env

  cid.local.bitraft.io:
    env_file:
      - ./docker/performance/env/emis_connectivity.env
      - ./docker/performance/env/im1cache_database.env
      - ./docker/performance/env/microtest_connectivity.env
      - ./docker/performance/env/tpp_connectivity.env
      - ./docker/performance/env/vision_connectivity.env
      - ./docker/performance/env/cid.env
    volumes:
      - ./docker/performance/mockcerts:/app/mockcerts

  messages.local.bitraft.io:
    env_file:
      - ./docker/performance/env/nhslogin_connectivity.env
      - ./docker/performance/env/messages.env

  servicejourneyrulesapi.local.bitraft.io:
    env_file:
      - ./docker/performance/env/sjr.env
      - ./docker/performance/env/im1cache_database.env

  userinfo.local.bitraft.io:
    env_file:
      - ./docker/performance/env/nhslogin_connectivity.env
      - ./docker/performance/env/userinfo.env
