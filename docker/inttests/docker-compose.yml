version: "3.4"

services:

  web.local.bitraft.io:
    env_file:
     - ./docker/inttests/env/web.env

  pfs.local.bitraft.io:
    env_file:
      - ./docker/inttests/env/known_services_connectivity.env
      - ./docker/inttests/env/vision_connectivity.env

  stubs.local.bitraft.io:
    image: alpine/socat
    entrypoint: ["socat"]
    command: tcp-l:8080,fork,reuseaddr tcp:int_test_test_runner:8080
    networks:
      default:
        aliases:
          - auth.nhslogin.stubs.local.bitraft.io
          - uaf.nhslogin.stubs.local.bitraft.io
          - settings.nhslogin.stubs.local.bitraft.io
          - paycasso.stubs.local.bitraft.io
          - pkb.stubs.local.bitraft.io
          - engage.stubs.local.bitraft.io
          - accurx.stubs.local.bitraft.io
          - gncr.stubs.local.bitraft.io
          - substrakt.stubs.local.bitraft.io
          - nhsd.stubs.local.bitraft.io
          - netcompany.stubs.local.bitraft.io
          - ers.stubs.local.bitraft.io
          - deeplinklauncher.stubs.local.bitraft.io
          - silverintegrationtestprovider.stubs.local.bitraft.io
          - substraktDomain1.stubs.local.bitraft.io
          - wellnessAndPrevention.stubs.local.bitraft.io

  securestubs.local.bitraft.io:
    image: nginx:alpine
    volumes:
      - ./docker/inttests/https/nginx:/etc/nginx/conf.d
      - ~/.nhsonline/secure-stubs-certificate:/etc/ssl
    ports:
      - "443:443"
    networks:
      default:
        aliases:
          - pkb.securestubs.local.bitraft.io

  browserstack.local:
    image: ${DOCKER_IMAGE_BROWSERSTACK_LOCAL}
    restart: always
    depends_on:
      - api.local.bitraft.io
    entrypoint:
      - /bin/bash
      - -c
      - |
        BrowserStackLocal --key "$$BrowserStack__Key" --force-local --local-identifier "$$BrowserStack__LocalIdentifier" --verbose 2
    environment:
      BrowserStack__Key: "${BrowserStack__Key}"
      BrowserStack__LocalIdentifier: "${BrowserStack__LocalIdentifier}"

  servicejourneyrulesapi.config:
    image: local/nhsonline-service-journey-integration-test-config:latest

  mongo_seed:
    env_file:
      - ./docker/inttests/env/mongo_seed.env