version: "3.4"

secrets:

  auth_signing_private_key:
    file: "~/.nhsonline/secrets/auth_signing_dev_private_key.pem"
  auth_signing_rsapass:
    file: "~/.nhsonline/secrets/auth_signing_dev_rsapass.password"

services:

  web.local.bitraft.io:
    env_file:
      - ./docker/nhslogin_connectivity_dev.env

  pfs.local.bitraft.io:
    env_file:
      - ./docker/nhslogin_connectivity_dev.env

  users.local.bitraft.io:
    env_file:
      - ./docker/nhslogin_connectivity_dev.env

  userinfo.local.bitraft.io:
    env_file:
      - ./docker/nhslogin_connectivity_dev.env

  messages.local.bitraft.io:
    env_file:
      - ./docker/nhslogin_connectivity_dev.env