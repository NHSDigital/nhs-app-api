version: "3.2"
services:
  nhsonline.web:
    build:
      context: .
      dockerfile: Dockerfile-dev
    ports:
      - "8080:8080"
    volumes:
      - .:/opt/app
    environment:
      - API_HOST=http://nhsonline.backend.worker:8800
  nhsonline.backend.worker:
    image: nhsonline.backend.worker
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8800:5123"
  nhsonline.redis.sds:
    image: nhsonline.redis.sds
    ports:
      - "6379:6379"
  nhsonline.stubs.emis.im1:
    image: nhsonline.stubs.emis.im1
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8801:5123"
    tty: true

