version: "3.2"
services:
  nhsonline.backend.worker:
    image: nhsonline.backend.worker
    build:
      context: .
      dockerfile: NHSOnline.Backend.Worker/Dockerfile
  nhsonline.stubs.consoleapp:
    image: nhsonline.stubs.consoleapp
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8800:5123"
    tty: true
  nhsonline.redis.sds:
    image: nhsonline.redis.sds
    ports:
      - "6379:6379"
