version: "3.2"
services:
  nhsonline.backend.worker:
    image: nhsonline.backend.worker
    build:
      context: .
      dockerfile: NHSOnline.Backend.Worker/Dockerfile
    depends_on:
      - nhsonline.redis.sds
      - nhsonline.redis.session
    ports:
      - "8082:5123"
    environment:
      - CITIZEN_ID_BASE_URL=https://keycloak.dev1.signin.nhs.uk/cicauth/realms/NHS/protocol/openid-connect/
      - CITIZEN_ID_CLIENT_ID=nhs-online-poc
      - CITIZEN_ID_CLIENT_SECRET=872b46c9-0afe-4037-8958-e7bbc209a379
      - CORS_AUTHORITY=*
      - EMIS_APPLICATION_ID=D66BA979-60D2-49AA-BE82-AEC06356E41F
      - EMIS_BASE_URL=http://nhsonline.stubs:8080/emis/
      - EMIS_VERSION=2.1.0.0
      - NHS_WEB_APP_BASE_URL=http://localhost:3000/
      - REDIS_ODSLOOKUP_CONFIG=nhsonline.redis.sds:6379
      - REDIS_SESSION_CONFIG=nhsonline.redis.session:6379
      - SESSION_EXPIRY_MINUTES=20
  nhsonline.stub-data:
    image: nhsonline.backend.stub-data
    build:
      context: .
      dockerfile: NHSOnline.Backend.Worker.Stubs/Dockerfile
    environment:
      - WIREMOCK_AUTHORITY=nhsonline.stubs:8080
    depends_on:
      - nhsonline.stubs
  nhsonline.stubs:
    image: rodolpheche/wiremock
    ports:
      - "8800:8080"
  nhsonline.redis-data.sds:
    image: nhsonline.azurecr.io/nhsonline-redis-data:latest
    environment:
      - REDIS_HOST=nhsonline.redis.sds
    depends_on:
      - nhsonline.redis.sds
  nhsonline.redis.sds:
    image: bitnami/redis:4.0.8-r7
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    ports:
      - "6379:6379"
    volumes:
      - 'redis_data:/bitnami/redis'
  nhsonline.redis.session:
    image: bitnami/redis:4.0.8-r7
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    ports:
      - "6380:6379"
volumes:
  redis_data:
    driver: local
