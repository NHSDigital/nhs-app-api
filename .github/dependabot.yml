version: 1
update_configs:
  - package_manager: "javascript"
    directory: "/"
    update_schedule: "live"
    schedule:
        interval: "weekly"
    groups:
        all-dependencies:
            patterns:
                - "*"
    automerged_updates:
      - match:
          dependency_type: "all"
          update_type: "security:patch"
  - package_manager: "javascript"
    directory: "/sandbox"
    update_schedule: "live"
    schedule:
        interval: "weekly"
    groups:
        all-dependencies:
            patterns:
                - "*"
    automerged_updates:
      - match:
          dependency_type: "all"
          update_type: "security:patch"
  - package_manager: "python"
    directory: "/"
    update_schedule: "live"
    schedule:
        interval: "weekly"
    groups:
        all-dependencies:
            patterns:
                - "*"
    automerged_updates:
      - match:
          dependency_type: "all"
          update_type: "security:patch"
