title: Communication Response
type: object
description: |
      An array of identifiers used to identify the original communication request that is referenced by this receipt.

      This array will always include a globally unique identifier for the communication request assigned by the API, with the system `https://fhir.nhs.uk/Id/nhs-app-communication-id`. Note that several receipts may be included for each communication ID – for example a single in-app message might generate a Delivered receipt and a Read receipt.

      It will include optional identifiers that were provided in the original communication request if the API recognised the identifier system name.
required:
  - resourceType
  - contained
  - status
  - basedOn
  - identifier
  - payload
  - recipient
  - requester
  - authoredOn  
properties:
  resourceType:
    type: string
    enum:
      - CommunicationRequest
    example: 'CommunicationRequest'
  contained:
    type: object
    description: will contain only one entry.
    properties:
      resourceType:
        type: string
        description: will be CommunicationRequest.
        example: QuestionnaireResponse
      id:
        type: string
        description: will refer to contentReferece in the payload field.
        example: answers
      status:
        type: string
        description: will refer to contentReferece in the payload field.
        example: answers
      authored:
        type: datetime
        description: will contain the datetime at what datetime response has given.
        example: '2022-08-16T13:31:42+00:00'
      items:
        type: array
        description: will contain only one entry.
        properties:
          linkId:
            type: string
            description: will be always 1.
            example: '1'
          answer: 
            type: array
            description: will contain only one entry.
            properties:
              valueCoding:
                type: object
                description: will have code that patient has selected
                properties:
                  code:
                    type: string
                    example: 'SMOKE'
  status:
    type: string
    description: This will be `rejected` for receipts conveying that a communication request has been rejected, and `completed` for the other receipt types.
    enum: 
      - rejected
      - completed
    example: 'completed'
  basedOn:
    type: array
    description: will contain the unique communication ID of the communication, with system http://fhir.nhs.uk/Id/nhs-app-communication-id
    properties:
      identifier:
        type: object
        properties:
          system:
            type: string
            format: uri
            description: The namespace of the identifier value.
            example: https://fhir.nhs.uk/Id/nhs-app-communication-id
          value:
            type: string
            description: The value of the identifier.
            example: 8f7ec136-66eb-4a9e-97ca-5c7a53d2710c  
  identifier:
    type: array
    description: |
      - may containany Campaign ID associated with the communication request, with system https://fhir.nhs.uk/NHSApp/campaign-id
      - may containany Request Reference associated with the communication request, with system https://fhir.nhs.uk/NHSApp/request-id    
    properties:
      system:
        type: string
        format: uri
        description: The namespace of the identifier value.
        example: https://fhir.nhs.uk/Id/nhs-app-communication-id
      value:
        type: string
        description: The value of the identifier.
        example: 882cc757-5096-4565-9779-af25a751a65f
  payload:
    type: array
    description: payload-contentReference will have reference to QuestionnaireResponse-Id
    properties:
      contentReference: 
        type: object
        properties:
          reference:
            type: string
            example: '#answers'
  recipient:
    type: array
    properties:
      type: 
        type: string
        example: Organization
      identifier:
        type: object
        properties:
          system:
            type: string            
            example: https://fhir.nhs.uk/Id/ods-organization-code
          value:
            type: string            
            example: B82041
  requester:
    type: object
    properties:
      type:
        type: string
        example: Patient
      identifier:
        type: object
        properties:
          system:
            type: string            
            example: https://fhir.nhs.uk/Id/nhs-number
          value:
            type: string            
            example: '9692113841'
  authoredOn:
    type: string
    format: date-time
    description: will contain the datetime at which the communication was created.
    example: '2022-08-19T09:15:12Z'