apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'kotlin-android-extensions'

android {
    compileSdkVersion 27
    defaultConfig {
        applicationId "com.nhs.online.nhsonline"
        minSdkVersion 21
        targetSdkVersion 27
        versionCode 20
        versionName "1.0.0"
        multiDexEnabled true
        testInstrumentationRunner "android.support.test.runner.AndroidJUnitRunner"
        vectorDrawables.useSupportLibrary = true
    }
    signingConfigs {
        release {
            storeFile file(release_store_location)
            storePassword release_store_password
            keyAlias release_store_key_alias
            keyPassword release_store_password
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            manifestPlaceholders = [appName: "NHS App"]
            signingConfig signingConfigs.release
        }
        demo {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            applicationIdSuffix ".demo"
            manifestPlaceholders = [appName: "NHS App Demo"]
            signingConfig signingConfigs.release
        }
        previewRelease {
            initWith debug
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            applicationIdSuffix ".preview"
            manifestPlaceholders = [appName: "NHS App Preview"]
        }
        browserstack {
            debuggable true
            manifestPlaceholders = [appName: "NHS App Browserstack"]
        }
        previewDebug {
            initWith debug
            debuggable true
            applicationIdSuffix ".preview"
            manifestPlaceholders = [appName: "NHS App Debug"]
        }
        debug {
            initWith debug
            debuggable true
            applicationIdSuffix ".preview"
            manifestPlaceholders = [appName: "NHS App Debug"]
        }
        local {
            initWith debug
            applicationIdSuffix ".local"
            manifestPlaceholders = [appName: "NHS App Local"]
        }
        scratch1 {
            initWith debug
            applicationIdSuffix ".scratch1"
            manifestPlaceholders = [appName: "NHS App Scratch 1"]
        }
        scratch2 {
            initWith debug
            applicationIdSuffix ".scratch2"
            manifestPlaceholders = [appName: "NHS App Scratch 2"]
        }
        scratch3 {
            initWith debug
            applicationIdSuffix ".scratch3"
            manifestPlaceholders = [appName: "NHS App Scratch 3"]
        }
        scratch4 {
            initWith debug
            applicationIdSuffix ".scratch4"
            manifestPlaceholders = [appName: "NHS App Scratch 4"]
        }
        scratch5 {
            initWith debug
            applicationIdSuffix ".scratch5"
            manifestPlaceholders = [appName: "NHS App Scratch 5"]
        }
        scratch6 {
            initWith debug
            applicationIdSuffix ".scratch6"
            manifestPlaceholders = [appName: "NHS App Scratch 6"]
        }
        scratch7 {
            initWith debug
            applicationIdSuffix ".scratch7"
            manifestPlaceholders = [appName: "NHS App Scratch 7"]
        }
        scratch8 {
            initWith debug
            applicationIdSuffix ".scratch8"
            manifestPlaceholders = [appName: "NHS App Scratch 8"]
        }
        scratch9 {
            initWith debug
            applicationIdSuffix ".scratch9"
            manifestPlaceholders = [appName: "NHS App Scratch 9"]
        }
        scratch10 {
            initWith debug
            applicationIdSuffix ".scratch10"
            manifestPlaceholders = [appName: "NHS App Scratch 10"]
        }
    }
    testOptions {
        unitTests {
            includeAndroidResources = true
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation 'com.android.support:appcompat-v7:27.1.1'
    implementation 'com.android.support:design:27.1.1'
    implementation 'com.android.support.constraint:constraint-layout:1.1.3'
    implementation 'com.android.support:support-vector-drawable:27.1.1'
    implementation 'com.intuit.sdp:sdp-android:1.0.5'
    implementation 'com.intuit.ssp:ssp-android:1.0.5'
    implementation 'android.arch.lifecycle:extensions:1.1.1'
    implementation 'com.android.support:customtabs:27.1.1'
    implementation 'com.android.volley:volley:1.1.1'

    annotationProcessor 'android.arch.lifecycle:compiler:1.1.1'
    testImplementation 'junit:junit:4.12'
    testImplementation 'org.robolectric:robolectric:3.8'
    testImplementation 'com.nhaarman:mockito-kotlin:1.5.0'
    testImplementation 'org.robolectric:shadows-httpclient:3.8'
    testImplementation 'com.android.volley:volley:1.1.1'
}
