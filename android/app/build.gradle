dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation 'androidx.appcompat:appcompat:1.0.0'
    implementation 'com.google.android.material:material:1.0.0'
    implementation 'androidx.constraintlayout:constraintlayout:1.1.3'
    implementation 'androidx.vectordrawable:vectordrawable:1.0.0'
    implementation 'com.intuit.sdp:sdp-android:1.0.5'
    implementation 'com.intuit.ssp:ssp-android:1.0.5'
    implementation 'commons-codec:commons-codec:1.11'
    implementation 'androidx.lifecycle:lifecycle-extensions:2.0.0'
    implementation 'androidx.browser:browser:1.0.0'
    implementation 'com.android.volley:volley:1.1.1'
    implementation 'com.jakewharton.threetenabp:threetenabp:1.2.0'
    implementation 'com.nhs.online.fidoclient:fidoclient:1.0.4'
    implementation 'com.google.firebase:firebase-core:16.0.1'
    implementation 'com.google.firebase:firebase-messaging:17.3.4'
    implementation 'com.squareup.moshi:moshi:1.10.0'
    implementation 'com.squareup.moshi:moshi-kotlin:1.10.0'

    implementation 'com.paycasso.sdk:paycasso:2020.9.2-11-2'
    implementation 'com.paycasso.sdk:paycasso-view:2020.9.2-11'
    implementation 'com.paycasso.sdk:paycasso-opencv:2020.8.10'
    implementation 'com.paycasso.sdk:paycasso-tensorflow:2020.8.10'
    implementation 'com.paycasso.sdk:paycasso-jj2000:2020.8.10'

    kapt 'com.squareup.moshi:moshi-kotlin-codegen:1.10.0'
    kapt 'androidx.lifecycle:lifecycle-compiler:2.0.0'

    testImplementation 'junit:junit:4.12'
    testImplementation 'org.robolectric:robolectric:4.3.1'
    testImplementation 'com.nhaarman.mockitokotlin2:mockito-kotlin:2.2.0'
    testImplementation 'org.robolectric:shadows-httpclient:4.3'
    testImplementation 'com.android.volley:volley:1.1.1'
}

jacoco {
    toolVersion = '0.8.5'
}

repositories {
    maven {
        url 'https://pkgs.dev.azure.com/nhsapp/_packaging/nhsapp/maven/v1'
        name 'nhsapp'
    }
}

tasks.withType(Test) {
    testLogging.showStandardStreams = true

    finalizedBy jacocoTestReport

    jacoco.includeNoLocationClasses = true
    jacoco.excludes = ['jdk.internal.*']
}

task jacocoTestReport(type: JacocoReport, dependsOn: ['testDebugUnitTest']) {
    reports {
        xml.enabled = true
        html.enabled = true
    }

    def fileFilter = ['**/R.class', '**/R$*.class', '**/BuildConfig.*', '**/Manifest*.*', '**/*Test*.*', 'android/**/*.*']
    def debugTree = fileTree(dir: "$project.buildDir/tmp/kotlin-classes/debug", excludes: fileFilter)
    def mainSrc = "$project.projectDir/src/main/kotlin"

    sourceDirectories.from files([mainSrc])
    classDirectories.from files([debugTree])
    executionData.from fileTree(dir: project.buildDir, includes: [
            'jacoco/testDebugUnitTest.exec', 'outputs/code-coverage/connected/*coverage.ec'
    ])
}
