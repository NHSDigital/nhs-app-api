
plugins {
    id 'net.linguica.maven-settings' version '0.5'
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'kotlin-android-extensions'
apply plugin: 'jacoco'
apply plugin: 'com.google.gms.google-services'
apply plugin: 'kotlin-kapt'

def developmentFolder = java.nio.file.Paths.get(System.getProperty("user.home"),
        '.nhsonline/secrets/android-development.gradle')

if(file(developmentFolder).exists()){
    apply from: developmentFolder
}

android {
    compileSdkVersion 29
    sourceSets {
        main {
            assets.srcDirs = ['../../nativeAppAssets']
        }
    }
    defaultConfig {
        applicationId "com.nhs.online.nhsonline"
        minSdkVersion 21
        targetSdkVersion 29
        versionCode 65
        versionName "1.41.0"
        multiDexEnabled true
        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
        vectorDrawables.useSupportLibrary = true
        javaCompileOptions {
            annotationProcessorOptions {
                includeCompileClasspath false
            }
        }
    }
    signingConfigs {
        config {
        }
        debug {
            storeFile file(debug_store_location.replaceFirst("^~", System.getProperty("user.home")
                    .replace("\\", "/")))
            storePassword debug_store_password
            keyPassword debug_store_password
            keyAlias "debug"
        }
        release {
            storeFile file(release_store_location)
            storePassword release_store_password
            keyAlias release_store_key_alias
            keyPassword release_store_password
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            manifestPlaceholders = [appName: "NHS App"]
            signingConfig signingConfigs.release
        }
        demo {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            applicationIdSuffix ".demo"
            manifestPlaceholders = [appName: "NHS App Demo"]
            signingConfig signingConfigs.release
        }
        previewRelease {
            initWith debug
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            applicationIdSuffix ".preview"
            manifestPlaceholders = [appName: "NHS App Preview"]
        }
        browserstack {
            debuggable true
            manifestPlaceholders = [appName: "NHS App Browserstack"]
        }
        previewDebug {
            initWith debug
            debuggable true
            applicationIdSuffix ".preview"
            manifestPlaceholders = [appName: "NHS App Debug"]
        }
        debug {
            initWith debug
            debuggable true
            applicationIdSuffix ".preview"
            manifestPlaceholders = [appName: "NHS App Debug"]
            testCoverageEnabled = true
            signingConfig signingConfigs.debug
        }
        localHttp {
