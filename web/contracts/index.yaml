---
  swagger: "2.0"
  info: 
    version: "0.0.6"
    title: "NHS App API"
    description: "This is the API for the NHS App."
  schemes: 
    - "https"
  paths: 
    /v1/patient/appointment-slots: 
      get: 
        tags: 
          - "appointment-slots"
        summary: "Gets a list of available appointments for the logged on user."
        description: "Returns lists of clinicians, appointment sessions, locations and available appointment slots for the logged in user. Requires NHSO-Session-Id cookie (obtained from session endpoint)."
        produces: 
          - "application/json"
        responses: 
          200: 
            description: "Returns list of available slots and associated meta data. Returns empty collection of slots if GP system does not return a list of available slots."
            schema: 
              type: "object"
              properties: 
                guidanceMessage: 
                  type: "string"
                  description: "Guidance message from GP practice explaining which appointment slot to book."
                bookingReasonNecessity: 
                  type: "string"
                  enum: 
                    - "NotAllowed"
                    - "Optional"
                    - "Mandatory"
                  description: "Indicates whether the patient can supply a booking reason when making an appointment."
                slots: 
                  type: "array"
                  description: "Available Appointment Slots."
                  items: 
                    type: "object"
                    properties: 
                      id: 
                        type: "string"
                        description: "Slot Identifier."
                      type: 
                        type: "string"
                        description: "Type of appointment slot, e.g. \"Baby immunisations\"."
                      startTime: 
                        type: "string"
                        format: "date-time"
                        description: "Appointment Slot Start Date Time."
                      endTime: 
                        type: "string"
                        format: "date-time"
                        description: "Appointment Slot End Date Time."
                      location: 
                        type: "string"
                        description: "Location of the appointment slot"
                      clinicians: 
                        type: "array"
                        description: "Array of Clinicians, accounts for joint sessions."
                        items: 
                          type: "string"
          401: 
            description: "User session has expired."
          403: 
            description: "The patient does not have the necessary permissions within the GP system."
          500: 
            description: "An unexpected error occurred processing the request."
          502: 
            description: "Bad response received from upstream system."
          504: 
            description: "Timeout when calling upstream system."
    /v1/patient/appointments: 
      delete: 
        tags: 
          - "appointments"
        summary: "Cancels an upcoming appointment for the logged on user."
        description: "Cancels a specified appointment for the logged on user. Requires NHSO-Session-Id cookie (obtained from session endpoint)."
        consumes: 
          - "application/json"
        parameters: 
          - 
            in: "body"
            name: "AppointmentCancelRequest"
            required: true
            description: "Details of the appointment to be cancelled, along with reason for the booking being cancelled."
            schema: 
              type: "object"
              required: 
                - "appointmentId"
              properties: 
                appointmentId: 
                  type: "string"
                  description: "Identifier of the appointment to be cancelled."
                  minLength: 1
                cancellationReasonId: 
                  type: "string"
                  description: "Identifier of the reason for the appointment being cancelled. Array of valid cancellation reasons is returned when requesting a user's current appointments."
        responses: 
          204: 
            description: "Successfully cancelled the specified appointment."
          400: 
            description: "Bad request. Supplied request is incomplete or invalid."
          401: 
            description: "User session has expired."
          403: 
            description: "The patient does not have the necessary permissions within the GP system."
          409: 
            description: "The specified appointment does not exist or is not in a suitable state to be cancelled."
          461: 
            description: "It is too late to cancel this appointment."
          500: 
            description: "An unexpected error occurred during the processing of the request."
          502: 
            description: "Bad response received from upstream system."
          504: 
            description: "Timeout when calling upstream system."
      get: 
        tags: 
          - "appointments"
        summary: "Gets a list of existing appointments for the logged on user."
        description: "Returns list of booked appointments for the logged on user, and associated metadata including list of cancellation reasons that can be used to cancel upcoming appointments. Requires NHSO-Session-Id cookie (obtained from session endpoint)."
        produces: 
          - "application/json"
        parameters: 
          - 
            in: "query"
            name: "includePastAppointments"
            type: "boolean"
            required: true
            description: "Indicates whether the response should include historical appointments. See also the optional pastAppointmentsFromDate parameter that can be used to limit the number of returned historical appointments."
          - 
            in: "query"
            name: "pastAppointmentsFromDate"
            type: "string"
            format: "date-time"
            required: false
            description: "Earliest datetime for which to return historical appointments. Will only have any effect if includePastAppointments is set to true."
        responses: 
          200: 
            description: "Returns list of booked appointments and associated meta data. Returns empty collection of appointments if GP system does not return a list of appointmetns."
            schema: 
              type: "object"
              properties: 
                appointments: 
                  type: "array"
                  description: "Array of booked Appointments."
                  items: 
                    type: "object"
                    properties: 
                      id: 
                        type: "string"
                        description: "Appointment Identifier."
                      type: 
                        type: "string"
                        description: "Type of appointment slot, e.g. \"Baby immunisations\"."
                      startTime: 
                        type: "string"
                        format: "date-time"
                        description: "Appointment Start Date Time."
                      endTime: 
                        type: "string"
                        format: "date-time"
                        description: "Appointment End Date Time."
                      location: 
                        type: "string"
                        description: "Physical location of the appointment."
                      clinicians: 
                        type: "array"
                        description: "Array of Clinicians, accounts for joint sessions."
                        items: 
                          type: "string"
                cancellationReasons: 
                  type: "array"
                  description: "Array of Cancellation Reasons."
                  items: 
                    type: "object"
                    properties: 
                      id: 
                        type: "string"
                        description: "Cancellation Reason Identifier."
                      displayName: 
                        type: "string"
                        description: "Cancellation Reason Description."
                disableCancellation: 
                  type: "boolean"
                  description: "Indicates whether appointment cancellation is disabled."
          400: 
            description: "Bad request. A querystring parameter is not in the expected format."
          401: 
            description: "User session has expired."
          403: 
            description: "The patient does not have the necessary permissions within the GP system."
          500: 
            description: "An unexpected error occurred processing the request."
          502: 
            description: "Bad response received from upstream system."
          504: 
            description: "Timeout when calling upstream system."
      post: 
        tags: 
          - "appointments"
        summary: "Creates a GP Appointment for the logged on user."
        description: "Books an appointment slot for the logged on user, given a slot identifier. Identifiers of available slots can be obtained using the appointment-slots endpoint. Requires NHSO-Session-Id cookie (obtained from session endpoint)."
        consumes: 
          - "application/json"
        parameters: 
          - 
            in: "body"
            name: "AppointmentBookRequest"
            required: true
            description: "Details of the appointment slot to be booked, along with reasons for the booking being made."
            schema: 
              type: "object"
              required: 
                - "slotId"
                - "bookingReason"
              properties: 
                slotId: 
                  type: "string"
                  description: "Identifier of appointment slot to be booked."
                  minLength: 1
                bookingReason: 
                  type: "string"
                  description: "Reason for booking appointment. e.g. symptoms being experienced by the patient."
                  minLength: 1
                  maxLength: 150
                startTime: 
                  type: "string"
                  format: "date-time"
                  description: "Appointment Start Date Time."
                endTime: 
                  type: "string"
                  format: "date-time"
                  description: "Appointment End Date Time."
        responses: 
          201: 
            description: "Appointment successfully created."
          400: 
            description: "Bad request. Supplied request is incomplete or invalid."
          401: 
            description: "User session has expired."
          403: 
            description: "The patient does not have the necessary permissions within the GP system."
          409: 
            description: "Conflict. The chosen appointment slot is not available for booking."
          460: 
            description: "The patient has reached the limit of pending appointments that may be booked."
          500: 
            description: "An unexpected error occurred processing the request."
          502: 
            description: "Bad response received from upstream system."
          504: 
            description: "Timeout when calling upstream system."
    /v1/patient/demographics: 
      get: 
        tags: 
          - "demographics"
        summary: "Gets demographic information for the logged on user."
        description: "Returns personal details and address details for the logged-in user. Requires NHSO-Session-Id cookie (obtained from session endpoint)."
        produces: 
          - "application/json"
        responses: 
          200: 
            description: "Returns demographic data for the logged in user."
            schema: 
              type: "object"
              properties: 
                nhsNumber: 
                  type: "string"
                  description: "The patient's NHS number."
                patientName: 
                  type: "string"
                  description: "The patient's name."
                dateOfBirth: 
                  type: "string"
                  format: "date-time"
                  description: "The patient's date of birth."
                sex: 
                  type: "string"
                  description: "The patient's sex."
                address: 
                  type: "string"
                  description: "The patient's address."
          401: 
            description: "User session has expired."
          403: 
            description: "The patient does not have the necessary permissions within the GP system."
          500: 
            description: "An unexpected error occurred processing the request."
          502: 
            description: "Bad response received from upstream system."
          504: 
            description: "Timeout when calling upstream system."
    /v1/patient/my-record: 
      get: 
        tags: 
          - "myrecord"
        summary: "Gets the record for the logged on user."
        description: "Returns the users medical record for the logged in user. Requires NHSO-Session-Id cookie (obtained from session endpoint)."
        produces: 
          - "application/json"
        responses: 
          200: 
            description: "Returns myrecord data for the logged in user."
            schema: 
              type: "object"
              properties: 
                hasSummaryRecordAccess: 
                  type: "boolean"
                  description: "Shows if the patient has access to their summary record."
                hasDetailedRecordAccess: 
                  type: "boolean"
                  description: "Shows if the patient has access to their detailed record."
                supplier: 
                  type: "string"
                  description: "supplier."
                  enum: 
                    - "UNKNOWN"
                    - "EMIS"
                    - "TPP"
                    - "VISION"
                allergies: 
                  type: "object"
                  description: "An object containing all allergy details."
                  properties: 
                    hasAccess: 
                      type: "boolean"
                      description: "Does the patient have access to this data."
                    hasErrored: 
                      type: "boolean"
                      description: "Some error occurred when attempting to retrieve this error."
                    data: 
                      type: "array"
                      description: "An array of allergy information objects."
                      items: 
                        type: "object"
                        properties: 
                          name: 
                            type: "string"
                            description: "The name of the allergy."
                          date: 
                            type: "object"
                            properties: 
                              value: 
                                type: "string"
                                format: "date-time"
                                description: "date/time value."
                              datePart: 
                                type: "string"
                                description: "date part to display."
                                enum: 
                                  - "Unknown"
                                  - "Year"
                                  - "YearMonth"
                                  - "YearMonthDay"
                                  - "YearMonthDayTime"
                          drug: 
                            type: "string"
                            description: "The name of the drug responsible for the allergy."
                          reaction: 
                            type: "string"
                            description: "The allergic reaction."
                medications: 
                  type: "object"
                  description: "An object containing all medication details."
                  properties: 
                    hasAccess: 
                      type: "boolean"
                      description: "Does the patient have access to this data."
                    hasErrored: 
                      type: "boolean"
                      description: "Some error occurred when attempting to retrieve this error."
                    data: 
                      type: "object"
                      properties: 
                        acuteMedications: 
                          type: "array"
                          description: "Array of acuteMedications"
                          items: 
                            type: "object"
                            properties: 
                              date: 
                                type: "string"
                                format: "date-time"
                                description: "The date/time of the item."
                              lineItems: 
                                type: "array"
                                description: "An array of line items."
                                items: 
                                  $ref: "#/paths/~1v1~1patient~1my-record/get/responses/200/schema/properties/problems/properties/data/properties/problems/items/properties/lineItems/items"
                        currentRepeatMedications: 
                          type: "array"
                          description: "Array of acuteMedications"
                          items: 
                            $ref: "#/paths/~1v1~1patient~1my-record/get/responses/200/schema/properties/medications/properties/data/properties/acuteMedications/items"
                        discontinuedRepeatMedications: 
                          type: "array"
                          description: "Array of acuteMedications"
                          items: 
                            $ref: "#/paths/~1v1~1patient~1my-record/get/responses/200/schema/properties/medications/properties/data/properties/acuteMedications/items"
                immunisations: 
                  type: "object"
                  description: "An object containing all immunisation details."
                  properties: 
                    hasAccess: 
                      type: "boolean"
                      description: "Does the patient have access to this data."
                    hasErrored: 
                      type: "boolean"
                      description: "Some error occurred when attempting to retrieve this error."
                    data: 
                      type: "object"
                      properties: 
                        immunisations: 
                          type: "array"
                          description: "Array of immunisations."
                          items: 
                            type: "object"
                            properties: 
                              effectiveDate: 
                                $ref: "#/paths/~1v1~1patient~1my-record/get/responses/200/schema/properties/allergies/properties/data/items/properties/date"
                              term: 
                                type: "string"
                                description: "The name of the immunisation."
                testResults: 
                  type: "object"
                  description: "An object containing all test result details."
                  properties: 
                    hasAccess: 
                      type: "boolean"
                      description: "Does the patient have access to this data."
                    hasErrored: 
                      type: "boolean"
                      description: "Some error occurred when attempting to retrieve this error."
                    data: 
                      type: "object"
                      properties: 
                        testResults: 
                          type: "array"
                          description: "Array of test results"
                          items: 
                            type: "object"
                            properties: 
                              id: 
                                type: "string"
                                description: "Id of the test result"
                              date: 
                                $ref: "#/paths/~1v1~1patient~1my-record/get/responses/200/schema/properties/allergies/properties/data/items/properties/date"
                              description: 
                                type: "string"
                                description: "The name of the test result."
                              associatedTexts: 
                                type: "array"
                                description: "Array of associated texts."
                                items: 
                                  type: "string"
                              testResultChildItems: 
                                type: "array"
                                description: "Array of test result child line items."
                                items: 
                                  type: "object"
                                  properties: 
                                    description: 
                                      type: "string"
                                      description: "The name of the test result."
                                    associatedTexts: 
                                      type: "array"
                                      description: "Array of associated texts."
                                      items: 
                                        type: "string"
                problems: 
                  type: "object"
                  description: "An object containing all problems details."
                  properties: 
                    hasAccess: 
                      type: "boolean"
                      description: "Does the patient have access to this data."
                    hasErrored: 
                      type: "boolean"
                      description: "Some error occurred when attempting to retrieve this error."
                    data: 
                      type: "object"
                      properties: 
                        problems: 
                          type: "array"
                          description: "Array of problems"
                          items: 
                            type: "object"
                            properties: 
                              effectiveDate: 
                                $ref: "#/paths/~1v1~1patient~1my-record/get/responses/200/schema/properties/allergies/properties/data/items/properties/date"
                              lineItems: 
                                type: "array"
                                description: "An array of line items."
                                items: 
                                  type: "object"
                                  properties: 
                                    text: 
                                      type: "string"
                                      description: "When the record was entered."
                                    lineItems: 
                                      type: "array"
                                      description: "An array of line items"
                                      items: 
                                        type: "string"
                tppDcrEvents: 
                  type: "object"
                  description: "An object containing all tpp dcr event details."
                  properties: 
                    hasAccess: 
                      type: "boolean"
                      description: "Does the patient have access to this data."
                    hasErrored: 
                      type: "boolean"
                      description: "Some error occurred when attempting to retrieve this error."
                    data: 
                      type: "object"
                      properties: 
                        problems: 
                          type: "array"
                          description: "Array of problems"
                          items: 
                            type: "object"
                            properties: 
                              effectiveDate: 
                                type: "string"
                                format: "date-time"
                                description: "date/time value."
                              eventLocationAndDoneBy: 
                                type: "string"
                                description: "Event location and done by"
                              eventItems: 
                                type: "array"
                                description: "Array of event items"
                                items: 
                                  type: "string"
                consultations: 
                  type: "object"
                  description: "An object containing all consultation details."
                  properties: 
                    hasAccess: 
                      type: "boolean"
                      description: "Does the patient have access to this data."
                    hasErrored: 
                      type: "boolean"
                      description: "Some error occurred when attempting to retrieve this error."
                    data: 
                      type: "object"
                      properties: 
                        problems: 
                          type: "array"
                          description: "Array of problems"
                          items: 
                            type: "object"
                            properties: 
                              effectiveDate: 
                                $ref: "#/paths/~1v1~1patient~1my-record/get/responses/200/schema/properties/allergies/properties/data/items/properties/date"
                              consultantLocation: 
                                type: "string"
                                description: "Consultant Location and Name"
                              consultationHeaders: 
                                type: "array"
                                description: "An array of consultationHeader."
                                items: 
                                  type: "object"
                                  properties: 
                                    header: 
                                      type: "string"
                                      description: "Consultation Header"
                                    observationsWithTerm: 
                                      type: "array"
                                      description: "An array of observations."
                                      items: 
                                        type: "object"
                                        properties: 
                                          term: 
                                            type: "string"
                                            description: "Observation Term"
                                          associatedTexts: 
                                            type: "array"
                                            description: "An array of associated texts."
                                            items: 
                                              type: "string"
                                    associatedTexts: 
                                      type: "array"
                                      description: "An array of associated texts."
                                      items: 
                                        type: "string"
          401: 
            description: "User session has expired."
          500: 
            description: "An unexpected error occurred processing the request."
          502: 
            description: "The GP system is currently unavailable."
          504: 
            description: "The GP system did not respond in a timely fashion."
    /v1/patient/test-result: 
      get: 
        tags: 
          - "test result"
        summary: "Returns a string which contains html from TPP for the selected test result."
        produces: 
          - "application/json"
        parameters: 
          - 
            in: "query"
            name: "testResultId"
            type: "string"
            required: true
            description: "id of selected test result"
        responses: 
          200: 
            description: "Returns html for selected test result from TPP"
            schema: 
              type: "object"
              properties: 
                hasErrored: 
                  type: "boolean"
                  description: "Shows if error occurred getting test result from TPP"
                testResult: 
                  type: "string"
                  description: "html represenation of test result data"
          400: 
            description: "Bad request. A querystring parameter is not in the expected format."
          401: 
            description: "User session has expired."
          500: 
            description: "An unexpected error occurred processing the request."
          502: 
            description: "Bad response received from upstream system."
          504: 
            description: "Timeout when calling upstream system."
    /v1/patient/terms-and-conditions/consent: 
      get: 
        tags: 
          - "termsAndConditions"
        summary: "Gets the patient consent for the logged on user."
        description: "Returns the most recent patient consent for the logged in user. Requires NHSO-Session-Id cookie (obtained from session endpoint)."
        produces: 
          - "application/json"
        responses: 
          200: 
            description: "Returns patient consent data for the logged in user."
            schema: 
              type: "object"
              required: 
                - "consentGiven"
              properties: 
                updatedConsentRequired: 
                  type: "boolean"
                  description: "Flag indicating whether the terms and conditions have changed since last consent"
                consentGiven: 
                  type: "boolean"
                  description: "Flag indicating whether the user has consented to the terms and conditions"
                analyticsCookieAccepted: 
                  type: "boolean"
                  description: "Flag indicating whether the user has consented to the use of analytics"
          463: 
            description: "Unable to fetch consent at this time."
      post: 
        tags: 
          - "termsAndConditions"
        summary: "Records patient consent and date of consent"
        description: "Records whether the logged in user has given their consent to use the app and date and time of consent"
        consumes: 
          - "application/json"
        parameters: 
          - 
            in: "body"
            name: "ConsentRequest"
            required: true
            description: "Object indicating whether consent has been granted, and the date the request was made."
            schema: 
              type: "object"
              required: 
                - "consentGiven"
                - "analyticsCookieAccepted"
              properties: 
                consentGiven: 
                  type: "boolean"
                  description: "Flag indicating whether the user has consented to the terms and conditions"
                analyticsCookieAccepted: 
                  type: "boolean"
                  description: "Flag indicating whether the user has consented to the use of analytics"
                updatingConsent: 
                  type: "boolean"
                  description: "Flag indicating whether the user is consenting to updated terms and conditions"
        responses: 
          201: 
            description: "Appointment successfully created."
          462: 
            description: "Unable to record consent at this time."
    /v1/patient/prescriptions: 
      post: 
        tags: 
          - "prescriptions"
        summary: "Creates a repeat prescription request for the logged in user"
        description: "For the given logged on user, will request a repeat prescription for a list of prescription courses. Requires NHSO-Session-Id cookie in header from session endpoint."
        consumes: 
          - "application/json"
        parameters: 
          - 
            in: "body"
            name: "RepeatPrescriptionRequest"
            required: true
            description: "Repeat prescription request details to be created."
            schema: 
              type: "object"
              required: 
                - "courseIds"
              properties: 
                courseIds: 
                  type: "array"
                  description: "Array of course identifiers to create the prescription for."
                  items: 
                    type: "string"
                specialRequest: 
                  type: "string"
                  description: "Optional free text that a user may supply in order to add a special request for the given prescription"
        responses: 
          201: 
            description: "Successful operation. Repeat Prescription Created."
          400: 
            description: "Bad request. Supplied connection details or request data is incomplete or invalid."
          401: 
            description: "User session missing or expired."
          403: 
            description: "The patient does not have the necessary permissions within the GP system."
          409: 
            description: "Conflict. A repeat prescription for the given course already exists preventing a new one to be created."
          466: 
            description: "The patient is trying to order medication which has already been ordered within the last 30 days."
          500: 
            description: "An unexpected error occurred processing the request."
          502: 
            description: "Bad response received from upstream system."
          504: 
            description: "Timeout when calling upstream system."
      get: 
        tags: 
          - "prescriptions"
        summary: "Gets a list of requested repeat prescriptions for the logged on user."
        description: "For a given date range, returns a list of courses and repeat prescriptions for the logged in user. Requires NHSO-Session-Id cookie in header from session endpoint."
        produces: 
          - "application/json"
        parameters: 
          - 
            in: "query"
            name: "fromDate"
            type: "string"
            format: "date-time"
            required: false
            description: "Repeat Prescription from date. Will default to 6 months ago if no value is supplied"
        responses: 
          200: 
            description: "Returns list of requested repeat prescriptions and associated meta data. Returns empty collection of repeat prescriptions if GP system does not return a list of prescriptions."
            schema: 
              type: "object"
              properties: 
                prescriptions: 
                  type: "array"
                  description: "Array of repeat prescriptions."
                  items: 
                    type: "object"
                    properties: 
                      courses: 
                        type: "array"
                        description: "Array of prescription courses."
                        items: 
                          type: "object"
                          properties: 
                            courseId: 
                              type: "string"
                              description: "Course identifier."
                      orderDate: 
                        type: "string"
                        format: "date-time"
                        description: "The date on which the repeat prescription was ordered."
                      status: 
                        type: "string"
                        enum: 
                          - "Unknown"
                          - "Rejected"
                          - "Requested"
                          - "Approved"
                courses: 
                  type: "array"
                  description: "Array of prescription courses."
                  items: 
                    $ref: "#/paths/~1v1~1patient~1courses/get/responses/200/schema/properties/courses/items"
          400: 
            description: "Bad request. All headers must be provided."
          401: 
            description: "User session has expired."
          403: 
            description: "The patient does not have the necessary permissions within the GP system."
          500: 
            description: "An unexpected error occurred processing the request."
          502: 
            description: "Bad response received from upstream system."
          504: 
            description: "Timeout when calling upstream system."
    /v1/patient/courses: 
      get: 
        tags: 
          - "courses"
        summary: "Gets a list of prescriptions courses for the given patient."
        description: "Returns a list of prescriptions courses for the logged in user. Requires NHSO-Session-Id cookie in header from session endpoint."
        produces: 
          - "application/json"
        responses: 
          200: 
            description: "Returns list of courses and associated meta data. Returns empty collection of courses if GP system does not return a list of courses."
            schema: 
              type: "object"
              properties: 
                courses: 
                  type: "array"
                  description: "An array of prescription courses"
                  items: 
                    type: "object"
                    properties: 
                      id: 
                        type: "string"
                        description: "Course identifier."
                      name: 
                        type: "string"
                        description: "Course name."
                      details: 
                        type: "string"
                        description: "Details of the course. Depending on the provider this may contain different information like dosage, quantity and status."
                specialRequestNecessity: 
                  type: "string"
                  enum: 
                    - "notAllowed"
                    - "optional"
                    - "mandatory"
                  description: "Indicates whether the patient can supply a special request when ordering a prescription."
          401: 
            description: "User session missing or expired."
          403: 
            description: "The patient does not have the necessary permissions within the GP system."
          500: 
            description: "An unexpected error occurred processing the request."
          502: 
            description: "Bad response received from upstream system."
          504: 
            description: "Timeout when calling upstream system."
    /v1/patient/ndop: 
      get: 
        tags: 
          - "ndop"
        summary: "Request Ndop Token"
        description: "Returns a signed Jwt token to be passed to Ndop Web Page"
        consumes: 
          - "application/json"
        responses: 
          200: 
            description: "Token successfully created."
            schema: 
              type: "object"
              properties: 
                token: 
                  type: "string"
                  description: "signed Jwt Token"
          500: 
            description: "An unexpected error occurred processing the request."
    /v1/session: 
      post: 
        tags: 
          - "session"
        summary: "Creates a user session for an authenticated user."
        description: "Given an OAuth authorisation code and PKCE code verifier, creates and returns a user session."
        consumes: 
          - "application/json"
        parameters: 
          - 
            in: "body"
            name: "userSession"
            required: true
            description: "OAuth details for the session to be created."
            schema: 
              type: "object"
              required: 
                - "authCode"
                - "codeVerifier"
                - "redirectUrl"
              properties: 
                authCode: 
                  type: "string"
                  description: "OAuth authorization code."
                codeVerifier: 
                  type: "string"
                  description: "PKCE code verifier."
                redirectUrl: 
                  type: "string"
                  description: "Redirect url provided when signing in to Citizen ID"
        responses: 
          201: 
            description: "Successfully authenticated. The session ID is returned in a cookie name `NHSO-Session-Id`. This cookie should be included in subsequent requests."
            schema: 
              type: "object"
              properties: 
                name: 
                  type: "string"
                  description: "User's name"
                sessionTimeout: 
                  type: "integer"
                  description: "User's session timeout period in seconds."
                odsCode: 
                  type: "string"
                  description: "Unique code that identifies a user's GP practice"
                token: 
                  type: "string"
                  description: "User's session CsrfToken"
                nhsNumber: 
                  type: "string"
                  description: "User's NHS number"
                accessToken: 
                  type: "string"
                  description: "User's access token which allows NHS Login to identify them"
          400: 
            description: "Bad request. Supplied OAuth details are incomplete or invalid"
          403: 
            description: "Forbidden. Can occur if the IM1 connection token received from Citizen ID does not successfully authenticate with the GP system."
          464: 
            description: "ODS code associated with a user is not supported or no nhs number found."
          465: 
            description: "User did not meet the minimum age requirement."
          500: 
            description: "An unexpected error occurred during the processing of the request."
          502: 
            description: "Bad response received from upstream system."
          504: 
            description: "Timeout when calling upstream system."
      delete: 
        tags: 
          - "session"
        summary: "Deletes a user session for an authenticated user."
        description: "Given a valid session cookie deletes the users session and signs the user out. Requires NHSO-Session-Id cookie obtained from post session endpoint."
        responses: 
          204: 
            description: "Successfully deleted session and user signed out"
          401: 
            description: "User session has expired."
          500: 
            description: "An unexpected error occurred during the processing of the request."
          502: 
            description: "Session storage is unavailable"
    /v1/configuration: 
      get: 
        tags: 
          - "configuration"
        summary: "Gets a collection of configuration values."
        description: null
        produces: 
          - "application/json"
        parameters: 
          - 
            in: "query"
            name: "deviceName"
            type: "string"
            format: "string"
            required: true
            description: "name of the device (android or ios)"
          - 
            in: "query"
            name: "nativeAppVersion"
            type: "string"
            format: "string"
            required: true
            description: "version number of the NHS App installed on the device"
        responses: 
          200: 
            description: "Returns configuration for the app."
            schema: 
              type: "object"
              properties: 
                isDeviceSupported: 
                  type: "boolean"
                  description: "Returns true if the version of NHS App installed on device is supported, otherwise false."
          400: 
            description: "Either the device name was not provided or the device version number was not in the correct format."
          500: 
            description: "An unexpected error occurred processing the request."
    /v1/session/extend: 
      post: 
        tags: 
          - "session"
        summary: "Extends a user session for an authenticated user."
        description: "Extends a user session for an authenticated user, by calling an upstream endpoint. Requires NHSO-Session-Id cookie obtained from post session endpoint."
        responses: 
          200: 
            description: "Successfully extended."
          401: 
            description: "User session has expired."
          500: 
            description: "An unexpected error occurred during the processing of the request."
          502: 
            description: "Could not extend service. Can occur if already timed out, or there is a problem with the request."
          504: 
            description: "Timeout when calling upstream system."
    /v1/odscodelookup: 
      get: 
        tags: 
          - "odscodelookup"
        summary: "Gets a boolean value to indicate if gp practice is participating in public beta"
        description: null
        produces: 
          - "application/json"
        parameters: 
          - 
            in: "query"
            name: "odsCode"
            type: "string"
            format: "string"
            required: true
            description: "ods code of gp practice"
        responses: 
          200: 
            description: "Returns ods code lookup result for the practice"
            schema: 
              type: "object"
              properties: 
                isGPPracticeSupported: 
                  type: "boolean"
                  description: "Returns true if the GP Practice is participating"
          400: 
            description: "the ods code was not provided"
          500: 
            description: "An unexpected error occurred processing the request."
