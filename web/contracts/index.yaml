    /v1/patient/my-record/section: 
      get: 
        tags: 
          - "myrecord section"
        summary: "Gets a specific section from the record for the logged on user."
        description: "Returns only the specified section from the users medical record for the logged in user (Vision only). Requires NHSO-Session-Id cookie (obtained from session endpoint)."
        parameters: 
          - 
            in: "query"
            name: "section"
            required: true
            description: "specific section to return"
            schema: 
              type: "string"
              enum: 
                - "TestResults"
                - "Diagnosis"
                - "Examinations"
                - "Procedures"
        responses: 
          200: 
            description: "Returns specified myrecord section for the logged in user."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  properties: 
                    markup: 
                      type: "string"
                      description: "Markup for specified section (will be either HTML or XML)"
                    sectionName: 
                      type: "string"
                      description: "Name of section requested"
          400: 
            description: "Bad request. A querystring parameter is not in the expected format."
          401: 
            description: "User session has expired."
          500: 
            description: "An unexpected error occurred processing the request."
          502: 
            description: "The GP system is currently unavailable."
          504: 
            description: "The GP system did not respond in a timely fashion."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
