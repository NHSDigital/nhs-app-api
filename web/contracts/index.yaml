                              date: 
                                type: "object"
                                properties: 
                                  value: 
                                    type: "string"
                                    format: "date-time"
                                    description: "date/time value."
                                  datePart: 
                                    type: "string"
                                    description: "date part to display."
                                    enum: 
                                      - "Unknown"
                                      - "Year"
                                      - "YearMonth"
                                      - "YearMonthDay"
                                      - "YearMonthDayTime"
                              drug: 
                                type: "string"
                                description: "The name of the drug responsible for the allergy."
                              reaction: 
                                type: "string"
                                description: "The allergic reaction."
                    medications: 
                      type: "object"
                      properties: 
                        hasAccess: 
                          type: "boolean"
                          description: "Does the patient have access to this data."
                        hasErrored: 
                          type: "boolean"
                          description: "Some error occurred when attempting to retrieve this error."
                        data: 
                          type: "object"
                          properties: 
                            acuteMedications: 
                              type: "array"
                              description: "Array of acuteMedications"
                              items: 
                                type: "object"
                                properties: 
                                  date: 
                                    type: "string"
                                    format: "date-time"
                                    description: "The date/time of the item."
                                  lineItems: 
                                    type: "array"
                                    description: "An array of line items."
                                    items: 
                                      type: "object"
                                      properties: 
                                        text: 
                                          type: "string"
                                          description: "When the record was entered."
                                        lineItems: 
                                          type: "array"
                                          description: "An array of line items"
                                          items: 
                                            type: "string"
                            currentRepeatMedications: 
                              type: "array"
                              description: "Array of acuteMedications"
                              items: 
                                type: "object"
                                properties: 
                                  date: 
                                    type: "string"
                                    format: "date-time"
                                    description: "The date/time of the item."
                                  lineItems: 
                                    type: "array"
                                    description: "An array of line items."
                                    items: 
                                      type: "object"
                                      properties: 
                                        text: 
                                          type: "string"
                                          description: "When the record was entered."
                                        lineItems: 
                                          type: "array"
                                          description: "An array of line items"
                                          items: 
                                            type: "string"
                            discontinuedRepeatMedications: 
                              type: "array"
                              description: "Array of acuteMedications"
                              items: 
                                type: "object"
                                properties: 
                                  date: 
                                    type: "string"
                                    format: "date-time"
                                    description: "The date/time of the item."
                                  lineItems: 
                                    type: "array"
                                    description: "An array of line items."
                                    items: 
                                      type: "object"
                                      properties: 
                                        text: 
                                          type: "string"
                                          description: "When the record was entered."
                                        lineItems: 
                                          type: "array"
