                        data: 
                          type: "object"
                          properties: 
                            problems: 
                              type: "array"
                              description: "Array of problems"
                              items: 
                                type: "object"
                                properties: 
                                  effectiveDate: 
                                    type: "string"
                                    format: "date-time"
                                    description: "date/time value."
                                  eventLocationAndDoneBy: 
                                    type: "string"
                                    description: "Event location and done by"
                                  eventItems: 
                                    type: "array"
                                    description: "Array of event items"
                                    items: 
                                      type: "string"
                    consultations: 
                      type: "object"
                      properties: 
                        hasAccess: 
                          type: "boolean"
                          description: "Does the patient have access to this data."
                        hasErrored: 
                          type: "boolean"
                          description: "Some error occurred when attempting to retrieve this error."
                        data: 
                          type: "object"
                          properties: 
                            problems: 
                              type: "array"
                              description: "Array of problems"
                              items: 
                                type: "object"
                                properties: 
                                  effectiveDate: 
                                    type: "object"
                                    properties: 
                                      value: 
                                        type: "string"
                                        format: "date-time"
                                        description: "date/time value."
                                      datePart: 
                                        type: "string"
                                        description: "date part to display."
                                        enum: 
                                          - "Unknown"
                                          - "Year"
                                          - "YearMonth"
                                          - "YearMonthDay"
                                          - "YearMonthDayTime"
                                  consultantLocation: 
                                    type: "string"
                                    description: "Consultant Location and Name"
                                  consultationHeaders: 
                                    type: "array"
                                    description: "An array of consultationHeader."
                                    items: 
                                      type: "object"
                                      properties: 
                                        header: 
                                          type: "string"
                                          description: "Consultation Header"
                                        observationsWithTerm: 
                                          type: "array"
                                          description: "An array of observations."
                                          items: 
