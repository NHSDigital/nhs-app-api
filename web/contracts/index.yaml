---
  openapi: "3.0.2"
  info: 
    version: "0.0.9"
    title: "NHS App API"
    description: "This is the API for the NHS App."
  paths: 
    /v1/configuration: 
      get: 
        tags: 
          - "configuration"
        summary: "Gets a collection of configuration values."
        description: "Gets a collection of configuration values."
        parameters: 
          - 
            in: "query"
            name: "deviceName"
            required: true
            description: "name of the device (android or ios)"
            schema: 
              type: "string"
              format: "string"
          - 
            in: "query"
            name: "nativeAppVersion"
            required: true
            description: "version number of the NHS App installed on the device"
            schema: 
              type: "string"
              format: "string"
        responses: 
          200: 
            description: "Returns configuration for the app."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  properties: 
                    isDeviceSupported: 
                      type: "boolean"
                      description: "Returns true if the version of NHS App installed on device is supported, otherwise false."
                    fidoServerUrl: 
                      type: "string"
                      description: "Returns the URL of the FIDO server for the given environment."
          400: 
            description: "Either the device name was not provided or the device version number was not in the correct format."
          500: 
            description: "An unexpected error occurred processing the request."
    /v2/configuration: 
      get: 
        tags: 
          - "configuration"
        summary: "Gets a collection of configuration values."
        description: "Gets a collection of configuration values."
        responses: 
          200: 
            description: "Returns configuration for the app."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  properties: 
                    minimumSupportedAndroidVersion: 
                      type: "string"
                      description: "Returns the minimum version of NHS App that is supported by Android."
                    minimumSupportediOSVersion: 
                      type: "string"
                      description: "Returns the minimum version of NHS App that is supported by iOS."
                    fidoServerUrl: 
                      type: "string"
                      description: "Returns the URL of the FIDO server for the given environment."
                    knownServices: 
                      type: "array"
                      description: "Returns a list of know services for the NHS App."
                      items: 
                        type: "object"
                        properties: 
                          id: 
                            type: "string"
                          url: 
                            type: "string"
                          javaScriptInteractionMode: 
                            type: "string"
                            enum: 
                              - "None"
                              - "NhsApp"
                              - "NhsLogin"
                              - "SilverThirdParty"
                          menuTab: 
                            type: "string"
                            enum: 
                              - "None"
                              - "Symptoms"
                              - "Appointments"
                              - "Prescriptions"
                              - "MyRecord"
                              - "More"
                          integrationLevel: 
                            type: "string"
                            enum: 
                              - "Gold"
                              - "GoldOverlay"
                              - "GoldWithNoHeaders"
                              - "SilverWithoutWebNavigation"
                              - "SilverWithWebNavigation"
                              - "Bronze"
                          showSpinner: 
                            type: "boolean"
                          showThirdPartyWarning: 
                            type: "boolean"
                          requiresAssertedLoginIdentity: 
                            type: "boolean"
                          validateSession: 
                            type: "boolean"
                          subServices: 
                            type: "array"
                            items: 
                              type: "object"
                              properties: 
                                path: 
                                  type: "string"
                                queryString: 
                                  type: "string"
                                javaScriptInteractionMode: 
                                  type: "string"
                                  enum: 
                                    - "None"
                                    - "NhsApp"
                                    - "NhsLogin"
                                    - "SilverThirdParty"
                                menuTab: 
                                  type: "string"
                                  enum: 
                                    - "None"
                                    - "Symptoms"
                                    - "Appointments"
                                    - "Prescriptions"
                                    - "MyRecord"
                                    - "More"
                                integrationLevel: 
                                  type: "string"
                                  enum: 
                                    - "Gold"
                                    - "GoldOverlay"
                                    - "GoldWithNoHeaders"
                                    - "SilverWithoutWebNavigation"
                                    - "SilverWithWebNavigation"
                                    - "Bronze"
                                showSpinner: 
                                  type: "boolean"
                                showThirdPartyWarning: 
                                  type: "boolean"
                                requiresAssertedLoginIdentity: 
                                  type: "boolean"
                                validateSession: 
                                  type: "boolean"
          400: 
            description: "Either the device name was not provided or the device version number was not in the correct format."
          500: 
            description: "An unexpected error occurred processing the request."
    /v1/odscodelookup: 
      get: 
        tags: 
          - "odscodelookup"
        summary: "Gets a boolean value to indicate if gp practice is participating in public beta"
        description: "Gets a boolean value to indicate if gp practice is participating in public beta"
        parameters: 
          - 
            in: "query"
            name: "odsCode"
            required: true
            description: "ods code of gp practice"
            schema: 
              type: "string"
              format: "string"
        responses: 
          200: 
            description: "Returns ods code lookup result for the practice"
            content: 
              application/json: 
                schema: 
                  type: "object"
                  properties: 
                    isGPPracticeSupported: 
                      type: "boolean"
                      description: "Returns true if the GP Practice is participating"
          400: 
            description: "the ods code was not provided"
          500: 
            description: "An unexpected error occurred processing the request."
    /v1/patient/appointments: 
      delete: 
        tags: 
          - "appointments"
        summary: "Cancels an upcoming appointment for the logged on user."
        description: "Cancels a specified appointment for the logged on user. Requires NHSO-Session-Id cookie (obtained from session endpoint)."
        requestBody: 
          x-name: "AppointmentCancelRequest"
          description: "Details of the appointment to be cancelled, along with reason for the booking being cancelled."
          required: true
          content: 
            application/json: 
              schema: 
                type: "object"
                required: 
                  - "appointmentId"
                properties: 
                  appointmentId: 
                    type: "string"
                    description: "Identifier of the appointment to be cancelled."
                    minLength: 1
                  cancellationReasonId: 
                    type: "string"
                    description: "Identifier of the reason for the appointment being cancelled. Array of valid cancellation reasons is returned when requesting a user's current appointments."
                  slotType: 
                    type: "string"
                    description: "Type of appointment slot, e.g. \"Baby Clinics\"."
                  sessionName: 
                    type: "string"
                    description: "Appointment session name, e.g. \"Dr Julia Godis Morning Appts\"."
        responses: 
          204: 
            description: "Successfully cancelled the specified appointment."
          400: 
            description: "Bad request. Supplied request is incomplete or invalid."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          401: 
            description: "User session has expired."
          403: 
            description: "The patient does not have the necessary permissions within the GP system."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          409: 
            description: "The specified appointment does not exist or is not in a suitable state to be cancelled."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          461: 
            description: "It is too late to cancel this appointment."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          500: 
            description: "An unexpected error occurred during the processing of the request."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          502: 
            description: "Bad response received from upstream system."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          504: 
            description: "Timeout when calling upstream system."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
      get: 
        tags: 
          - "appointments"
        summary: "Gets a list of existing appointments for the logged on user."
        description: "Returns list of booked appointments for the logged on user, and associated metadata including list of cancellation reasons that can be used to cancel upcoming appointments. Requires NHSO-Session-Id cookie (obtained from session endpoint)."
        responses: 
          200: 
            description: "Returns list of booked appointments and associated meta data. Returns empty collection of appointments if GP system does not return a list of appointmetns."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  properties: 
                    upcomingAppointments: 
                      type: "array"
                      description: "Array of booked upcoming Appointments."
                      items: 
                        type: "object"
                        properties: 
                          id: 
                            type: "string"
                            description: "Appointment Identifier."
                          type: 
                            type: "string"
                            description: "Type of appointment slot, e.g. \"Baby Clinics\"."
                          sessionName: 
                            type: "string"
                            description: "Appointment session name, e.g. \"Dr Julia Godis Morning Appts\"."
                          startTime: 
                            type: "string"
                            format: "date-time"
                            description: "Appointment Start Date Time."
                          endTime: 
                            type: "string"
                            format: "date-time"
                            description: "Appointment End Date Time."
                          location: 
                            type: "string"
                            description: "Physical location of the appointment."
                          clinicians: 
                            type: "array"
                            description: "Array of Clinicians, accounts for joint sessions."
                            items: 
                              type: "string"
                          disableCancellation: 
                            type: "boolean"
                            description: "Indicates the appointment cannot be cancelled."
                          channel: 
                            type: "string"
                            enum: 
                              - "Unknown"
                              - "Telephone"
                            description: "Indicates Slot or Appointment channel type supplied by GP practice"
                          telephoneNumber: 
                            type: "string"
                            description: "patients telephone number"
                    pastAppointments: 
                      type: "array"
                      description: "Array of past Appointments."
                      items: 
                        type: "object"
                        properties: 
                          id: 
                            type: "string"
                            description: "Appointment Identifier."
                          type: 
                            type: "string"
                            description: "Type of appointment slot, e.g. \"Baby Clinics\"."
                          sessionName: 
                            type: "string"
                            description: "Appointment session name, e.g. \"Dr Julia Godis Morning Appts\"."
                          startTime: 
                            type: "string"
                            format: "date-time"
                            description: "Appointment Start Date Time."
                          endTime: 
                            type: "string"
                            format: "date-time"
                            description: "Appointment End Date Time."
                          location: 
                            type: "string"
                            description: "Physical location of the appointment."
                          clinicians: 
                            type: "array"
                            description: "Array of Clinicians, accounts for joint sessions."
                            items: 
                              type: "string"
                          channel: 
                            type: "string"
                            enum: 
                              - "Unknown"
                              - "Telephone"
                            description: "Indicates Slot or Appointment channel type supplied by GP practice"
                          telephoneNumber: 
                            type: "string"
                            description: "patients telephone number"
                    cancellationReasons: 
                      type: "array"
                      description: "Array of Cancellation Reasons."
                      items: 
                        type: "object"
                        properties: 
                          id: 
                            type: "string"
                            description: "Cancellation Reason Identifier."
                          displayName: 
                            type: "string"
                            description: "Cancellation Reason Description."
                    disableCancellation: 
                      type: "boolean"
                      description: "Indicates whether appointment cancellation is disabled."
                    pastAppointmentsEnabled: 
                      type: "boolean"
                      description: "Indicates whether past appointments are enabled."
          400: 
            description: "Bad request. A querystring parameter is not in the expected format."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          401: 
            description: "User session has expired."
          403: 
            description: "The patient does not have the necessary permissions within the GP system."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          500: 
            description: "An unexpected error occurred processing the request."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          502: 
            description: "Bad response received from upstream system."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          504: 
            description: "Timeout when calling upstream system."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
      post: 
        tags: 
          - "appointments"
        summary: "Creates a GP Appointment for the logged on user."
        description: "Books an appointment slot for the logged on user, given a slot identifier. Identifiers of available slots can be obtained using the appointment-slots endpoint. Requires NHSO-Session-Id cookie (obtained from session endpoint)."
        requestBody: 
          x-name: "AppointmentBookRequest"
          content: 
            application/json: 
              schema: 
                type: "object"
                required: 
                  - "slotId"
                  - "bookingReason"
                properties: 
                  slotId: 
                    type: "string"
                    description: "Identifier of appointment slot to be booked."
                    minLength: 1
                  bookingReason: 
                    type: "string"
                    description: "Reason for booking appointment. e.g. symptoms being experienced by the patient."
                    minLength: 1
                    maxLength: 150
                  startTime: 
                    type: "string"
                    format: "date-time"
                    description: "Appointment Start Date Time."
                  endTime: 
                    type: "string"
                    format: "date-time"
                    description: "Appointment End Date Time."
                  telephoneNumber: 
                    type: "string"
                    description: "Patient's phone number for telephone appointment."
                  slotType: 
                    type: "string"
                    description: "Type of appointment slot, e.g. \"Baby Clinics\"."
                  sessionName: 
                    type: "string"
                    description: "Appointment session name, e.g. \"Dr Julia Godis Morning Appts\"."
          description: "Details of the appointment slot to be booked, along with reasons for the booking being made."
          required: true
        responses: 
          201: 
            description: "Appointment successfully created."
          400: 
            description: "Bad request. Supplied request is incomplete or invalid."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          401: 
            description: "User session has expired."
          403: 
            description: "The patient does not have the necessary permissions within the GP system."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          409: 
            description: "Conflict. The chosen appointment slot is not available for booking."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          460: 
            description: "The patient has reached the limit of pending appointments that may be booked."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          500: 
            description: "An unexpected error occurred processing the request."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          502: 
            description: "Bad response received from upstream system."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          504: 
            description: "Timeout when calling upstream system."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
    /v1/patient/appointment-slots: 
      get: 
        tags: 
          - "appointment-slots"
        summary: "Gets a list of available appointments for the logged on user."
        description: "Returns lists of clinicians, appointment sessions, locations and available appointment slots for the logged in user. Requires NHSO-Session-Id cookie (obtained from session endpoint)."
        responses: 
          200: 
            description: "Returns list of available slots and associated meta data. Returns empty collection of slots if GP system does not return a list of available slots."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  properties: 
                    telephoneNumbers: 
                      type: "array"
                      description: "Patient's telephone numbers."
                      items: 
                        type: "object"
                        properties: 
                          telephoneNumber: 
                            type: "string"
                            description: "Patient's telephone number."
                    guidanceMessage: 
                      type: "string"
                      description: "Guidance message from GP practice explaining which appointment slot to book."
                    bookingReasonNecessity: 
                      description: "Indicates whether the patient can supply a booking reason when making an appointment."
                      type: "string"
                      enum: 
                        - "NotAllowed"
                        - "Optional"
                        - "Mandatory"
                    slots: 
                      type: "array"
                      description: "Available Appointment Slots."
                      items: 
                        type: "object"
                        properties: 
                          id: 
                            type: "string"
                            description: "Slot Identifier."
                          type: 
                            type: "string"
                            description: "Type of appointment slot, e.g. \"Baby Clinics\"."
                          sessionName: 
                            type: "string"
                            description: "Appointment session name, e.g. \"Dr Julia Godis Morning Appts\"."
                          startTime: 
                            type: "string"
                            format: "date-time"
                            description: "Appointment Slot Start Date Time."
                          endTime: 
                            type: "string"
                            format: "date-time"
                            description: "Appointment Slot End Date Time."
                          location: 
                            type: "string"
                            description: "Location of the appointment slot"
                          clinicians: 
                            type: "array"
                            description: "Array of Clinicians, accounts for joint sessions."
                            items: 
                              type: "string"
                          channel: 
                            type: "string"
                            enum: 
                              - "Unknown"
                              - "Telephone"
                            description: "Indicates Slot or Appointment channel type supplied by GP practice"
          401: 
            description: "User session has expired."
          403: 
            description: "The patient does not have the necessary permissions within the GP system."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          500: 
            description: "An unexpected error occurred processing the request."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          502: 
            description: "Bad response received from upstream system."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          504: 
            description: "Timeout when calling upstream system."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
    /v1/patient/courses: 
      get: 
        tags: 
          - "courses"
        summary: "Gets a list of prescriptions courses for the given patient."
        description: "Returns a list of prescriptions courses for the logged in user. Requires NHSO-Session-Id cookie in header from session endpoint."
        responses: 
          200: 
            description: "Returns list of courses and associated meta data. Returns empty collection of courses if GP system does not return a list of courses."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  properties: 
                    courses: 
                      type: "array"
                      description: "An array of prescription courses"
                      items: 
                        type: "object"
                        properties: 
                          id: 
                            type: "string"
                            description: "Course identifier."
                          name: 
                            type: "string"
                            description: "Course name."
                          details: 
                            type: "string"
                            description: "Details of the course. Depending on the provider this may contain different information like dosage, quantity and status."
                    specialRequestNecessity: 
                      description: "Indicates whether the patient can supply a special request when ordering a prescription."
                      type: "string"
                      enum: 
                        - "NotAllowed"
                        - "Optional"
                        - "Mandatory"
          401: 
            description: "User session missing or expired."
          403: 
            description: "The patient does not have the necessary permissions within the GP system."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  description: "Error response from backend api."
                  properties: 
                    errorCode: 
                      type: "integer"
                      description: "Error code"
                    errorMessage: 
                      type: "string"
                      description: "Error message"
                    serviceDeskReference: 
                      type: "string"
                      description: "Six character service desk reference code."
          500: 
