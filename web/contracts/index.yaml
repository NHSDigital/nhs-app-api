                                          items: 
                                            type: "string"
                    immunisations: 
                      type: "object"
                      properties: 
                        hasAccess: 
                          type: "boolean"
                          description: "Does the patient have access to this data."
                        hasErrored: 
                          type: "boolean"
                          description: "Some error occurred when attempting to retrieve this error."
                        data: 
                          type: "object"
                          properties: 
                            immunisations: 
                              type: "array"
