    /v1/patient/terms-and-conditions/consent: 
      get: 
        tags: 
          - "termsAndConditions"
        summary: "Gets the patient consent for the logged on user."
        description: "Returns the most recent patient consent for the logged in user. Requires NHSO-Session-Id cookie (obtained from session endpoint)."
        responses: 
          200: 
            description: "Returns patient consent data for the logged in user."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  required: 
                    - "consentGiven"
                  properties: 
                    updatedConsentRequired: 
                      type: "boolean"
                      description: "Flag indicating whether the terms and conditions have changed since last consent"
                    consentGiven: 
                      type: "boolean"
                      description: "Flag indicating whether the user has consented to the terms and conditions"
                    analyticsCookieAccepted: 
                      type: "boolean"
                      description: "Flag indicating whether the user has consented to the use of analytics"
          500: 
            description: "An unexpected error occurred processing the request."
      post: 
        tags: 
          - "termsAndConditions"
        summary: "Records patient consent and date of consent"
        description: "Records whether the logged in user has given their consent to use the app and date and time of consent"
        requestBody: 
          content: 
            application/json: 
              schema: 
                type: "object"
                required: 
                  - "consentGiven"
                  - "analyticsCookieAccepted"
                properties: 
                  consentGiven: 
                    type: "boolean"
                    description: "Flag indicating whether the user has consented to the terms and conditions"
                  analyticsCookieAccepted: 
                    type: "boolean"
                    description: "Flag indicating whether the user has consented to the use of analytics"
                  updatingConsent: 
                    type: "boolean"
                    description: "Flag indicating whether the user is consenting to updated terms and conditions"
          description: "Object indicating whether consent has been granted, and the date the request was made."
          required: true
          x-name: "ConsentRequest"
        responses: 
          201: 
            description: "Appointment successfully created."
          500: 
            description: "An unexpected error occurred processing the request."
