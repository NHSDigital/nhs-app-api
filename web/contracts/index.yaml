      post: 
        tags: 
          - "asserted-login-identity"
          - "single-sign-on"
        summary: "Creates an asserted login identity javacript web token for the logged-in user."
        description: "Creates and returns an asserted login identity javascript web token for the logged-in users. This can be used for the purpose of single sign-on into other NHS Login relying parties. Requires NHSO-Session-Id cookie in header from the Session endpoint."
        requestBody: 
          x-name: "AssertedLoginIdentityRequest"
          content: 
            application/json: 
              schema: 
                type: "object"
                required: 
                  - "intendedRelyingPartyUrl"
                properties: 
                  intendedRelyingPartyUrl: 
                    type: "string"
                    description: "URL of the intended relying party that the asserted login identity will be used to access."
                  providerId: 
                    type: "string"
                    description: "ID of the silver integration third party, e.g. 'pkb', 'ers'."
                  providerName: 
                    type: "string"
                    description: "Name of the silver integration third party, e.g. 'Patient Knows Best'."
                  jumpOffId: 
                    type: "string"
                    description: "ID of the silver integration jump-off point, e.g. 'appointments', 'sharedLinks'"
                  action: 
                    type: "string"
                    description: "Logical action being performed for metric logging"
                    enum: 
                      - "UpliftStarted"
          description: "Creates an asserted login identity javascript web token for the logged-in user."
          required: true
        responses: 
          201: 
            description: "Asserted login identity Jwt successfully created."
            content: 
              application/json: 
                schema: 
                  type: "object"
                  properties: 
                    token: 
                      type: "string"
                      description: "Signed Jwt."
          500: 
            description: "An unexpected error occurred processing the request."
