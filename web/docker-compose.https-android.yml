version: "3.2"
services:
  nhsonline.reverse-https-proxy:
    image: nginx:alpine
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ~/.nhsonline/local-development-certificate:/etc/ssl
    ports:
      - "443:443"
      - "444:444"
    depends_on:
      - nhsonline.web
      - nhsonline.backend.worker
  nhsonline.web:
    environment:
      - API_HOST=http://10.0.2.2:8082
      - CID_REDIRECT_URI=http://10.0.2.2:3000/auth-return
      - NATIVE_CID_REDIRECT_URI=http://10.0.2.2:3000/auth-return
  nhsonline.backend.worker:
    environment:
      - NHS_WEB_APP_BASE_URL=http://10.0.2.2:3000/
      - STUB_TERMS_AND_CONDITIONS=true

