<!DOCTYPE html>
<html>
<head>
  <!-- Needed for proper scaling on hi-res devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, minimum-scale=1.0, user-scalable=0">
  <meta charset="utf-8">
  <meta name="commit_id" content="<%= process.env.VUE_APP_COMMIT_ID %>">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    .blue-body { 
      background-color: rgb(0, 94, 184);
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
    }
    .logo {
      display: block;
      margin-left: auto;
      margin-right: auto;
      width: 28%;
      padding-top: 27%;
    }
    .loading-spinner-background {
      position: fixed;
      z-index: 10;
      top: 0em;
      right: 0em;
      left: 0em;
      bottom: 0em;
      margin: auto;
      width: 60px;
      height: 60px;
      background-color: rgba(255, 255, 255, 0.8);
      border-radius: 40px;
      padding: 0 !important;
      -webkit-border-radius: 40px;
      -moz-border-radius: 40px;
    }

    .loading-spinner {
      border-radius: 40px;
      -webkit-border-radius: 40px;
      -moz-border-radius: 40px;
      width: 50px;
      height: 50px;
      border-top: 0.3em solid rgba(0, 94, 184, 1);
      border-right: 0.3em solid rgba(0, 94, 184, 1);
      border-bottom: 0.3em solid rgba(0, 94, 184, 1);
      border-left: 0.3em solid rgba(0, 94, 184, 0);
      animation: spinner-animation 1.5s infinite linear;
      background-color: rgba(255, 255, 255, 0);
      display: inline-block;
      margin: 5px;
    }
    @keyframes spinner-animation {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="app">
