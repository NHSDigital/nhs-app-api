<!DOCTYPE html>
<html>
<head>
  <!-- Needed for proper scaling on hi-res devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, minimum-scale=1.0, user-scalable=0">
  <meta charset="utf-8">
  <meta name="commit_id" content="<%= process.env.VUE_APP_COMMIT_ID %>">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    .loading-spinner-background {
      position: fixed;
      z-index: 10;
      top: 0em;
      right: 0em;
      left: 0em;
      bottom: 0em;
      margin: auto;
      width: 60px;
      height: 60px;
      background-color: rgba(255, 255, 255, 0.8);
      border-radius: 40px;
      padding: 0 !important;
      -webkit-border-radius: 40px;
      -moz-border-radius: 40px;
    }
    .loading-spinner {
      border-radius: 40px;
      -webkit-border-radius: 40px;
      -moz-border-radius: 40px;
      width: 50px;
      height: 50px;
      border-top: 0.3em solid rgba(0, 94, 184, 1);
      border-right: 0.3em solid rgba(0, 94, 184, 1);
      border-bottom: 0.3em solid rgba(0, 94, 184, 1);
      border-left: 0.3em solid rgba(0, 94, 184, 0);
      animation: spinner-animation 1.5s infinite linear;
      background-color: rgba(255, 255, 255, 0);
      display: inline-block;
      margin: 5px;
    }
    @keyframes spinner-animation {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
    @font-face {
      font-display: swap;
      font-family: Frutiger W01;
      font-style: normal;
      font-weight: 400;
      src: url(https://assets.nhs.uk/fonts/FrutigerLTW01-55Roman.eot?#iefix);
      src: url(https://assets.nhs.uk/fonts/FrutigerLTW01-55Roman.eot?#iefix) format("eot"),url(https://assets.nhs.uk/fonts/FrutigerLTW01-55Roman.woff2) format("woff2"),url(https://assets.nhs.uk/fonts/FrutigerLTW01-55Roman.woff) format("woff"),url(https://assets.nhs.uk/fonts/FrutigerLTW01-55Roman.ttf) format("truetype"),url(https://assets.nhs.uk/fonts/FrutigerLTW01-55Roman.svg#7def0e34-f28d-434f-b2ec-472bde847115) format("svg")
    }
    .warning-nojs-content-panel {
      position: fixed;
      text-align: center;
      font-family:'Frutiger W01',Arial,sans-serif;
      font-size: 19px;
      font-weight: 400;
      height: 10em;
      top: 20em;
      right: 0em;
      left: 0em;
      bottom: 5em;
      margin: auto;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="app-container" >
      <script>
        if (!window.location.href.includes('on-demand-gp-return')) {
          document.getElementById('app-container').classList.add('grey-body');
        }
      </script>
      <div class="loading-spinner-background" tabindex="-1" focusable="false">
        <div class="loading-spinner" tabindex="-1" focusable="false"></div>
      </div>
      <div class="warning-nojs-content-panel">
        <noscript>
          <p class="nhsuk-body"> You need to
            <a class="nhsuk-link" href="https://www.nhs.uk/nhs-app/nhs-app-help-and-support/nhs-app-technical-information/technical-issues-with-the-nhs-app/" target="_blank" rel="noopener noreferrer" aria-label="You need to enable JavaScript to access the NHS App on your browser">enable JavaScript to access the NHS App on your browser</a>
          </p>
        </noscript>
      </div>
    </div>
  </div>
</body>
</html>
