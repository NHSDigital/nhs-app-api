<!DOCTYPE html>
<html class='grey'>
<head>
  <!-- Needed for proper scaling on hi-res devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, minimum-scale=1.0, user-scalable=0">
  <meta charset="utf-8">
  <meta name="commit_id" content="<%= process.env.VUE_APP_COMMIT_ID %>">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    .grey-body {
      background-color: rgba(255, 255, 255, 0.8);
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
    }
    .grey {
      background-color: #F0F4F5 !important;
    }
    .loading-spinner-background {
      position: fixed;
      z-index: 10;
      top: 0em;
      right: 0em;
      left: 0em;
      bottom: 0em;
      margin: auto;
      width: 60px;
      height: 60px;
      background-color: rgba(255, 255, 255, 0.8);
      border-radius: 40px;
      padding: 0 !important;
      -webkit-border-radius: 40px;
      -moz-border-radius: 40px;
    }
    .loading-spinner {
      border-radius: 40px;
      -webkit-border-radius: 40px;
      -moz-border-radius: 40px;
      width: 50px;
      height: 50px;
      border-top: 0.3em solid rgba(0, 94, 184, 1);
      border-right: 0.3em solid rgba(0, 94, 184, 1);
      border-bottom: 0.3em solid rgba(0, 94, 184, 1);
      border-left: 0.3em solid rgba(0, 94, 184, 0);
      animation: spinner-animation 1.5s infinite linear;
      background-color: rgba(255, 255, 255, 0);
      display: inline-block;
      margin: 5px;
    }
    @keyframes spinner-animation {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
    @font-face {
      font-family: "FrutigerLTW01-45Light";
      font-display: optional;
      src: local("FrutigerLTW01-45Light"),
          url("/fonts/FrutigerLTW01-45Light.eot"),
          url("/fonts/FrutigerLTW01-45Light.eot") format("embedded-opentype"),
          url("/fonts/FrutigerLTW01-45Light.woff2") format("woff2"),
          url("/fonts/FrutigerLTW01-45Light.woff") format("woff"),
          url("/fonts/FrutigerLTW01-45Light.ttf") format("truetype"),
          url("/fonts/FrutigerLTW01-45Light.svg") format("svg");
    }
    .warning-nojs-content-panel {
      position: fixed;
      text-align: center;
      font-family:'FrutigerLTW01-45Light',Arial,sans-serif;
      font-size: 0.9em;
      color: white;
      width: 250px;
      height: 10em;
      top: 20em;
      right: 0em;
      left: 0em;
      bottom: 5em;
      margin: auto;
    }
    .nojs-link {
      color: white;
      outline-color: white;
      text-decoration: underline;
      display: inline;
      vertical-align: middle;
    }
    #nojs-alink {
      color: white;
    }
    .inline-nojs-link-valign {
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="app-container" >
      <script>
        if (!window.location.href.includes('on-demand-gp-return')) {
          document.getElementById('app-container').classList.add('grey-body');
        }
      </script>
      <div class="loading-spinner-background" tabindex="-1" focusable="false">
        <div class="loading-spinner" tabindex="-1" focusable="false"></div>
      </div>
      <div class="warning-nojs-content-panel">
        <noscript>
          <p>
            <div aria-label="You need to enable JavaScript to access the NHS App on your browser, link">
              <span class="inline-nojs-link-valign"> You need to </span><a id="nojs-alink" class="nojs-link" href="https://www.nhs.uk/nhs-app/nhs-app-help-and-support/nhs-app-technical-information/technical-issues-with-the-nhs-app/" target="_blank" rel="noopener noreferrer">enable JavaScript to access the NHS App on your browser</a>
            </div>
          </p>
        </noscript>
      </div>
    </div>
  </div>
</body>
</html>
