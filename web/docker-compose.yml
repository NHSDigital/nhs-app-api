version: "3.2"
services:
  nhsonline.mongodb:
    image: mongo:latest
    ports:
    - "27017:27017"
  api.local.bitraft.io:
    image: nginx:alpine
    volumes:
      - ./nginx:/etc/nginx/conf.d
    ports:
      - "8089:8089"
    depends_on:
      - pfs.local.bitraft.io
      - users.local.bitraft.io
      - userinfo.local.bitraft.io
      - messages.local.bitraft.io
      - log.local.bitraft.io
  web.local.bitraft.io:
    image: nhsonline.web
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - URI_FORMAT_API_CLIENT=http://api{host}:8089
      - API_HOST_SERVER=http://api.local.bitraft.io:8089
      - URI_FORMAT_CID_REDIRECT_WEB=http://web{host}:3000/auth-return
      - URI_FORMAT_CID_REDIRECT_NATIVE=nhsapp://10.0.2.2:3000/auth-return
      - GP_LOOKUP_API_KEY=
      - GP_LOOKUP_API_URL=https://nhsuk-apim-int-uks.azure-api.net/service-search/search?api-version=1
      - GP_LOOKUP_API_RESULTS_LIMIT=20
      - POSTCODE_LOOKUP_API_URL=https://nhsuk-apim-int-uks.azure-api.net/service-search/postcodesandplaces/search?api-version=1
      - POSTCODE_LOOKUP_SEARCH_RADIUS_KM=10
      - GP_LOOKUP_BROTHER_MAILER_URL=
      - GP_LOOKUP_BROTHER_MAILER_ADDRESSBOOK_ID=6113
      - GP_LOOKUP_BROTHER_MAILER_USER_ID=233847
      - GP_LOOKUP_BROTHER_MAILER_SIG=SIG340c7799670a244e283c2d568d8b9031f7cdee374315bb20c1e8c109c535c4c7
      - THROTTLING_ENABLED
      - VERSION_TAG=dev_web_docker_main
      - ORGAN_DONATION_INTEGRATION_ENABLED=false
      - MY_RECORD_DOCUMENTS_ENABLED=false
  pfs.local.bitraft.io:
    image: nhsonline.backend.pfsapi
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://*:8082
      - PORT=8082
      - CORS_AUTHORITY=*
      - TPP_CERTIFICATE_PATH=./certs/TppNhsTest.pfx
      - TPP_CERTIFICATE_PASSWORD
      - VISION_CERT_PATH=./certs/vps_nhson001.pfx
      - VISION_CERT_PASSPHRASE
      - VISION_SENDER_USERNAME=Username123123asdas
      - VISION_SENDER_USERFULLNAME=Name
      - VISION_SENDER_USERIDENTITY=65489761321654
      - VISION_SENDER_USERROLE=ROSU
      - EMIS_CERTIFICATE_PATH=
      - ConfigurationSettings__CookieDomain=.bitraft.io
      - DATA_PREFERENCES_URL=http://ndopapp-int1.thunderbird.service.nhs.uk/createsession
      - NDOP_CERTIFICATE_PASSWORD
      - NDOP_CERTIFICATE_PATH=./certs/ndopJwtTest.pfx
      - NDOP_CLAIM_AUDIENCE=https://ndopapp-int1.thunderbird.service.nhs.uk
      - ORGAN_DONATION_BASE_URL=https://nhsbt-apim-dev01.azure-api.net/uat3/odr/v1/
      - ORGAN_DONATION_CERT_PATH=./certs/OrganDonation.pfx
      - ORGAN_DONATION_INTEGRATION_ENABLED=false
      - ORGAN_DONATION_REFERENCE_DATA_EXPIRY_SECONDS=86400
      - NDOP_CLAIM_ISSUER=https://www-preview.devuks1.nonlive.nhsapp.service.nhs.uk
      - STUB_TERMS_AND_CONDITIONS=true
      - SESSION_MONGO_DATABASE_HOST=nhsonline.mongodb
      - SESSION_MONGO_DATABASE_PORT=27017
      - SESSION_MONGO_DATABASE_USERNAME=
      - SESSION_MONGO_DATABASE_PASSWORD=
      - USERINFO_API_BASE_URL=http://userinfo.local.bitraft.io:8091/v1/api/me/info
      - CITIZEN_ID_JWT_ISSUER=https://auth.ext.signin.nhs.uk
    ports:
      - "8082:8082"
  cid.local.bitraft.io:
    image: nhsonline.backend.cidapi
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://*:8084
      - PORT=8084
      - CORS_AUTHORITY=*
      - TPP_CERTIFICATE_PATH=./certs/TppNhsTest.pfx
      - TPP_CERTIFICATE_PASSWORD
      - VISION_CERT_PATH=./certs/vps_nhson001.pfx
      - VISION_CERT_PASSPHRASE
      - ConfigurationSettings__CookieDomain=.bitraft.io
      - SESSION_MONGO_DATABASE_HOST=nhsonline.mongodb
      - SESSION_MONGO_DATABASE_PORT=27017
      - SESSION_MONGO_DATABASE_USERNAME=
      - SESSION_MONGO_DATABASE_PASSWORD=
    ports:
      - "8084:8084"
  servicejourneyrulesapi.config:
    image: nhsonline-service-journey-dev-config
    volumes:
      - 'servicejourneyrules_data:/output'
  servicejourneyrulesapi.local.bitraft.io:
    image: nhsonline.backend.servicejourneyrulesapi
    ports:
      - "8086:8086"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://*:8086
      - PORT=8086
      - CORS_AUTHORITY=*
      - VERSION_TAG=servicejourneyrules_docker_main
      - SESSION_MONGO_DATABASE_HOST=nhsonline.mongodb
      - SESSION_MONGO_DATABASE_PORT=27017
      - SESSION_MONGO_DATABASE_USERNAME=
      - SESSION_MONGO_DATABASE_PASSWORD=
      - INPUT_FOLDER_PATH=/app/input
    depends_on:
      - servicejourneyrulesapi.config
    volumes:
      - 'servicejourneyrules_data:/app/input'
  users.local.bitraft.io:
    image: nhsonline.backend.usersapi
    ports:
      - "8083:8083"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://*:8083
      - PORT=8083
      - CORS_AUTHORITY=*
      - VERSION_TAG=users_docker_main
      - USERS_MONGO_DATABASE_HOST=nhsonline.mongodb
      - USERS_MONGO_DATABASE_PORT=27017
      - USERS_MONGO_DATABASE_USERNAME=
      - USERS_MONGO_DATABASE_PASSWORD=
      - AZURE_NOTIFICATION_HUB_PATH=nhsapp-nonlive
      - AZURE_NOTIFICATION_HUB_CONNECTION_STRING=Endpoint=sb://nhsapp-nonlive.servicebus.windows.net/;SharedAccessKeyName=DefaultFullSharedAccessSignature;SharedAccessKey=
      - AZURE_NOTIFICATION_HUB_SHARED_ACCESS_KEY=
  userinfo.local.bitraft.io:
    image: nhsonline.backend.userinfoapi
    ports:
      - "8091:8091"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://*:8091
      - PORT=8091
      - CORS_AUTHORITY=*
      - VERSION_TAG=userinfo_docker_main
      - USERINFO_MONGO_DATABASE_HOST=nhsonline.mongodb
      - USERINFO_MONGO_DATABASE_PORT=27017
      - USERINFO_MONGO_DATABASE_USERNAME=
      - USERINFO_MONGO_DATABASE_PASSWORD=
  messages.local.bitraft.io:
    image: nhsonline.backend.messagesapi
    ports:
      - "8085:8085"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://*:8085
      - PORT=8085
      - CORS_AUTHORITY=*
      - VERSION_TAG=messages_docker_main
      - MESSAGES_MONGO_DATABASE_HOST=nhsonline.mongodb
      - MESSAGES_MONGO_DATABASE_PORT=27017
      - MESSAGES_MONGO_DATABASE_USERNAME=
      - MESSAGES_MONGO_DATABASE_PASSWORD=
  log.local.bitraft.io:
    image: nhsonline.backend.loggerapi
    ports:
      - "8090:8090"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://*:8090
      - PORT=8090
      - CORS_AUTHORITY=*
      - VERSION_TAG=log_docker_main
  mongo_seed:
    image: mongo:latest
    links:
      - nhsonline.mongodb
    command: /bin/bash -c "sleep 5; mongo --host nhsonline.mongodb --eval 'db.session.createIndex({_ts:1},{expireAfterSeconds:60})' development"
    depends_on:
      - nhsonline.mongodb
volumes:
  servicejourneyrules_data:
    driver: local
