version: "3.2"
services:
  web.local.bitraft.io:
    image: nhsonline.web
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - URI_FORMAT_API_CLIENT=http://api{host}:8082
      - API_HOST_SERVER=http://api.local.bitraft.io:8082
      - URI_FORMAT_CID_REDIRECT_WEB=http://web{host}:3000/auth-return
      - URI_FORMAT_CID_REDIRECT_NATIVE=nhsapp://web{host}:3000/auth-return
      - GP_LOOKUP_API_KEY=
      - GP_LOOKUP_API_URL=https://nhsapiint.azure-api.net/service-search/search?api-version=1
      - GP_LOOKUP_API_RESULTS_LIMIT=20
      - THROTTLING_ENABLED=
      - VERSION_TAG=dev_web_docker_main
  api.local.bitraft.io:
    image: nhsonline.backend.worker
    environment:
      - BACKENDWORKER_RUNMODE=pfs
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://*:8082
      - PORT=8082
      - CORS_AUTHORITY=*
      - TPP_CERTIFICATE_PATH=./certs/TppNhsTest.pfx
      - TPP_CERTIFICATE_PASSWORD
      - VISION_CERT_PATH=./certs/vps_nhson001.pfx
      - VISION_CERT_PASSPHRASE
      - VISION_SENDER_USERNAME=Username123123asdas
      - VISION_SENDER_USERFULLNAME=Name
      - VISION_SENDER_USERIDENTITY=65489761321654
      - VISION_SENDER_USERROLE=ROSU
      - EMIS_CERTIFICATE_PATH=
      - ConfigurationSettings__CookieDomain=.bitraft.io
      - DATA_PREFERENCES_URL=http://ndopapp-int1.thunderbird.service.nhs.uk/createsession
      - NDOP_CERTIFICATE_PASSWORD
      - NDOP_CERTIFICATE_PATH=./certs/ndopJwtTest.pfx
      - NDOP_CLAIM_AUDIENCE=https://ndopapp-int1.thunderbird.service.nhs.uk
      - NDOP_CLAIM_ISSUER=https://www-preview.devuks1.nonlive.nhsapp.service.nhs.uk
      - STUB_TERMS_AND_CONDITIONS=true
    depends_on:
      - nhsonline.redis.sds
    ports:
      - "8082:8082"
  cid.local.bitraft.io:
    image: nhsonline.backend.worker
    environment:
      - BACKENDWORKER_RUNMODE=cid
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://*:8084
      - PORT=8084
      - CORS_AUTHORITY=*
      - TPP_CERTIFICATE_PATH=./certs/TppNhsTest.pfx
      - TPP_CERTIFICATE_PASSWORD
      - VISION_CERT_PATH=./certs/vps_nhson001.pfx
      - VISION_CERT_PASSPHRASE
      - ConfigurationSettings__CookieDomain=.bitraft.io
    depends_on:
      - nhsonline.redis.sds
    ports:
      - "8084:8084"
  nhsonline.redis-data.sds:
    image: nhsapp.azurecr.io/nhsonline-redis-data:latest
    environment:
      - MODE=development
      - REDIS_HOST=nhsonline.redis.sds
    depends_on:
      - nhsonline.redis.sds
  nhsonline.redis.sds:
    image: bitnami/redis:4.0.8-r7
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    ports:
      - "6379:6379"
    volumes:
      - 'redis_data:/bitnami/redis'
  nhsonline.redis.session:
    image: bitnami/redis:4.0.8-r7
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    ports:
      - "6380:6379"
volumes:
  redis_data:
    driver: local
