apiVersion: apps/v1beta1
kind: Deployment
metadata:
  name: nhsonline-web
spec:
  replicas: 1
  template:
    metadata:
      labels:
        app: nhsonline-web
    spec:
      containers:
      - name: nhsonline-web
        image: nhsapp.azurecr.io/nhsonline-web:latest
        ports:
        - containerPort: 3000
        env:
        - name: CID_REDIRECT_URI
          value: "https://www-preview.devuks1.bitraft.io/auth-return"
        - name: API_HOST
          value: "https://api-preview.devuks1.bitraft.io"
      imagePullSecrets:
       - name: azure-registry
