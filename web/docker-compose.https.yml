version: "3.2"
services:
  nhsonline.reverse-https-proxy:
    image: nginx:alpine
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ~/.nhsonline/local-development-certificate:/etc/ssl
    ports:
      - "443:443"
      - "444:444"
    depends_on:
      - nhsonline.web
      - nhsonline.backend.worker
  nhsonline.web:
    environment:
      - API_HOST=https://api.local.bitraft.io:444
      - CID_REDIRECT_URI=https://www.local.bitraft.io/auth-return
      - ANDROID_CID_REDIRECT_URI=nhsapp://www.local.bitraft.io/auth-return
  nhsonline.backend.worker:
    environment:
      - NHS_WEB_APP_BASE_URL=https://www.local.bitraft.io/
      - ConfigurationSettings__CookieDomain=.local.bitraft.io
