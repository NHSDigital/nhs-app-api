name: $[format('{0}-{1}', variables['Build.SourceBranchName'], counter(variables['Build.SourceBranchName']))]

trigger:
  branches:
    include:
      - develop
  tags:
    include:
      - v*

pool:
  vmImage: 'ubuntu-latest'

variables:
  docker.registry: nhsapp.azurecr.io
  docker.tag: $[variables['Build.SourceVersion']]
  source.develop: $[eq(variables['Build.SourceBranchName'], 'develop')]
  source.tag: $[startsWith(variables['Build.SourceBranch'], 'refs/tags/')]

stages:
  - template: .azuredevops/templates/initialise-stage.yml

  - stage: build_and_unit_test
    displayName: Build and Unit Test
    dependsOn: init
    jobs:
      - job: web
        displayName: Web
        steps:
          - template: .azuredevops/templates/build-and-test-web-steps.yml

      - job: backend
        displayName: Backend
        steps:
          - template: .azuredevops/templates/build-and-test-backend-steps.yml

      - template: .azuredevops/templates/generate-coverage-report-job.yml

  - stage: android
    displayName: Android Client
    dependsOn: init
    jobs:
      - template: .azuredevops/templates/build-and-test-android-client-job.yml

  - stage: security
    displayName: Security Scans
    dependsOn: build_and_unit_test
    condition: and(succeeded(), or(variables['security.run.scans'], eq(variables['source.develop'], 'True'), eq(variables['source.tag'], 'True')))
    jobs:
      - template: .azuredevops/templates/run-security-scan-job.yml

  - stage: integration_tests
    displayName: Integration Tests
    dependsOn: build_and_unit_test
    jobs:
      - template: .azuredevops/templates/integration-tests-initialise-job.yml

      - job: tranche
        displayName: Tranche
        dependsOn:
          - init
        condition: and(succeeded(), dependencies.init.outputs['matrix.tranches'])
        timeoutInMinutes: 180
        strategy:
          matrix: $[ dependencies.init.outputs['matrix.tranches'] ]
        variables:
          - template: .azuredevops/templates/integration-tests-variables.yml
        steps:
          - template: .azuredevops/templates/integration-tests-steps.yml
