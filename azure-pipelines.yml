name: $[format('{0}-{1}', variables['Build.SourceBranchName'], counter(variables['Build.SourceBranchName']))]

parameters:
  - name: xamarinTarget
    displayName: Xamarin native app target
    type: string
    default: None
    values:
      - None
      - Preview
      - Staging
      - OnboardingSandpit
      - OnboardingAos
      - Production
      - Scratch1
      - Scratch2
      - Scratch3
      - Scratch4
      - Scratch5
      - Scratch6
      - Scratch7
      - Scratch8
      - Scratch9
      - Scratch10
      - Scratch11
      - Scratch12
      - Scratch13
      - Scratch14
      - Scratch15
      - Scratch16
      - Scratch17
      - Scratch18
      - Scratch19
      - Scratch20
      - Scratch21
  - name: intTestsRunXamarinNative
    displayName: Run Xamarin Native Integration Tests
    type: boolean
    default: false

  - name: securityScanEnabled
    displayName: Run Security Scans
    type: boolean
    default: false

trigger:
  branches:
    include:
      - develop
  tags:
    include:
      - v*

schedules:
  - cron: 0 1 * * *
    displayName: Nightly Build
    branches:
      include:
        - develop
    always: false

pool:
  vmImage: 'ubuntu-latest'

variables:
  docker.registry: nhsapp.azurecr.io
  docker.tag: $[variables['Build.SourceVersion']]
  source.develop: ${{ eq(variables['Build.SourceBranchName'], 'develop') }}
  source.tag: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/') }}
  native.xamarin.target: ${{ parameters.xamarinTarget }}
  native.xamarin.version: '2.1.15'
  native.xamarin.ios.build.number:  $[counter(variables['native.version.number'], 1)]
  native.xamarin.android.build.number: $[counter('android', 100)]
  sjr.config.image.name: 'nhsonline-service-journey-prod-config'
  sjr.image.tag: $[variables['Build.SourceVersion']]
  # native.android.upload: ${{ parameters.uploadToGooglePlayConsole }}
  ${{ if startsWith(variables['Build.SourceBranch'], 'refs/heads/') }}:
    branchName: $[ replace(variables['Build.SourceBranch'], 'refs/heads/', '') ]
  ${{ if startsWith(variables['Build.SourceBranch'], 'refs/pull/') }}:
    branchName: $[ replace(variables['System.PullRequest.SourceBranch'], 'refs/heads/', '') ]

  # Build.Reason is blank when specifying parameters but Manual when running the pipeline
  ${{ if or(eq(variables['Build.Reason'], ''), eq(variables['Build.Reason'], 'Manual')) }}:
    int.tests.run.native.xamarin: ${{ parameters.intTestsRunXamarinNative }}
    # int.tests.run.native.android: ${{ parameters.intTestsRunAndroidNative }}
    security.scan.enabled: ${{ parameters.securityScanEnabled }}
  ${{ if and(ne(variables['Build.Reason'], ''), ne(variables['Build.Reason'], 'Manual')) }}:
    ${{ if or(eq(variables['Build.SourceBranchName'], 'develop'), eq(variables['Build.SourceBranch'], 'refs/tags/')) }}:
      int.tests.run.native.xamarin: true
      # int.tests.run.native.android: true
      security.scan.enabled: false
    ${{ if and(ne(variables['Build.SourceBranchName'], 'develop'), ne(variables['Build.SourceBranch'], 'refs/tags/')) }}:
      int.tests.run.native.xamarin: false
      # int.tests.run.native.android: false
      security.scan.enabled: false

stages:
  - ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
    - stage: pr_changes
      displayName: Determine PR Changes
      dependsOn:
      jobs:
        - template: .azuredevops/templates/pull-request-changes-job.yml

  - stage: package_helm_charts
    displayName: Package Helm Charts
    dependsOn:
    jobs:
      - template: .azuredevops/templates/helm-package-chart.yml

  - stage: secret_scanning
    displayName: Scan git history for secrets
    dependsOn:
    jobs:
      - ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
        - template: .azuredevops/templates/secret-scanning-pull-request.yml
          parameters:
            branchName: $(branchName)
      - ${{ if ne(variables['Build.Reason'], 'PullRequest') }}:
        - template: .azuredevops/templates/secret-scanning.yml

  - stage: backend
    displayName: Backend
    dependsOn:
    jobs:
      - template: .azuredevops/templates/build-and-test-backend-job.yml

  - stage: web
    displayName: Web
    dependsOn:
    jobs:
      - template: .azuredevops/templates/build-and-test-web-job.yml

  - stage: generate_code_coverage
    displayName: Generate Code Coverage
    condition: succeededOrFailed()
    dependsOn:
      - web
      - backend
    jobs:
      - template: .azuredevops/templates/generate-coverage-report-job.yml

  - ${{ if eq(variables['security.scan.enabled'], 'true') }}:
    - stage: security
      displayName: Security Scans
      dependsOn:
        - web
        - backend
      jobs:
        - template: .azuredevops/templates/run-security-scan-job.yml

  - stage: integration_tests
    displayName: Integration Tests
    dependsOn:
      - web
      - backend
    jobs:
      - template: .azuredevops/templates/integration-tests-initialise-job.yml

      - job: tranche
        displayName: Tranche
        dependsOn:
          - init
        condition: and(succeeded(), dependencies.init.outputs['matrix.tranches'])
        timeoutInMinutes: 180
        strategy:
          matrix: $[ dependencies.init.outputs['matrix.tranches'] ]
        variables:
          - template: .azuredevops/templates/integration-tests-variables.yml
        steps:
          - template: .azuredevops/templates/integration-tests-steps.yml

  - ${{ if eq(variables['native.xamarin.target'], 'Preview') }}:
    - stage: xamarin_preview
      displayName: Build Xamarin Preview Apps
      dependsOn:
      jobs:
        - template: .azuredevops/templates/xamarin-android-client-build-job.yml
          parameters:
            configuration: 'Preview - Release'
            apkFileName: 'com.nhs.online.nhsonline.preview.apk'
            keyStoreFile: AndroidSigningKeyStore
            apksignerKeystorePassword: '$(android.key.store.password)'
            keystoreAlias: 'playconsoleuploadkey'
            nativeVersion: '$(native.xamarin.version)'
            buildNumber: '$(native.xamarin.android.build.number)'
        - template: .azuredevops/templates/xamarin-ios-client-build-job.yml
          parameters:
            configuration: 'Preview - Release'
            provProfileSecureFile: iOSDevelopmentPreview.mobileprovision
            nativeVersion: '$(native.xamarin.version)'
            buildNumber: '$(native.xamarin.ios.build.number)'

  - ${{ if startsWith(variables['native.xamarin.target'], 'Scratch') }}:
    - stage: xamarin_scratch
      displayName: Build Xamarin Scratch Apps
      dependsOn:
      jobs:
        - template: .azuredevops/templates/xamarin-build-scratch-apps.yml
          parameters:
            configuration: $(native.xamarin.target)
            apksignerKeystorePassword: '$(android.key.store.password)'
            nativeVersion: '$(native.xamarin.version)'
            androidBuildNumber: '$(native.xamarin.android.build.number)'
            iosBuildNumber: '$(native.xamarin.ios.build.number)'

  - ${{ if or(eq(variables['native.xamarin.target'], 'Staging'), eq(variables['Build.SourceBranchName'], 'develop'), startsWith(variables['Build.SourceBranch'], 'refs/tags/')) }}:
    - stage: xamarin_staging
      displayName: Build Xamarin Staging Apps
      dependsOn:
      jobs:
      - template: .azuredevops/templates/xamarin-android-client-build-job.yml
        parameters:
          configuration: 'Staging - Release'
          apkFilename: 'com.nhs.online.nhsonline.staging.apk'
          keyStoreFile: AndroidSigningKeyStore
          apksignerKeystorePassword: '$(android.key.store.password)'
          keystoreAlias: 'playconsoleuploadkey'
          nativeVersion: '$(native.xamarin.version)'
          buildNumber: '$(native.xamarin.android.build.number)'
      - template: .azuredevops/templates/xamarin-ios-client-build-job.yml
        parameters:
          configuration: 'Staging - Release'
          certSecureFile: iOSProductionCertificate.p12
          certPwd: '$(ios.production.certificate.password)'
          provProfileSecureFile: iOSStaging.mobileprovision
          nativeVersion: '$(native.xamarin.version)'
          buildNumber: '$(native.xamarin.ios.build.number)'

  - ${{ if or(eq(variables['native.xamarin.target'], 'OnboardingSandpit'), eq(variables['Build.SourceBranchName'], 'develop'), startsWith(variables['Build.SourceBranch'], 'refs/tags/')) }}:
    - stage: xamarin_onboarding_sandpit
      displayName: Build Xamarin Onboarding Sandpit Apps
      dependsOn:
      jobs:
      - template: .azuredevops/templates/xamarin-android-client-build-job.yml
        parameters:
          configuration: 'OnboardingSandpit - Release'
          apkFilename: 'com.nhs.online.nhsonline.onboardingsandpit.apk'
          keyStoreFile: AndroidDebugSigningKeyStore
          apksignerKeystorePassword: '$(android.debug.key.store.password)'
          nativeVersion: '$(native.xamarin.version)'
          buildNumber: '$(native.xamarin.android.build.number)'
      - template: .azuredevops/templates/xamarin-ios-client-build-job.yml
        parameters:
          configuration: 'OnboardingSandpit - Release'
          certSecureFile: iOSProductionCertificate.p12
          certPwd: '$(ios.production.certificate.password)'
          provProfileSecureFile: iOSOnboardingDistributionSandpit.mobileprovision
          nativeVersion: '$(native.xamarin.version)'
          buildNumber: '$(native.xamarin.ios.build.number)'

  - ${{ if or(eq(variables['native.xamarin.target'], 'OnboardingAos'), eq(variables['Build.SourceBranchName'], 'develop'), startsWith(variables['Build.SourceBranch'], 'refs/tags/')) }}:
    - stage: xamarin_onboarding_aos
      displayName: Build Xamarin Onboarding Aos Apps
      dependsOn:
      jobs:
      - template: .azuredevops/templates/xamarin-android-client-build-job.yml
        parameters:
          configuration: 'OnboardingAos - Release'
          apkFilename: 'com.nhs.online.nhsonline.onboardingaos.apk'
          keyStoreFile: AndroidDebugSigningKeyStore
          apksignerKeystorePassword: '$(android.debug.key.store.password)'
          nativeVersion: '$(native.xamarin.version)'
          buildNumber: '$(native.xamarin.android.build.number)'
      - template: .azuredevops/templates/xamarin-ios-client-build-job.yml
        parameters:
          configuration: 'OnboardingAos - Release'
          certSecureFile: iOSProductionCertificate.p12
          certPwd: '$(ios.production.certificate.password)'
          provProfileSecureFile: iOSOnboardingDistributionAOS.mobileprovision
          nativeVersion: '$(native.xamarin.version)'
          buildNumber: '$(native.xamarin.ios.build.number)'

  - ${{ if or(eq(variables['native.xamarin.target'], 'Production'), startsWith(variables['Build.SourceBranch'], 'refs/tags/')) }}:
    - stage: xamarin_production
      displayName: Build Xamarin Production Apps
      dependsOn:
      jobs:
      - template: .azuredevops/templates/xamarin-android-client-build-job.yml
        parameters:
          configuration: 'Production - Release'
          apkFilename: 'com.nhs.online.nhsonline.production.apk'
          keyStoreFile: AndroidSigningKeyStore
          apksignerKeystorePassword: '$(android.key.store.password)'
          keystoreAlias: 'playconsoleuploadkey'
          nativeVersion: '$(native.xamarin.version)'
          buildNumber: '$(native.xamarin.android.build.number)'
      - template: .azuredevops/templates/xamarin-ios-client-build-job.yml
        parameters:
          configuration: 'Production - Release'
          certSecureFile: iOSProductionCertificate.p12
          certPwd: '$(ios.production.certificate.password)'
          provProfileSecureFile: iOSProduction.mobileprovision
          nativeVersion: '$(native.xamarin.version)'
          buildNumber: '$(native.xamarin.ios.build.number)'

  - ${{ if or(eq(variables['int.tests.run.native.xamarin'], 'true'), eq(variables['Build.Reason'], 'PullRequest')) }}:
    - stage: xamarin_browserstack
      displayName: Build Xamarin Browserstack Apps
      dependsOn:
        - ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
          - pr_changes
      jobs:
        - template: .azuredevops/templates/xamarin-android-client-build-job.yml
          parameters:
            nativeVersion: '$(native.xamarin.version)'
            buildNumber: '$(native.xamarin.android.build.number)'
        - template: .azuredevops/templates/xamarin-ios-client-build-job.yml
          parameters:
            nativeVersion: '$(native.xamarin.version)'
            buildNumber: '$(native.xamarin.ios.build.number)'

    - stage: xamarin_integration_tests
      displayName: Xamarin Integration Tests
      ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
        condition: and(succeeded(), eq(dependencies.pr_changes.outputs['pr_changes.pr_changes.xamarin'], 'True'))
      dependsOn:
        - web
        - backend
        - xamarin_browserstack
        - ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
          - pr_changes
      jobs:
        - template: .azuredevops/templates/integration-tests-xamarin-job.yml
          parameters:
            nativeVersion: '$(native.xamarin.version)'

    - stage: xamarin_integration_upgrade_tests
      displayName: Xamarin Integration Upgrade Tests
      ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
        condition: and(succeeded(), eq(dependencies.pr_changes.outputs['pr_changes.pr_changes.xamarin'], 'True'))
      dependsOn:
        - web
        - backend
        - xamarin_browserstack
        - ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
          - pr_changes
      jobs:
        - template: .azuredevops/templates/integration-tests-xamarin-job.yml
          parameters:
            runUpgradeTests: true
            nativeVersion: '$(native.xamarin.version)'

    - stage: xamarin_integration_canary_tests
      displayName: Xamarin Integration Canary Tests
      ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
        condition: and(succeeded(), eq(dependencies.pr_changes.outputs['pr_changes.pr_changes.xamarin'], 'False'))
      dependsOn:
        - web
        - backend
        - xamarin_browserstack
        - ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
          - pr_changes
      jobs:
        - template: .azuredevops/templates/integration-tests-xamarin-job.yml
          parameters:
            runCanaryTests: true
            nativeVersion: '$(native.xamarin.version)'

    - ${{ if ne(variables['Build.Reason'], 'PullRequest') }}:
      - stage: xamarin_integration_report_generation
        displayName: Xamarin Integration Generate Reports
        condition: succeededOrFailed()
        dependsOn:
          - xamarin_integration_upgrade_tests
          - xamarin_integration_tests
          - xamarin_integration_canary_tests
        jobs:
          - template: .azuredevops/templates/integration-tests-xamarin-generate-reports.yml

    - ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
      - stage: xamarin_pr_integration_report_generation
        displayName: Xamarin Integration Generate Reports
        condition: and(succeededOrFailed(), eq(dependencies.pr_changes.outputs['pr_changes.pr_changes.xamarin'], 'True'))
        dependsOn:
          - xamarin_integration_upgrade_tests
          - xamarin_integration_tests
          - pr_changes
        jobs:
          - template: .azuredevops/templates/integration-tests-xamarin-generate-reports.yml

      - stage: xamarin_pr_integration_canary_report_generation
        displayName: Xamarin Integration Generate Canary Reports
        condition: and(succeededOrFailed(), eq(dependencies.pr_changes.outputs['pr_changes.pr_changes.xamarin'], 'False'))
        dependsOn:
          - xamarin_integration_canary_tests
          - pr_changes
        jobs:
          - template: .azuredevops/templates/integration-tests-xamarin-generate-reports.yml

  - ${{ if eq(variables['source.tag'], 'True') }}:
    - stage: SJR_config_build_production
      displayName: SJR Production Config Build
      dependsOn:
        - backend
      jobs:
        - template: .azuredevops/templates/build-sjr-config-image.yml