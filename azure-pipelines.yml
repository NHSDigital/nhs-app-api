name: $[format('{0}-{1}', variables['Build.SourceBranchName'], counter(variables['Build.SourceBranchName']))]

parameters:
  - name: androidTarget
    displayName: Android native app target
    type: string
    default: browserstack
    values:
      - browserstack
      - onboardingsandpit
      - previewRelease
      - scratch1
      - scratch2
      - scratch3
      - scratch4
      - scratch5
      - scratch6
      - scratch7
      - scratch8
      - scratch9
      - scratch10
      - scratch11
      - scratch12
      - scratch13
      - scratch14
      - scratch15
      - scratch16
      - scratch17
      - scratch18
      - scratch19
      - scratch20
      - scratch21

  - name: iosTarget
    displayName: iOS native app target
    type: string
    default: BrowserStack
    values:
      - BrowserStack
      - Onboardingsandpit
      - Preview
      - Scratch1
      - Scratch2
      - Scratch3
      - Scratch4
      - Scratch5
      - Scratch6
      - Scratch7
      - Scratch8
      - Scratch9
      - Scratch10
      - Scratch11
      - Scratch12
      - Scratch13
      - Scratch14
      - Scratch15
      - Scratch16
      - Scratch17
      - Scratch18
      - Scratch19
      - Scratch20
      - Scratch21

  - name: intTestsRunAndroidNative
    displayName: Run Android Native Integration Tests
    type: boolean
    default: false

  - name: intTestsRunAndroidNativeLongRunning
    displayName: Run Android Native Long Running Integration Tests
    type: boolean
    default: false

  - name: intTestsRuniOSNative
    displayName: Run iOS Native Integration Tests
    type: boolean
    default: false

  - name: intTestsRuniOSNativeLongRunning
    displayName: Run iOS Native Long Running Integration Tests
    type: boolean
    default: false

trigger:
  branches:
    include:
      - develop
  tags:
    include:
      - v*

schedules:
  - cron: 0 1 * * *
    displayName: Nightly Build
    branches:
      include:
        - develop
    always: false

pool:
  vmImage: 'ubuntu-latest'

variables:
  docker.registry: nhsapp.azurecr.io
  docker.tag: $[variables['Build.SourceVersion']]
  source.develop: $[eq(variables['Build.SourceBranchName'], 'develop')]
  source.tag: $[startsWith(variables['Build.SourceBranch'], 'refs/tags/')]
  native.android.target: ${{ parameters.androidTarget }}
  native.ios.target: ${{ parameters.iosTarget }}

  # Build.Reason is blank when specifying parameters but Manual when running the pipeline
  ${{ if or(eq(variables['Build.Reason'], ''), eq(variables['Build.Reason'], 'Manual')) }}:
    int.tests.run.native.android: ${{ parameters.intTestsRunAndroidNative }}
    int.tests.run.native.ios: ${{ parameters.intTestsRuniOSNative }}
  ${{ if and(ne(variables['Build.Reason'], ''), ne(variables['Build.Reason'], 'Manual')) }}:
    ${{ if or(eq(variables['Build.SourceBranchName'], 'develop'), eq(variables['Build.SourceBranch'], 'refs/tags/')) }}:
      int.tests.run.native.android: true
      int.tests.run.native.ios: true
    ${{ if and(ne(variables['Build.SourceBranchName'], 'develop'), ne(variables['Build.SourceBranch'], 'refs/tags/')) }}:
      int.tests.run.native.android: false
      int.tests.run.native.ios: false

  ${{ if eq(variables['Build.Reason'], 'Schedule') }}:
    int.tests.run.native.android.long-running: true
    int.tests.run.native.ios.long-running: true
  ${{ if ne(variables['Build.Reason'], 'Schedule') }}:
    int.tests.run.native.android.long-running: ${{ parameters.intTestsRunAndroidNativeLongRunning }}
    int.tests.run.native.ios.long-running: ${{ parameters.intTestsRuniOSNativeLongRunning }}

stages:
  - stage: backend
    displayName: Backend
    dependsOn:
    jobs:
      - template: .azuredevops/templates/build-and-test-backend-job.yml

  - stage: web
    displayName: Web
    dependsOn:
    jobs:
      - template: .azuredevops/templates/build-and-test-web-job.yml

  - stage: android
    displayName: Android Client
    dependsOn:
    jobs:
      - template: .azuredevops/templates/build-and-test-android-client-job.yml

  - stage: ios
    displayName: iOS Client
    dependsOn:
    jobs:
      - template: .azuredevops/templates/ios-client-test-job.yml

      - template: .azuredevops/templates/ios-client-build-job.yml
        parameters:
          name: Client

      - ${{ if and(or(startsWith(variables['Build.SourceBranch'], 'refs/tags/'), eq(variables['Build.SourceBranchName'], 'develop')), ne(parameters.iosTarget, 'Preview')) }}:
        - template: .azuredevops/templates/ios-client-build-job.yml
          parameters:
            name: Preview
            target: Preview
            provProfileSecureFile: iOSDevelopmentPreview.mobileprovision
            provisioningProfileName: 'NHS App Dev Preview'

      - ${{ if startsWith(variables['Build.SourceBranch'], 'refs/tags/') }}:
        - template: .azuredevops/templates/ios-client-build-job.yml
          parameters:
            name: Demo
            target: Demo
            certSecureFile: iOSProductionCertificate.p12
            certPwd: '$(ios.production.certificate.password)'
            scheme: 'NHSOnline Demo'
            provProfileSecureFile: iOSDemo.mobileprovision
            provisioningProfileName: 'NHS App Demo Distribution'

        - template: .azuredevops/templates/ios-client-build-job.yml
          parameters:
            name: Release
            target: Production
            certSecureFile: iOSProductionCertificate.p12
            certPwd: '$(ios.production.certificate.password)'
            scheme: 'NHSOnline'
            provProfileSecureFile: iOSProduction.mobileprovision
            provisioningProfileName: 'NHS App Distribution'

  - stage: generate_code_coverage
    displayName: Generate Code Coverage
    condition: succeededOrFailed()
    dependsOn:
      - web
      - backend
      - ios
    jobs:
      - template: .azuredevops/templates/generate-coverage-report-job.yml

  - stage: security
    displayName: Security Scans
    dependsOn:
      - web
      - backend
    condition: and(succeeded(), or(variables['security.run.scans'], eq(variables['source.develop'], 'True'), eq(variables['source.tag'], 'True')))
    jobs:
      - template: .azuredevops/templates/run-security-scan-job.yml

  - stage: integration_tests
    displayName: Integration Tests
    dependsOn:
      - web
      - backend
    jobs:
      - template: .azuredevops/templates/integration-tests-initialise-job.yml

      - job: tranche
        displayName: Tranche
        dependsOn:
          - init
        condition: and(succeeded(), dependencies.init.outputs['matrix.tranches'])
        timeoutInMinutes: 180
        strategy:
          matrix: $[ dependencies.init.outputs['matrix.tranches'] ]
        variables:
          - template: .azuredevops/templates/integration-tests-variables.yml
        steps:
          - template: .azuredevops/templates/integration-tests-steps.yml

  - ${{ if or(eq(variables['int.tests.run.native.android'], 'true'), eq(variables['int.tests.run.native.android.long-running'], 'true')) }}:
    - stage: android_integration_tests
      displayName: Android Integration Tests
      dependsOn:
        - web
        - backend
        - android
      condition: and(succeeded(), eq(variables['native.android.target'], 'browserstack'))
      jobs:
        - ${{ if eq(variables['int.tests.run.native.android'], 'true') }}:
          - template: .azuredevops/templates/integration-tests-android-job.yml

        - ${{ if eq(variables['int.tests.run.native.android.long-running'], 'true') }}:
          - template: .azuredevops/templates/integration-tests-android-job.yml
            parameters:
              job.name: Long Running
              tranche.tag: long-running

  - ${{ if or(eq(variables['int.tests.run.native.ios'], 'true'), eq(variables['int.tests.run.native.ios.long-running'], 'true')) }}:
    - stage: ios_integration_tests
      displayName: iOS Integration Tests
      dependsOn:
        - web
        - backend
        - ios
      condition: and(succeeded(), eq(variables['native.ios.target'], 'browserstack'))
      jobs:
        - ${{ if eq(variables['int.tests.run.native.ios'], 'true') }}:
          - template: .azuredevops/templates/integration-tests-ios-job.yml

        - ${{ if eq(variables['int.tests.run.native.ios.long-running'], 'true') }}:
          - template: .azuredevops/templates/integration-tests-ios-job.yml
            parameters:
              job.name: Long Running
              tranche.tag: long-running
