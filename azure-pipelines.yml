name: $[format('{0}-{1}', variables['Build.SourceBranchName'], counter(variables['Build.SourceBranchName']))]

parameters:
  - name: androidTarget
    displayName: Android native app target
    type: string
    default: browserstack
    values:
      - browserstack
      - onboardingsandpit
      - onboardingaos
      - logindev
      - previewRelease
      - scratch1
      - scratch2
      - scratch3
      - scratch4
      - scratch5
      - scratch6
      - scratch7
      - scratch8
      - scratch9
      - scratch10
      - scratch11
      - scratch12
      - scratch13
      - scratch14
      - scratch15
      - scratch16
      - scratch17
      - scratch18
      - scratch19
      - scratch20
      - scratch21

  - name: iosTarget
    displayName: iOS native app target
    type: string
    default: BrowserStack
    values:
      - BrowserStack
      - Onboardingsandpit
      - Onboardingaos
      - LoginDevelopment
      - Preview
      - Scratch1
      - Scratch2
      - Scratch3
      - Scratch4
      - Scratch5
      - Scratch6
      - Scratch7
      - Scratch8
      - Scratch9
      - Scratch10
      - Scratch11
      - Scratch12
      - Scratch13
      - Scratch14
      - Scratch15
      - Scratch16
      - Scratch17
      - Scratch18
      - Scratch19
      - Scratch20
      - Scratch21

  - name: xamarinTarget
    displayName: Xamarin native app target
    type: string
    default: None
    values:
      - None
      - Preview
      - Staging

  - name: xamarinDistributeApps
    displayName: Distribute Xamarin Apps
    type: boolean
    default: false

  - name: intTestsRunXamarinNative
    displayName: Run Xamarin Native Integration Tests
    type: boolean
    default: false

  - name: intTestsRunAndroidNative
    displayName: Run Android Native Integration Tests
    type: boolean
    default: false

  - name: intTestsRunAndroidNativeLongRunning
    displayName: Run Android Native Long Running Integration Tests
    type: boolean
    default: false

  - name: intTestsRuniOSNative
    displayName: Run iOS Native Integration Tests
    type: boolean
    default: false

  - name: intTestsRuniOSNativeLongRunning
    displayName: Run iOS Native Long Running Integration Tests
    type: boolean
    default: false

  - name: uploadToAppStoreConnect
    displayName: Upload iOS Client to AppStore Connect
    type: boolean
    default: false

  - name: securityScanEnabled
    displayName: Run Security Scans
    type: boolean
    default: false

trigger:
  branches:
    include:
      - develop
  tags:
    include:
      - v*

schedules:
  - cron: 0 1 * * *
    displayName: Nightly Build
    branches:
      include:
        - develop
    always: false

pool:
  vmImage: 'ubuntu-latest'

variables:
  docker.registry: nhsapp.azurecr.io
  docker.tag: $[variables['Build.SourceVersion']]
  source.develop: $[eq(variables['Build.SourceBranchName'], 'develop')]
  source.tag: $[startsWith(variables['Build.SourceBranch'], 'refs/tags/')]
  native.android.target: ${{ parameters.androidTarget }}
  native.ios.target: ${{ parameters.iosTarget }}
  native.xamarin.target: ${{ parameters.xamarinTarget }}

  # Build.Reason is blank when specifying parameters but Manual when running the pipeline
  ${{ if or(eq(variables['Build.Reason'], ''), eq(variables['Build.Reason'], 'Manual')) }}:
    int.tests.run.native.xamarin: ${{ parameters.intTestsRunXamarinNative }}
    int.tests.run.native.android: ${{ parameters.intTestsRunAndroidNative }}
    int.tests.run.native.ios: ${{ parameters.intTestsRuniOSNative }}
    native.xamarin.distribute: ${{ parameters.xamarinDistributeApps }}
    security.scan.enabled: ${{ parameters.securityScanEnabled }}
  ${{ if and(ne(variables['Build.Reason'], ''), ne(variables['Build.Reason'], 'Manual')) }}:
    ${{ if or(eq(variables['Build.SourceBranchName'], 'develop'), eq(variables['Build.SourceBranch'], 'refs/tags/')) }}:
      int.tests.run.native.xamarin: true
      int.tests.run.native.android: true
      int.tests.run.native.ios: true
      native.xamarin.distribute: false
      security.scan.enabled: false
    ${{ if and(ne(variables['Build.SourceBranchName'], 'develop'), ne(variables['Build.SourceBranch'], 'refs/tags/')) }}:
      int.tests.run.native.xamarin: false
      int.tests.run.native.android: false
      int.tests.run.native.ios: false
      native.xamarin.distribute: false
      security.scan.enabled: false

  ${{ if eq(variables['Build.Reason'], 'Schedule') }}:
    int.tests.run.native.android.long-running: true
    int.tests.run.native.ios.long-running: true
  ${{ if ne(variables['Build.Reason'], 'Schedule') }}:
    int.tests.run.native.android.long-running: ${{ parameters.intTestsRunAndroidNativeLongRunning }}
    int.tests.run.native.ios.long-running: ${{ parameters.intTestsRuniOSNativeLongRunning }}

stages:
  - ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
    - stage: pr_changes
      displayName: Determine PR Changes
      dependsOn:
      jobs:
        - template: .azuredevops/templates/pull-request-changes-job.yml

  - stage: backend
    displayName: Backend
    dependsOn:
    jobs:
      - template: .azuredevops/templates/build-and-test-backend-job.yml

  - stage: web
    displayName: Web
    dependsOn:
    jobs:
      - template: .azuredevops/templates/build-and-test-web-job.yml

  - stage: android
    displayName: Android Client
    dependsOn:
      - ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
        - pr_changes
    ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
      condition: and(succeeded(), or(eq(dependencies.pr_changes.outputs['pr_changes.pr_changes.android'], 'True'), eq(dependencies.pr_changes.outputs['pr_changes.pr_changes.pipeline'], 'True')))
    jobs:
      - template: .azuredevops/templates/build-and-test-android-client-job.yml

  - stage: ios
    displayName: iOS Client
    dependsOn:
      - ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
        - pr_changes
    ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
      condition: and(succeeded(), or(eq(dependencies.pr_changes.outputs['pr_changes.pr_changes.ios'], 'True'), eq(dependencies.pr_changes.outputs['pr_changes.pr_changes.pipeline'], 'True')))
    jobs:
      - template: .azuredevops/templates/ios-client-test-job.yml
      - template: .azuredevops/templates/ios-client-build-setup.yml
        parameters:
          iosTarget: ${{ parameters.iosTarget }}
          uploadToAppStoreConnect: ${{ parameters.uploadToAppStoreConnect }}

  - stage: generate_code_coverage
    displayName: Generate Code Coverage
    condition: succeededOrFailed()
    dependsOn:
      - web
      - backend
      - ios
    jobs:
      - template: .azuredevops/templates/generate-coverage-report-job.yml

  - ${{ if eq(variables['security.scan.enabled'], 'true') }}:
    - stage: security
      displayName: Security Scans
      dependsOn:
        - web
        - backend
      jobs:
        - template: .azuredevops/templates/run-security-scan-job.yml

  - stage: integration_tests
    displayName: Integration Tests
    dependsOn:
      - web
      - backend
    jobs:
      - template: .azuredevops/templates/integration-tests-initialise-job.yml

      - job: tranche
        displayName: Tranche
        dependsOn:
          - init
        condition: and(succeeded(), dependencies.init.outputs['matrix.tranches'])
        timeoutInMinutes: 180
        strategy:
          matrix: $[ dependencies.init.outputs['matrix.tranches'] ]
        variables:
          - template: .azuredevops/templates/integration-tests-variables.yml
        steps:
          - template: .azuredevops/templates/integration-tests-steps.yml

  - ${{ if or(eq(variables['int.tests.run.native.android'], 'true'), eq(variables['int.tests.run.native.android.long-running'], 'true')) }}:
    - stage: android_integration_tests
      displayName: Android Integration Tests
      dependsOn:
        - web
        - backend
        - android
      condition: and(succeeded(), eq(variables['native.android.target'], 'browserstack'))
      jobs:
        - ${{ if eq(variables['int.tests.run.native.android'], 'true') }}:
          - template: .azuredevops/templates/integration-tests-android-job.yml

        - ${{ if eq(variables['int.tests.run.native.android.long-running'], 'true') }}:
          - template: .azuredevops/templates/integration-tests-android-job.yml
            parameters:
              job.name: Long Running
              tranche.tag: long-running

  - ${{ if or(eq(variables['int.tests.run.native.ios'], 'true'), eq(variables['int.tests.run.native.ios.long-running'], 'true')) }}:
    - stage: ios_integration_tests
      displayName: iOS Integration Tests
      dependsOn:
        - web
        - backend
        - ios
      condition: and(succeeded(), eq(variables['native.ios.target'], 'browserstack'))
      jobs:
        - ${{ if eq(variables['int.tests.run.native.ios'], 'true') }}:
          - template: .azuredevops/templates/integration-tests-ios-job.yml

        - ${{ if eq(variables['int.tests.run.native.ios.long-running'], 'true') }}:
          - template: .azuredevops/templates/integration-tests-ios-job.yml
            parameters:
              job.name: Long Running
              tranche.tag: long-running

  - ${{ if eq(variables['native.xamarin.target'], 'Preview') }}:
    - stage: xamarin_preview
      displayName: Build Xamarin Preview Apps
      dependsOn:
      jobs:
        - template: .azuredevops/templates/xamarin-android-client-build-job.yml
          parameters:
            configuration: 'Preview - Release'
            apkFileName: 'com.nhs.online.nhsonline.preview.apk'
            keyStoreFile: AndroidSigningKeyStore
            apksignerKeystorePassword: '$(android.key.store.password)'
            keystoreAlias: 'playconsoleuploadkey'
        - template: .azuredevops/templates/xamarin-ios-client-build-job.yml
          parameters:
            configuration: 'Preview - Release'
            provProfileSecureFile: iOSDevelopmentPreview.mobileprovision

  - ${{ if or(eq(variables['native.xamarin.target'], 'Staging'), eq(variables['Build.SourceBranchName'], 'develop'), startsWith(variables['Build.SourceBranch'], 'refs/tags/')) }}:
    - stage: xamarin_staging
      displayName: Build Xamarin Staging Apps
      dependsOn:
      jobs:
      - template: .azuredevops/templates/xamarin-android-client-build-job.yml
        parameters:
          configuration: 'Staging - Release'
          apkFilename: 'com.nhs.online.nhsonline.staging.apk'
          keyStoreFile: AndroidSigningKeyStore
          apksignerKeystorePassword: '$(android.key.store.password)'
          keystoreAlias: 'playconsoleuploadkey'
      - template: .azuredevops/templates/xamarin-ios-client-build-job.yml
        parameters:
          configuration: 'Staging - Release'
          certSecureFile: iOSProductionCertificate.p12
          certPwd: '$(ios.production.certificate.password)'
          provProfileSecureFile: iOSDemo.mobileprovision

  - ${{ if or(eq(variables['int.tests.run.native.xamarin'], 'true'), eq(variables['Build.Reason'], 'PullRequest')) }}:
    - stage: xamarin_browserstack
      displayName: Build Xamarin Browserstack Apps
      ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
        condition: and(succeeded(), eq(dependencies.pr_changes.outputs['pr_changes.pr_changes.xamarin'], 'True'))
      dependsOn:
        - ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
          - pr_changes
      jobs:
        - template: .azuredevops/templates/xamarin-android-client-build-job.yml
        - template: .azuredevops/templates/xamarin-ios-client-build-job.yml

    - stage: xamarin_integration_tests
      displayName: Xamarin Integration Tests
      ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
        condition: and(succeeded(), eq(dependencies.pr_changes.outputs['pr_changes.pr_changes.xamarin'], 'True'))
      dependsOn:
        - web
        - backend
        - xamarin_browserstack
        - ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
          - pr_changes
      jobs:
        - template: .azuredevops/templates/integration-tests-xamarin-job.yml

  - ${{ if and(eq(variables['native.xamarin.target'], 'Preview'), eq(variables['native.xamarin.distribute'], 'true'), eq(variables['int.tests.run.native.xamarin'], 'true')) }}:
    - stage: xamarin_distribute_apps
      displayName: Xamarin Distribute Preview Apps
      dependsOn:
        - xamarin_preview
        - xamarin_integration_tests
      jobs:
        - template: .azuredevops/templates/xamarin-distribute-apps-job.yml
          parameters:
            target: 'Preview'

  - ${{ if and(or(eq(variables['Build.SourceBranchName'], 'develop'), startsWith(variables['Build.SourceBranch'], 'refs/tags/')), eq(variables['int.tests.run.native.xamarin'], 'true')) }}:
    - stage: xamarin_distribute_apps
      displayName: Xamarin Distribute Staging Apps
      dependsOn:
        - xamarin_staging
        - xamarin_integration_tests
      jobs:
        - template: .azuredevops/templates/xamarin-distribute-apps-job.yml
          parameters:
            target: 'Staging'