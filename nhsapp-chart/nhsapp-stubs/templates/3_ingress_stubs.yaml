---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: 'false'
    nginx.ingress.kubernetes.io/secure-backends: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
  name: {{ template "nhsapp.name" . }}-stubs-{{ .Chart.AppVersion }}
  namespace: {{ $.Values.global.environment }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
spec:
  rules:
    - host: stubs-loadtest.{{  $.Values.zone }}.{{ $.Values.domain }}
      http:
        paths:
        - path: /
          pathType: ImplementationSpecific 
          backend:
            service:
              name: {{ template "nhsapp.name" . }}-stubs-{{ .Chart.AppVersion | replace "." "-" }}
              port:
                number: {{ $.Values.sidecar_proxy.containerPort }}
  tls:
    - hosts:
      - stubs-loadtest.{{  $.Values.zone }}.{{ $.Values.domain }}
      secretName: {{ $.Values.zone }}-{{ $.Values.domain | replace "." "-" }}
