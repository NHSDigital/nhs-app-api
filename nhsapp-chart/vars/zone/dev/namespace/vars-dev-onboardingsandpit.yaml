---
cosmosDBName: onboardingsandpit
odsRemapEnabled: true
odsRemapMap: "G85075:X00100;G85672:X00100"
cidHostname: auth.sandpit.signin.nhs.uk
cidFidoHostname: uaf.sandpit.signin.nhs.uk
cidSettingsHostName: settings.sandpit.signin.nhs.uk
akamaiEnv: nhsapp.service.nhs.uk

# Allow access to private API without the redirector
createDefaultPrivateIngress: true

# well known
wellKnownAndroidPackageName: com.nhs.online.nhsonline.onboardingsandpit
wellKnownIOSAppId: 5Y58TN94AP.com.nhs.online.dev.onboardingsandpit

users:
  notificationHubs:
    - notificationHubPath: nhsapp-nonlive-onboardingsandpit
      notificationHubConnectionString: Endpoint=sb://nhsapp-nonlive.servicebus.windows.net/;SharedAccessKeyName=DefaultFullSharedAccessSignature;SharedAccessKey=

secrets:
  notificationHubs:
    - notificationHubSecretName: "notificationHubSharedAccessKeyOnboardingSandpit"
      notificationHubSecretVersionuks: "cb94849bb3db47ec995cdbe0446a6434"
      notificationHubSecretVersionukw: "792b977ac949477882f5a980b0aa2737"

web:
  publicURL: www-onboardingsandpit.nhsapp.service.nhs.uk
  thirdPartyJumpOffLoggingEnabled: true

api:
  publicURL: api-onboardingsandpit.nhsapp.service.nhs.uk
  knownServicesOverrides:
    services__cid_settings__url: https://settings.sandpit.signin.nhs.uk
    services__cid_account__url: https://account.sandpit.signin.nhs.uk
    services__cid_auth__url: https://auth.sandpit.signin.nhs.uk
    services__cid_uaf__url: https://uaf.sandpit.signin.nhs.uk
    services__cid_access__url: https://access.sandpit.signin.nhs.uk
    services__cid_idvm__url: https://idvm.sandpit.signin.nhs.uk
