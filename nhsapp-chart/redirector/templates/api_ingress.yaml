---
apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: 'false'
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/use-regex: "true"
  name: default-api
  labels:
    role: default-api
    releaseVersion: {{ default "develop" .Values.api.version }}
spec:
  rules:
    - host: api{{ .Values.environmentPublicHostSuffix }}
      http:
        paths:
          - backend:
              serviceName: default-api
              servicePort: {{ .Values.defaultServicePort }}
            path: /
  tls:
    - hosts:
        - api{{ .Values.environmentPublicHostSuffix }}
      secretName: {{ .Values.tlsSecretName }}
