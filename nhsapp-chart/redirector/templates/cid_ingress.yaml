---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: 'false'
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    {{- if $.Values.cid.clientAuth }}
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "1"
    nginx.ingress.kubernetes.io/auth-tls-pass-certificate-to-upstream: "false"
    nginx.ingress.kubernetes.io/auth-tls-secret: "kube-system/external-ca"
    {{- end }}
  name: default-cid
  labels:
    role: default-cid
    releaseVersion: {{ default "develop" .Values.cid.version }}
spec:
  rules:
    - host: cid{{ .Values.environmentPublicHostSuffix }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific 
            backend:
              service:
                name: default-cid
                port:
                  number: {{ .Values.defaultServicePort }}
  tls:
    - hosts:
        - cid{{ .Values.environmentPublicHostSuffix }}
      secretName: {{ .Values.tlsSecretName }}
