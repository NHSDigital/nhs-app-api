---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: 'false'
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/use-regex: "true"
  name: default-info
  labels:
    role: default-info
    releaseVersion: {{ default "develop" .Values.info.version }}
spec:
  rules:
    - host: api{{ .Values.environmentPublicHostSuffix }}
      http:
        paths:
          - path: /v[1,2]/api/users/info
            pathType: ImplementationSpecific
            backend:
              service:
                name: default-info
                port:
                  number: {{ .Values.defaultServicePort }}
          - path: /v[1,2]/api/users/me/info
            pathType: ImplementationSpecific 
            backend:
              service:
               name: default-info
               port:
                 number: {{ .Values.defaultServicePort }}
  tls:
    - hosts:
        - api{{ .Values.environmentPublicHostSuffix }}
      secretName: {{ .Values.tlsSecretName }}
