---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: 'false'
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/use-regex: "true"
  name: default-users
  labels:
    role: default-users
    releaseVersion: {{ default "develop" .Values.users.version }}
spec:
  rules:
    - host: api{{ .Values.environmentPublicHostSuffix }}
      http:
        paths:
          - backend:
              serviceName: default-users
              servicePort: {{ .Values.defaultServicePort }}
            path: /v[1,2]/api/users
  tls:
    - hosts:
        - api{{ .Values.environmentPublicHostSuffix }}
      secretName: {{ .Values.tlsSecretName }}
