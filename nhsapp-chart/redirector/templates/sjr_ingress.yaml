{{- if .Values.sjrExternalIngressEnabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: 'false'
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/use-regex: "true"
  name: default-sjr
  labels:
    role: default-sjr
    releaseVersion: {{ default "develop" .Values.sjr.version }}
spec:
  rules:
    - host: api{{ .Values.environmentPublicHostSuffix }}
      http:
        paths:
          - path: /api/servicejourneyrules
            pathType: ImplementationSpecific
            backend:
              service:
                name: default-sjr
                port:
                  number: {{ .Values.defaultServicePort }}
  tls:
    - hosts:
        - api{{ .Values.environmentPublicHostSuffix }}
      secretName: {{ .Values.tlsSecretName }}
{{- end }}