---
apiVersion: v1
kind: Service
metadata:
  name: cold-cid
  namespace: {{ .Values.global.environment }}
  labels:
    role: cold-cid
    releaseVersion: {{ default "develop" .Values.cid.targetAppVersion }}
spec:
  type: ExternalName
  externalName: {{ template "nhsapp.name" . }}-cid-{{ $.Values.cid.targetAppVersion | replace "." "-" }}.{{ .Values.zone }}.svc.cluster.local
  ports:
    - port: {{ .Values.defaultServicePort }}
      targetPort: {{ .Values.sidecar_proxy.containerPort }}
