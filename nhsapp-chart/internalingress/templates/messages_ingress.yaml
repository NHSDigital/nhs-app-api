---
apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: 'false'
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/use-regex: "true"
  name: cold-messages
  namespace: {{ $.Values.global.environment }}
  labels:
    role: cold-messages
    releaseVersion: {{ default "develop" .Values.messages.version }}
spec:
  rules:
    - host: api-cold.{{ .Values.zone }}.{{ .Values.domain }}
      http:
        paths:
          - backend:
              serviceName: cold-messages
              servicePort: {{ .Values.defaultServicePort }}
            path: /v[1,2]/api/users/me/messages
          - backend:
              serviceName: cold-messages
              servicePort: {{ .Values.defaultServicePort }}
            path: /v[1,2]/api/users/.{36}/messages
  tls:
    - hosts:
        - api-cold.{{ $.Values.zone }}.{{ $.Values.domain }}
      secretName: {{ .Values.zone }}-{{ .Values.domain | replace "." "-" }}
