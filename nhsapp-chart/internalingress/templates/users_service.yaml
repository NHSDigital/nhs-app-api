---
apiVersion: v1
kind: Service
metadata:
  name: cold-users
  namespace: {{ .Values.global.environment }}
  labels:
    role: cold-users
    releaseVersion: {{ default "develop" .Values.users.targetAppVersion }}
spec:
  type: ExternalName
  externalName: {{ template "nhsapp.name" . }}-users-{{ $.Values.users.targetAppVersion | replace "." "-" }}.{{ .Values.zone }}.svc.cluster.local
  ports:
    - port: {{ .Values.defaultServicePort }}
      targetPort: {{ .Values.sidecar_proxy.containerPort }}
