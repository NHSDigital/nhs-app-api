---
apiVersion: v1
kind: Service
metadata:
  name: cold-info
  namespace: {{ .Values.global.environment }}
  labels:
    role: cold-info
    releaseVersion: {{ default "develop" .Values.info.targetAppVersion }}
spec:
  type: ExternalName
  externalName: {{ template "nhsapp.name" . }}-info-{{ $.Values.users.targetAppVersion | replace "." "-" }}.{{ .Values.zone }}.svc.cluster.local
  ports:
    - port: {{ .Values.defaultServicePort }}
      targetPort: {{ .Values.sidecar_proxy.containerPort }}
