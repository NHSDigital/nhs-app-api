---
apiVersion: v1
kind: Service
metadata:
  name: cold-logger
  namespace: {{ .Values.global.environment }}
  labels:
    role: cold-logger
    releaseVersion: {{ default "develop" .Values.logger.targetAppVersion }}
spec:
  type: ExternalName
  externalName: {{ template "nhsapp.name" . }}-logger-{{ $.Values.logger.targetAppVersion | replace "." "-" }}.{{ .Values.zone }}.svc.cluster.local
  ports:
    - port: {{ .Values.defaultServicePort }}
      targetPort: {{ .Values.sidecar_proxy.containerPort }}
