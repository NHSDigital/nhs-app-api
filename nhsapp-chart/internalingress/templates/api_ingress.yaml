---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: 'false'
    nginx.ingress.kubernetes.io/secure-backends: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
  name: cold-api
  namespace: {{ $.Values.global.environment }}
  labels:
    role: cold-api
    releaseVersion: {{ default "develop" .Values.api.targetAppVersion }}
spec:
  rules:
    - host: api-cold.{{ $.Values.zone }}.{{ $.Values.domain }}
      http:
        paths:
          - backend:
              serviceName: cold-api
              servicePort: {{ $.Values.defaultServicePort }}
            path: /
  tls:
    - hosts:
        - api-cold.{{ $.Values.zone }}.{{ $.Values.domain }}
      secretName: {{ $.Values.zone }}-{{ $.Values.domain | replace "." "-" }}
