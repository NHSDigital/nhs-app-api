{{- if $.Values.environmentStubbed.deployWiremock }}
---
apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: 'false'
    nginx.ingress.kubernetes.io/secure-backends: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
  name: {{ template "nhsapp.name" . }}-wiremock-{{ .Chart.AppVersion }}
  namespace: {{ $.Values.global.environment }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
spec:
  rules:
    - host: wiremock-{{ $.Values.global.environment | replace "." "-" }}.{{  $.Values.zone }}.{{ $.Values.domain }}
      http:
        paths:
          - backend:
              serviceName: {{ template "nhsapp.name" . }}-wiremock-{{ .Chart.AppVersion | replace "." "-" }}
              servicePort: {{ $.Values.sidecar_proxy.containerPort }}
            path: /
  tls:
    - hosts:
      - wiremock-{{ $.Values.global.environment | replace "." "-" }}.{{  $.Values.zone }}.{{ $.Values.domain }}
      secretName: {{ $.Values.zone }}-{{ $.Values.domain | replace "." "-" }}
{{- end }}
