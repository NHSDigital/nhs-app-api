{{- if $.Values.loggerEnabled }}
---
apiVersion: policy/v1beta1
kind: PodDisruptionBudget
metadata:
  name: {{ template "nhsapp.name" . }}-{{ $.Values.logger.role }}-pdb-{{ .Chart.AppVersion }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
spec:
  minAvailable: {{ $.Values.logger.minAvailable }}
  selector:
    matchLabels:
      app: {{ template "nhsapp.name" . }}-{{ $.Values.logger.role }}
      version: {{ .Chart.AppVersion | quote }}
{{- end }}
