---
apiVersion: certmanager.k8s.io/v1alpha1
kind: Certificate
metadata:
  name: wildcard-{{ $.Values.global.environment }}-tls-{{ .Chart.AppVersion }}
  namespace: {{ $.Values.global.environment }}
spec:
  secretName: wildcard-{{ $.Values.global.environment }}-tls-{{ .Chart.AppVersion }}
  issuerRef:
    name: internal-ca
    kind: ClusterIssuer
  commonName: '*.{{ $.Values.global.environment }}.svc.cluster.local'
  dnsNames: []
