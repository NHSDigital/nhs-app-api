{{- if $.Values.iproxy_microtest.deployMicrotest }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: iproxy-microtest-config-{{ .Chart.AppVersion }}
  namespace: {{ $.Values.global.environment }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
data:
  nginx.conf: |-
    worker_processes  1;
    load_module modules/ngx_http_upstream_jdomain_module.so;
    error_log  /var/log/nginx/error.log warn;
    pid        /var/run/nginx.pid;

    events {
        worker_connections  1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        sendfile        on;
        keepalive_timeout  65;

        server_names_hash_bucket_size 128;

        log_format splunk_logs 'time=$time_iso8601 '
                        'request_method=$request_method '
                        'request_uri="$request_uri" '
                        'status=$status '
                        'response_size_bytes=$bytes_sent '
                        'duration_seconds=$request_time';

        resolver 8.8.8.8 8.8.4.4;

        upstream microtest {
            keepalive 32;
            keepalive_requests 100;
            keepalive_timeout 60s;
            hostname {{ $.Values.microtestHostname }} port=443;
        }

        server {
            listen {{ $.Values.iproxy_microtest.containerPort }} ssl;
            server_name iproxy-microtest-{{ .Chart.AppVersion | replace "." "-" }}.{{ $.Values.global.environment }}.svc.cluster.local;
            ssl_prefer_server_ciphers on;
            ssl_protocols TLSv1.2;
            ssl_certificate     /etc/nginx/ssl/tls.crt;
            ssl_certificate_key /etc/nginx/ssl/tls.key;
            ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256;

            access_log /var/log/nginx/access.log splunk_logs;

            # General Config
            server_tokens off;

            # Proxy Config
            proxy_buffering off;
            proxy_redirect  off;
            proxy_buffer_size 1024k;
            proxy_buffers 4 2048k;
            proxy_busy_buffers_size 2048k;
            proxy_ssl_session_reuse off;
            proxy_ssl_server_name on;
            proxy_http_version 1.1;

            location / {
                set $backend_microtest_upstream "{{ $.Values.microtestProtocol }}://microtest";
                proxy_pass $backend_microtest_upstream;
                proxy_set_header Host {{ $.Values.microtestHostname }};
                proxy_ssl_name {{ $.Values.microtestHostname }};
                proxy_set_header Connection "";
                proxy_ssl_certificate /tmp/microtestCrt;
                proxy_ssl_certificate_key /tmp/microtestKey;
            }
        }

        server {
            listen       8080;
            server_name  localhost;
            server_tokens off;

            location = /healthz {
                return 200;
            }
        }
    }
{{- end }}
