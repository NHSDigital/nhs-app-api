{{- if $.Values.iproxy_microtest.deployMicrotest }}
---
apiVersion: v1
data:
  password: {{ .Values.microtestPassword }}
kind: Secret
metadata:
  name: microtest-{{ .Chart.AppVersion }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
type: Opaque
---
apiVersion: v1
data:
  microtest.pfx: {{ .Values.microtestPfx }}
  microtest.crt: {{ .Values.microtestCrt }}
  microtest.key: {{ .Values.microtestKey }}
kind: Secret
metadata:
  name: microtest-cert-{{ .Chart.AppVersion }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
type: Opaque
{{- if (and ($.Values.environmentStubbed) ($.Values.environmentStubbed.microtestStubbed)) }}
---
apiVersion: v1
data:
  microtestclientcert.pfx: {{ .Values.microtestClientCrtStubbed }}
kind: Secret
metadata:
  name: microtest-client-cert-pfx-stubbed-{{ .Chart.AppVersion }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
type: Opaque
---
apiVersion: v1
data:
  password: {{ .Values.microtestClientCrtPasswordStubbed }}
kind: Secret
metadata:
  name: microtest-client-cert-pfx-password-stubbed-{{ .Chart.AppVersion }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
 {{- end }}
 {{- end }}
