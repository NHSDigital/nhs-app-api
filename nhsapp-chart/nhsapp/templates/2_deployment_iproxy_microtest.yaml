{{- if $.Values.iproxy_microtest.deployMicrotest }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Values.iproxy_microtest.role }}-{{ .Chart.AppVersion | replace "." "-" }}
  namespace: {{ $.Values.global.environment }}
  labels:
    app: {{ $.Values.iproxy_microtest.role }}
    version: {{ .Chart.AppVersion | quote }}
spec:
  selector:
    matchLabels:
      app: {{ template "nhsapp.name" . }}-{{ $.Values.iproxy_microtest.role }}
      version: {{ .Chart.AppVersion | quote }}
  template:
    metadata:
      labels:
        app: {{ template "nhsapp.name" . }}-{{ $.Values.iproxy_microtest.role }}
        role: {{ $.Values.iproxy_microtest.role }}
        version: {{ .Chart.AppVersion | quote }}
      annotations:
        chaos.alpha.kubernetes.io/enabled: "true"
        rolleveryrelease: {{ randAlphaNum 5 | quote }}
    spec:
      volumes:
      - name: wildcard-namespace-cert
        secret:
          secretName: wildcard-{{ $.Values.global.environment }}-tls-{{ .Chart.AppVersion }}
      - name: iproxy-config
        configMap:
          name: iproxy-microtest-config-{{ .Chart.AppVersion }}
      - name: microtest-crt
        secret:
          secretName: microtest-cert-{{ .Chart.AppVersion }}
      containers:
      - name: iproxy-microtest
        image: {{ $.Values.registry }}/{{ $.Values.iproxy_microtest.image }}:{{ $.Values.iproxy_microtest.image_tag }}
        imagePullPolicy: {{ $.Values.iproxy_microtest.imagePullPolicy }}
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
        ports:
        - containerPort: {{ $.Values.iproxy_microtest.containerPort }}
        resources:
          requests:
            memory: {{ $.Values.iproxy_microtest.memoryRequest }}
            cpu: {{ $.Values.iproxy_microtest.cpuRequest }}
          limits:
            memory: {{ $.Values.iproxy_microtest.memoryLimit }}
            cpu: {{ $.Values.iproxy_microtest.cpuLimit }}
        env:
        - name: MICROTEST_CERT_PATH
          value: "/etc/nginx/ssl_microtest/microtest.pfx"
        - name: MICROTEST_CERT_PASSPHRASE
          valueFrom:
            secretKeyRef:
              name: microtest-{{ .Chart.AppVersion }}
              key: password
{{- with $.Values.iproxy_microtest.environmentVariables }}
{{ toYaml . | trim | indent 8 }}
{{- end }}
        volumeMounts:
        - name: wildcard-namespace-cert
          mountPath: /etc/nginx/ssl
        - name: iproxy-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: microtest-crt
          mountPath: /etc/nginx/ssl_microtest
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 2
      imagePullSecrets:
        - name: azure-registry-{{ .Chart.AppVersion }}
      dnsConfig:
        options:
          - name: single-request-reopen
{{- end }}
