---
apiVersion: v1
data:
  password: {{ .Values.tppCertPassword }}
kind: Secret
metadata:
  name: tpp-{{ .Chart.AppVersion }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
type:
  Opaque
---
apiVersion: v1
data:
  tpp.pfx: {{ .Values.tppCert }}
kind: Secret
metadata:
  name: tpp-cert-{{ .Chart.AppVersion }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
type:
  Opaque
