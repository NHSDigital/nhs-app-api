---
apiVersion: v1
data:
  password: {{ .Values.ndopCertPassword }}
kind: Secret
metadata:
  name: ndop-cert-password-{{ .Chart.AppVersion }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
type: Opaque
---
apiVersion: v1
data:
  ndop.pfx: {{ .Values.ndopCert }}
kind: Secret
metadata:
  name: ndop-cert-{{ .Chart.AppVersion }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
type: Opaque
