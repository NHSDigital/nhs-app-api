---
apiVersion: autoscaling/v2beta2
kind: HorizontalPodAutoscaler
metadata:
  labels:
    app: {{ template "nhsapp.name" . }}-{{ $.Values.iproxy.role }}
    role: {{ $.Values.iproxy.role }}
    version: {{ .Chart.AppVersion | quote }}
  name: {{ template "nhsapp.name" . }}-{{ $.Values.iproxy.role }}-{{ .Chart.AppVersion | replace "." "-" }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $.Values.iproxy.role }}-{{ .Chart.AppVersion | replace "." "-" }}
  minReplicas: {{ $.Values.iproxy.minReplicas }}
  maxReplicas: {{ $.Values.iproxy.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $.Values.iproxy.targetCPUUtilizationPercentage }}
