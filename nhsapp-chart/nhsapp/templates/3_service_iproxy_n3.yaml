{{- if $.Values.iproxy.n3enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: iproxy-n3-{{ .Chart.AppVersion | replace "." "-" }}
  namespace: {{ $.Values.global.environment }}
  labels:
    app: {{ $.Values.iproxy.role }}-n3
    role: {{ $.Values.iproxy.role }}
    version: {{ .Chart.AppVersion | quote }}
spec:
  selector:
    role: {{ $.Values.iproxy.role }}
    version: {{ .Chart.AppVersion | quote }}
  ports:
  - name: https
    protocol: TCP
    port: {{ $.Values.iproxy.containerPort }}
    targetPort: {{ $.Values.iproxy.containerPort }}
{{- end }}
