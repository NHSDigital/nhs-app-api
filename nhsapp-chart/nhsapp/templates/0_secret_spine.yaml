---
apiVersion: v1
data:
  password: {{ .Values.spinePfxPassword }}
kind: Secret
metadata:
  name: spine-password-{{ .Chart.AppVersion }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
type:
  Opaque
---
apiVersion: v1
data:
  spine.pfx: {{ .Values.spinePfx }}
kind: Secret
metadata:
  name: spine-cert-{{ .Chart.AppVersion }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
type:
  Opaque
---
apiVersion: v1
data:
  secret: {{ .Values.spinePartyId }}
kind: Secret
metadata:
  name: spine-party-id-{{ .Chart.AppVersion }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
type:
  Opaque
