---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sidecar-proxy-config-{{ .Chart.AppVersion }}
  namespace: {{ $.Values.global.environment }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
data:
  nginx.conf: |-
    worker_processes  2;

    error_log  /var/log/nginx/error.log warn;
    pid        /var/run/nginx.pid;

    events {
        worker_connections  8000;
    }
    worker_rlimit_nofile    16000;

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        sendfile        on;
        keepalive_timeout  65;

        upstream application {
            keepalive 32;
            keepalive_requests 100;
            keepalive_timeout 60s;
            server 127.0.0.1:8080;
        }

        log_format upstream_time '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';


        log_format splunk_logs 'time=$time_iso8601 '
                               'request_method=$request_method '
                               'request_uri="$request_uri" '
                               'user_agent="$http_user_agent" '
                               'status=$status '
                               'language_preference="$http_accept_language" '
                               'response_size_bytes=$bytes_sent '
                               'duration_seconds=$request_time '
                               'correlation_id="$http_nhso_request_id"';

        server {
            listen {{ $.Values.sidecar_proxy.containerPort }} ssl;
            ssl_prefer_server_ciphers on;
            ssl_protocols TLSv1.2;
            ssl_certificate     /etc/nginx/ssl/tls.crt;
            ssl_certificate_key /etc/nginx/ssl/tls.key;
            ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256;

            # General Config
            server_tokens off;

            # Proxy Config
            proxy_buffering off;
            proxy_redirect  off;
            proxy_buffer_size 1024k;
            proxy_buffers 4 2048k;
            proxy_busy_buffers_size 2048k;
            proxy_http_version 1.1;

            access_log /var/log/nginx/access.log splunk_logs;

            location / {
                proxy_pass http://application;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Connection "";
            }
        }
    }
