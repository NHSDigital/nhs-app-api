---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: 'false'
    nginx.ingress.kubernetes.io/secure-backends: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers 'X-Xss-Protection: 1; mode=block';
      more_set_headers 'X-Frame-Options: DENY';
      more_set_headers 'X-Content-Type-Options: nosniff';
      more_set_headers 'Referrer-Policy: no-referrer';
      more_set_headers 'Content-Security-Policy: frame-src \'self\' https://nhs.demdex.net/ https://assets.adobedtm.com *.112.2o7.net https://*.hotjar.com https://feedback.digital.nhs.uk/ https://*.qualtrics.com; frame-ancestors \'self\'; object-src \'none\'';
      more_clear_headers 'server';
  name: {{ template "nhsapp.name" . }}-{{ $.Values.web.role }}-{{ .Chart.AppVersion | replace "." "-" }}
  namespace: {{ $.Values.global.environment }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
spec:
  rules:
    {{- if .Values.createDefaultIngress }}
    - host: www-{{ $.Values.global.environment | replace "." "-" }}.{{ $.Values.zone }}.{{ $.Values.domain }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-{{ $.Values.web.role }}-{{ .Chart.AppVersion | replace "." "-" }}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
    {{- end }}
    - host: www-{{ $.Values.global.environment | replace "." "-" }}-{{ .Chart.AppVersion | replace "." "-" }}.{{ $.Values.zone }}.{{ $.Values.domain }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-{{ $.Values.web.role }}-{{ .Chart.AppVersion | replace "." "-" }}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
    {{- if eq .Values.zone .Values.global.environment }}
    - host: www.{{ $.Values.zone }}.{{ $.Values.domain }}
      http:
        paths:
          - path: /{{ $.Values.web.image_tag | replace "." "-" }}
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-{{ $.Values.web.role }}-{{ .Chart.AppVersion | replace "." "-" }}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
    {{- end }}
  tls:
    - hosts:
        - www-{{ $.Values.global.environment | replace "." "-" }}.{{ $.Values.zone }}.{{ $.Values.domain }}
        - www-{{ $.Values.global.environment | replace "." "-" }}-{{ .Chart.AppVersion | replace "." "-" }}.{{ $.Values.zone }}.{{ $.Values.domain }}
      {{- if eq (default $.Values.zone "dev") .Values.global.environment }}
        - www.{{ $.Values.zone }}.{{ $.Values.domain }}
      {{- end }}
      secretName: {{ $.Values.zone }}-{{ $.Values.domain | replace "." "-" }}
