---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: 'false'
    nginx.ingress.kubernetes.io/secure-backends: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-body-size: "3m"
    nginx.ingress.kubernetes.io/use-regex: "true"
  name: {{ template "nhsapp.name" . }}-private-api-{{ .Chart.AppVersion | replace "." "-" }}
  namespace: {{ $.Values.global.environment }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
spec:
  rules:
    {{- if .Values.createDefaultPrivateIngress }}
    {{- /*
      The paths here should match the block below and the private ingress in the redirector chart:
      https://dev.azure.com/nhsapp/NHS%20App/_git/nhsapp-ops-redirector-chart?path=%2Ftemplates%2Fprivate_api_ingress.yaml
    */}}
    - host: api-{{ $.Values.global.environment | replace "." "-" }}.private.{{ $.Values.zone }}.{{ $.Values.domain }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-api-{{ .Chart.AppVersion | replace "." "-" }}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
    {{- end }}
    - host: api-{{ $.Values.global.environment | replace "." "-" }}-{{ .Chart.AppVersion | replace "." "-" }}.private.{{ $.Values.zone }}.{{ $.Values.domain }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-api-{{ .Chart.AppVersion | replace "." "-" }}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
  tls:
    - hosts:
        - api-{{ $.Values.global.environment | replace "." "-" }}.private.{{ $.Values.zone }}.{{ $.Values.domain }}
        - api-{{ $.Values.global.environment | replace "." "-" }}-{{ .Chart.AppVersion | replace "." "-" }}.private.{{ $.Values.zone }}.{{ $.Values.domain }}
      secretName: private-{{ $.Values.zone }}-{{ $.Values.domain | replace "." "-" }}
