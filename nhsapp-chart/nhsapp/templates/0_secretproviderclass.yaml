---
apiVersion: secrets-store.csi.x-k8s.io/v1alpha1
kind: SecretProviderClass
metadata:
  name: nhsapp-{{ $.Values.zone }}-{{ .Chart.AppVersion }}
spec:
  provider: azure
  secretObjects:
    - data:
        - key: password
          objectName: nhsloginKey
      secretName: nhslogin-key-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: password
          objectName: emisPassword
      secretName: emiscert-password-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: password
          objectName: cosmosdbDevicesKey
      secretName: cosmosdb-devices-key-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: password
          objectName: cosmosdbKey
      secretName: cosmosdb-key-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: cert
          objectName: emiscert
      secretName: emiscert-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: cert
          objectName: visionClientCert
      secretName: vision-client-cert-pfx-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: cert
          objectName: spineCert
      secretName: spine-cert-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: secret
          objectName: spineCrt
      secretName: spine-crt-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: secret
          objectName: spineKey
      secretName: spine-key-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: cert
          objectName: microtestcert
      secretName: microtest-cert-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: password
          objectName: microtestKey
      secretName: microtest-crt-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: password
          objectName: microtestCrt
      secretName: microtest-key-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: password
          objectName: notificationHubSharedAccessKey
      secretName: notification-hub-shared-access-key-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: password
          objectName: microtestPfxPassword
      secretName: microtest-{{ .Chart.AppVersion }}
      type: Opaque    
    - data:
        - key: password
          objectName: nhsloginPassword
      secretName: nhslogin-key-password-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: apikey
          objectName: gpLookupApiKey
      secretName: gp-lookup-api-key-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: apikey
          objectName: qualtricsApiKey
      secretName: qualtrics-api-key-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: apikey
          objectName: nhsAppApiKey
      secretName: nhsapp-api-key-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: password
          objectName: organdonationSubscription
      secretName: organdonation-subscription-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: password
          objectName: tppCertificatePassword
      secretName: tpp-cert-password-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: password
          objectName: visionClientCertificatePfxPassword
      secretName: vision-client-cert-pfx-password-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: password
          objectName: visionClientCertPasswordStubbed
      secretName: vision-client-cert-pfx-stubbed-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: password
          objectName: ndopPassword
      secretName: ndop-cert-password-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: session.key
          objectName: sessionKey
      secretName: session-key-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: organdonation.pfx
          objectName: organdonationpfx
      secretName: organdonation-cert-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: password
          objectName: organdonationcertpass
      secretName: organdonation-{{ .Chart.AppVersion }}
      type: Opaque    
    - data:
        - key: tppPfx
          objectName: tppPfx
      secretName: tpp-cert-{{ .Chart.AppVersion }}
      type: Opaque
    - data:
        - key: secret
          objectName: spinePartyId
      secretName: spine-party-id-{{ .Chart.AppVersion }}
      type: Opaque
