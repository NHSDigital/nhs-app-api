        - key: secret
          objectName: spineCertPassword
      secretName: spine-certificate-password-{{ .Chart.AppVersion }}
      type: Opaque
  parameters:
    useVMManagedIdentity: "true"
    keyvaultName: "nhsapp-{{ $.Values.zone }}"
    objects: |
      array:
        - |
          objectName: emisPassword
          objectType: secret
        - |
          objectName: cosmosdbDevicesKey
          objectType: secret
        - |
          objectName: cosmosdbKey
          objectType: secret
        - |
          objectName: cosmosdbMongoKey
          objectType: secret
        - |
          objectName: gpLookupApiKey
          objectType: secret
        - |
          objectName: qualtricsApiKey
          objectType: secret
        - |
          objectName: nhsAppApiKey
          objectType: secret
        - |
          objectName: tppCertificatePassword
          objectType: secret
        - |
          objectName: visionPfx
          objectType: secret
          objectFormat: pfx
          objectEncoding: base64
        - |
          objectName: visionClientCertPasswordStubbed
          objectType: secret
        - |
          objectName: visionClientCertificatePfxPassword
          objectType: secret
        - |
          objectName: sessionKey
          objectType: secret
        - |
          objectName: organdonationpfx
          objectType: secret
          objectFormat: pfx
          objectEncoding: base64
        - |
          objectName: organdonationSubscription
          objectType: secret
        - |
          objectName: notificationHubSharedAccessKey
          objectType: secret
        - |
          objectName: ndopPfx
          objectType: secret
          objectFormat: pfx
          objectEncoding: base64
        - |
          objectName: ndopPassword
          objectType: secret
        - |
          objectName: nhsloginPassword
          objectType: secret
        - |
          objectName: nhsloginKey
          objectType: secret
        - |
          objectName: tppPfx
          objectType: secret
          objectFormat: pfx
          objectEncoding: base64
        - |
          objectName: spineCert
          objectType: cert
        - |
          objectName: spineCrt
          objectType: secret
        - |          
          objectName: spineKey
          objectType: secret
        - |
          objectName: emiscert
          objectType: cert
        - |
          objectName: spinePartyId
          objectType: secret
        - |
          objectName: microtestcert
          objectType: cert
        - |
          objectName: microtestCrt
          objectType: secret
        - |
          objectName: microtestKey
          objectType: secret
        - |
          objectName: microtestPfxPassword
          objectType: secret
