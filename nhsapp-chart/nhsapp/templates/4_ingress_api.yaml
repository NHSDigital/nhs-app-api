{{- if $.Values.api.createIngress -}}
---
apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: 'false'
    nginx.ingress.kubernetes.io/secure-backends: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-body-size: "3m"
  name: {{ template "nhsapp.name" . }}-api-{{ .Chart.AppVersion | replace "." "-" }}
  namespace: {{ $.Values.global.environment }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
spec:
  rules:
    - host: api-{{ $.Values.global.environment | replace "." "-" }}.{{ $.Values.zone }}.{{ $.Values.domain }}
      http:
        paths:
          - backend:
              serviceName: {{ template "nhsapp.name" . }}-api-{{ .Chart.AppVersion | replace "." "-" }}
              servicePort: {{ $.Values.sidecar_proxy.containerPort }}
            path: /
          {{- if $.Values.loggerEnabled }}
          - backend:
              serviceName: {{ template "nhsapp.name" . }}-logger-{{ .Chart.AppVersion  | replace "." "-" }}
              servicePort: {{ $.Values.sidecar_proxy.containerPort }}
            path: /v1/api/log
          {{- end }}
    - host: api-{{ $.Values.global.environment | replace "." "-" }}-{{ .Chart.AppVersion | replace "." "-" }}.{{ $.Values.zone }}.{{ $.Values.domain }}
      http:
        paths:
          - backend:
              serviceName: {{ template "nhsapp.name" . }}-api-{{ .Chart.AppVersion | replace "." "-" }}
              servicePort: {{ $.Values.sidecar_proxy.containerPort }}
            path: /
          {{- if $.Values.loggerEnabled }}
          - backend:
              serviceName: {{ template "nhsapp.name" . }}-logger-{{ .Chart.AppVersion  | replace "." "-" }}
              servicePort: {{ $.Values.sidecar_proxy.containerPort }}
            path: /v1/api/log
          {{- end }}

  tls:
    - hosts:
      - api-{{ $.Values.global.environment | replace "." "-" }}.{{ $.Values.zone }}.{{ $.Values.domain }}
      - api-{{ $.Values.global.environment | replace "." "-" }}-{{ .Chart.AppVersion | replace "." "-" }}.{{ $.Values.zone }}.{{ $.Values.domain }}
      secretName: {{ $.Values.zone }}-{{ $.Values.domain | replace "." "-" }}
{{- end }}
