---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: 'false'
    nginx.ingress.kubernetes.io/secure-backends: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-body-size: "3m"
    nginx.ingress.kubernetes.io/use-regex: "true"
  name: {{ template "nhsapp.name" . }}-api-{{ .Chart.AppVersion | replace "." "-" }}
  namespace: {{ $.Values.global.environment }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
spec:
  rules:
    {{- if .Values.createDefaultIngress }}
    - host: api-{{ $.Values.global.environment | replace "." "-" }}.{{ $.Values.zone }}.{{ $.Values.domain }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-api-{{ .Chart.AppVersion | replace "." "-" }}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
          - path: /v[1,2]/api/users/info
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-info-{{ .Chart.AppVersion | replace "." "-"}}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
          - path: /v[1,2]/api/users/me/info
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-info-{{ .Chart.AppVersion | replace "." "-"}}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
          {{- if $.Values.messagesEnabled }}
          - path: /v[1,2]/api/users/me/messages
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-messages-{{ .Chart.AppVersion | replace "." "-"}}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
          - path:  /v[1,2]/api/users/([A-Za-z0-9-#]{36,37})/messages
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-messages-{{ .Chart.AppVersion | replace "." "-"}}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
          {{- end }}
          - path: /v1/api/log
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-logger-{{ .Chart.AppVersion  | replace "." "-" }}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
          - path: /v[1,2]/api/users
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-users-{{ .Chart.AppVersion | replace "." "-" }}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
    {{- end }}
    - host: api-{{ $.Values.global.environment | replace "." "-" }}-{{ .Chart.AppVersion | replace "." "-" }}.{{ $.Values.zone }}.{{ $.Values.domain }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
             service:
              name: {{ template "nhsapp.name" . }}-api-{{ .Chart.AppVersion | replace "." "-" }}
              port:
                number: {{ $.Values.sidecar_proxy.containerPort }}
          - path: /v[1,2]/api/users/info
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-info-{{ .Chart.AppVersion | replace "." "-"}}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
          - path: /v[1,2]/api/users/me/info
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-info-{{ .Chart.AppVersion | replace "." "-"}}
                port:
                 number: {{ $.Values.sidecar_proxy.containerPort }}
          {{- if $.Values.messagesEnabled }}
          - path: /v[1,2]/api/users/me/messages
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-messages-{{ .Chart.AppVersion | replace "." "-"}}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
          - path: /v[1,2]/api/users/([A-Za-z0-9-#]{36,37})/messages
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-messages-{{ .Chart.AppVersion | replace "." "-"}}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
          {{- end }}
          - path: /v1/api/log
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-logger-{{ .Chart.AppVersion  | replace "." "-" }}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}
          - path: /v[1,2]/api/users
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "nhsapp.name" . }}-users-{{ .Chart.AppVersion | replace "." "-" }}
                port:
                  number: {{ $.Values.sidecar_proxy.containerPort }}

  tls:
    - hosts:
        - api-{{ $.Values.global.environment | replace "." "-" }}.{{ $.Values.zone }}.{{ $.Values.domain }}
        - api-{{ $.Values.global.environment | replace "." "-" }}-{{ .Chart.AppVersion | replace "." "-" }}.{{ $.Values.zone }}.{{ $.Values.domain }}
      secretName: {{ $.Values.zone }}-{{ $.Values.domain | replace "." "-" }}
