---
apiVersion: autoscaling/v2beta1
kind: HorizontalPodAutoscaler
metadata:
  labels:
    app: {{ template "nhsapp.name" . }}-{{ $.Values.cid.role }}
    role: {{ $.Values.cid.role }}
    version: {{ .Chart.AppVersion | quote }}
  name: {{ template "nhsapp.name" . }}-{{ $.Values.cid.role }}-{{ .Chart.AppVersion | replace "." "-" }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ template "nhsapp.name" . }}-{{ $.Values.cid.role }}-{{ .Chart.AppVersion | replace "." "-" }}
  minReplicas: {{ $.Values.cid.minReplicas }}
  maxReplicas: {{ $.Values.cid.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        targetAverageUtilization: {{ $.Values.cid.targetCPUUtilizationPercentage }}
