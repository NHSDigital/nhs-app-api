---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "nhsapp.name" . }}-{{ $.Values.web.role }}-{{ .Chart.AppVersion | replace "." "-" }}
  namespace: {{ $.Values.global.environment }}
  labels:
    app: {{ template "nhsapp.name" . }}-{{ $.Values.web.role }}
    version: {{ .Chart.AppVersion | quote }}
  annotations:
    collectord.io/www--logs-replace.1-search: 'http_referrer="(?P<referrer_url>[^?]+)\?[^"]+"'
    collectord.io/www--logs-replace.1-val: 'http_referrer="${referrer_url}?<query_string_redacted>"'
spec:
  selector:
    matchLabels:
      app: {{ template "nhsapp.name" . }}-{{ $.Values.web.role }}
      version: {{ .Chart.AppVersion | quote }}
  template:
    metadata:
      labels:
        app: {{ template "nhsapp.name" . }}-{{ $.Values.web.role }}
        role: {{ $.Values.web.role }}
        version: {{ .Chart.AppVersion | quote }}
      annotations:
        chaos.alpha.kubernetes.io/enabled: "true"
        rolleveryrelease: {{ randAlphaNum 5 | quote }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: role
                  operator: In
                  values:
                  - {{ $.Values.web.role }}
              topologyKey: kubernetes.io/hostname
      volumes:
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "nhsapp-{{ $.Values.zone }}-{{ .Chart.AppVersion }}"
      - name: wildcard-namespace-cert
        secret:
          secretName: wildcard-{{ $.Values.global.environment }}-tls-{{ .Chart.AppVersion }}
      - name: internal-ca-public-key
        secret:
          secretName: internal-ca-public-key
      - name: sidecar-proxy-config
        configMap:
          name: sidecar-proxy-config-{{ .Chart.AppVersion }}
      containers:
      - name: www
        image: {{ $.Values.registry }}/{{ $.Values.web.image }}:{{ $.Values.web.image_tag }}
        imagePullPolicy: {{ $.Values.web.imagePullPolicy }}
        lifecycle:
          {{- include "nhsapp.preStopHook" . | indent 12 }}
        ports:
        - containerPort: {{ $.Values.web.containerPort }}
        resources:
          requests:
            memory: {{ $.Values.web.memoryRequest }}
            cpu: {{ $.Values.web.cpuRequest }}
          limits:
            memory: {{ $.Values.web.memoryLimit }}
            cpu: {{ $.Values.web.cpuLimit }}
        env:
{{- with $.Values.web.environmentVariables }}
{{ toYaml . | trim | indent 8  }}
{{- end }}
        - name: PORT
          value: "{{ $.Values.web.containerPort }}"
        - name: THIRD_PARTY_JUMP_OFF_LOGGING_ENABLED
          value: "{{ $.Values.web.thirdPartyJumpOffLoggingEnabled }}"
        - name: ANALYTICS_ENVIRONMENT
          value: "{{ $.Values.web.analyticsEnvironment }}"
        - name: ANALYTICS_SCRIPT_URL
          value: "{{ $.Values.web.analyticsURL }}"
        - name: SECURE_COOKIES
          value: "true"
        - name: URI_FORMAT_CID_REDIRECT_WEB
          value: "https://www{host}"
        - name: URI_FORMAT_API_CLIENT
          value: "https://api{host}"
        - name: API_BASE_URL
          value: "https://api-{{ $.Values.global.environment }}-{{ .Chart.AppVersion | replace "." "-" }}.{{ $.Values.zone }}.{{ $.Values.domain }}"
        {{- if $.Values.environmentStubbed.cidStubbed }}
        - name: CID_AUTH_ENDPOINT_URL
          value: "https://wiremock-{{ $.Values.global.environment }}.{{ $.Values.zone }}.{{ $.Values.domain }}/citizenid/authorize"
        - name: CID_SETTINGS_URL
          value: "https://wiremock-{{ $.Values.global.environment }}.{{ $.Values.zone }}.{{ $.Values.domain }}/citizenid/settings"
        {{- else if $.Values.environmentStubbed.useExternalStubs }}
        - name: CID_AUTH_ENDPOINT_URL
          value: "{{ $.Values.environmentStubbed.externalStubsBaseUrl }}/citizenid/authorize"
        - name: CID_SETTINGS_URL
          value: "{{ $.Values.environmentStubbed.externalStubsBaseUrl }}/citizenid/settings"
        {{- else }}
        - name: CID_AUTH_ENDPOINT_URL
          value: "{{ $.Values.cidProtocol }}://{{ $.Values.cidHostname }}/authorize"
        - name: CID_SETTINGS_URL
          value: "{{ $.Values.cidProtocol }}://{{ $.Values.cidSettingsHostName }}"
        {{- end }}
        - name: CID_CLIENT_ID
          value: "{{ $.Values.cidClientID }}"
        - name: CID_P5_VECTOR_OF_TRUST_ENABLED
          value: "{{ $.Values.cidP5VectorOfTrustEnabled }}"
        - name: HOTJAR_SITE_ID
          value: "{{ $.Values.web.hotjarSiteId }}"
        - name: DATA_PREFERENCES_URL
        {{- if $.Values.environmentStubbed.ndopStubbed }}
          value: https://wiremock-{{ $.Values.global.environment }}.{{ $.Values.zone }}.{{ $.Values.domain }}/ndop/createsession
        {{- else if $.Values.environmentStubbed.useExternalStubs }}
          value: "{{ $.Values.environmentStubbed.externalStubsBaseUrl }}/ndop/createsession"
        {{- else }}
          value: "{{ $.Values.web.dataPreferencesUrl }}"
        {{- end }}
        - name: VERSION_TAG
          value: "{{ $.Values.web.image_tag }}"
        - name: BLOOD_DONATION_URL
          value: "{{ $.Values.web.bloodDonationUrl }}"
        - name: GP_MESSAGES_ENABLED
          value: "{{ $.Values.patientPracticeMessagingEnabled }}"
        - name: USER_RESEARCH_ENABLED
          value: "{{ $.Values.userResearchEnabled }}"
        - name: SIXTEEN_WEEKS_SLOTS_ENABLED
          value: "{{ $.Values.sixteenWeeksSlotsEnabled }}"
        - name: WELL_KNOWN_ANDROID_PACKAGE_NAME
          value: "{{ $.Values.wellKnownAndroidPackageName }}"
        - name: WELL_KNOWN_ANDROID_FINGERPRINT
          value: "{{ $.Values.wellKnownAndroidFingerPrint }}"
        - name: WELL_KNOWN_IOS_APP_ID
          value: "{{ $.Values.wellKnownIOSAppId }}"
        - name: ADD_APPOINTMENT_TO_CALENDAR_ENABLED
          value: "{{ $.Values.addAppointmentToCalendarEnabled }}"
        - name: ORGAN_DONATION_INTEGRATION_ENABLED
          value: "true"
        - name: HOTJAR_SURVEY_URL
          value: "https://in.hotjar.com/s?siteId=859152&surveyId=95785"
        - name: HOTJAR_SURVEY_VISIBLE
          value: "false"
        - name: QUALTRICS_SURVEY_ENABLED
          value: "{{ $.Values.web.qualtricsSurveyEnabled }}"
        - name: CE_MARK_ENABLED
          value: "false"
        - name: SESSION_EXPIRING_WARNING_SECONDS
          value: "60"
        - name: SYMPTOM_CHECKER_URL
          value: "https://111.nhs.uk"
        - name: SYMPTOM_CHECKER_WALES_URL
          value: "https://111.wales.nhs.uk"
        - name: CONDITIONS_CHECKER_URL
          value: "https://www.nhs.uk/conditions/"
        - name: CORONA_SERVICE_URL
          value: "https://111.nhs.uk/service/COVID-19/"
        - name: CORONA_CONDITIONS_URL
          value: "https://www.nhs.uk/conditions/coronavirus-covid-19/"
        - name: MY_HEALTH_ONLINE
          value: "https://111.wales.nhs.uk/contactus/myhealthonline/"
        - name: ORGAN_DONATION_PRIVACY_URL
          value: "https://www.organdonation.nhs.uk/app/app-privacy/"
        - name: ORGAN_DONATION_ALREADY_REGISTERED_URL
          value: "https://www.organdonation.nhs.uk/app/app-check/"
        - name: ORGAN_DONATION_FIND_OUT_MORE_URL
          value: "https://www.organdonation.nhs.uk/app/app-donation/"
        - name: ORGAN_DONATION_LAW_CHANGE_URL
          value: "https://www.organdonation.nhs.uk/app/app-law/"
        - name: ORGAN_DONATION_SHARE_DECISION_URL
          value: "https://www.organdonation.nhs.uk/app/app-share/"
        - name: ORGAN_DONATION_TELL_FAMILY_URL
          value: "https://www.organdonation.nhs.uk/app/app-tell/"
        - name: BLOOD_DONATION_URL
          value: "https://www.blood.co.uk/"  
        - name: CONTACT_US_URL
          value: "https://www.nhs.uk/contact-us/nhs-app-contact-us"
        - name: COOKIES_BANNER_URL
          value: "https://www.nhs.uk/using-the-nhs/nhs-services/the-nhs-app/cookies-policy#manage"
        - name: PRIVACY_POLICY_URL
          value: "https://www.nhs.uk/nhs-app/nhs-app-legal-and-cookies/nhs-app-privacy-policy/privacy-policy/"
        - name: ONLINE_CONSULTATIONS_PRIVACY_URL
          value: "https://www.nhs.uk/using-the-nhs/nhs-services/the-nhs-app/privacy/online-consultations/"
        - name: CLINICAL_ABBREVIATIONS_URL
          value: "https://www.nhs.uk/using-the-nhs/nhs-services/the-nhs-app/abbreviations/"
        - name: HEALTH_RECORDS_HELP_AND_SUPPORT_URL
          value: "https://www.nhs.uk/nhs-services/online-services/nhs-app/nhs-app-help-and-support/health-records/"
        - name: PERSONAL_HEALTH_RECORDS_PRIVACY_URL
          value: "https://www.nhs.uk/nhs-app/nhs-app-legal-and-cookies/nhs-app-privacy-policy/personal-health-records/"
        - name: YOUR_NHS_DATA_MATTERS_URL
          value: "https://www.nhs.uk/your-nhs-data-matters/"
        - name: OTHER_WAYS_TO_MAKE_A_CHOICE_URL
          value: "https://www.nhs.uk/your-nhs-data-matters/manage-your-choice/other-ways-to-manage-your-choice/"
        - name: TERMS_AND_CONDITIONS_URL
          value: "https://www.nhs.uk/nhs-app/nhs-app-legal-and-cookies/nhs-app-terms-of-use/"
        - name: COOKIES_POLICY_URL
          value: "https://www.nhs.uk/nhs-app/nhs-app-legal-and-cookies/nhs-app-cookies-policy/"
        - name: ACCESSIBILITY_STATEMENT_URL
          value: "https://www.nhs.uk/nhs-app/nhs-app-legal-and-cookies/nhs-app-accessibility-statement/"  
        - name: OPEN_SOURCE_LICENCES_URL
          value: "https://www.nhs.uk/nhs-app/nhs-app-legal-and-cookies/nhs-app-open-source-licences/"    
        - name: NOMINATED_PHARMACY_DSP_URL
          value: "https://www.nhs.uk/Service-Search/other-services/pharmacies/internetpharmacies"
        - name: GPATHAND_APP_DOWNLOAD_URL
          value: "https://www.gpathand.nhs.uk/download-app"
        - name: EMERGENCY_PRESCRIPTIONS_URL
          value: "https://111.nhs.uk/emergency-prescription/"
        - name: INFORMATICA_URL
          value: "https://the-andover-health-centre-medical-practice.appointments-online.co.uk/"  
        - name: SYMPTOM_CHECKER_NORTHERN_IRELAND_URL
          value: "https://www.nidirect.gov.uk/articles/gp-out-hours-service"
        - name: COVID_STATUS_URL
          value: "https://covid-status.service.nhsx.nhs.uk"
        - name: COVID_PASS_URL
          value: "https://www.nhs.uk/conditions/coronavirus-covid-19/covid-pass"
        - name: VUE_WINDOW_OBJECT_ENABLED
          value: "{{ $.Values.webVueGlobalObject }}"
        - name: GP_SESSION_ON_DEMAND_ENABLED
          value: "{{ $.Values.gpSessionOnDemandEnabled }}"
        - name: BASE_NHS_APP_HELP_URL
          value: "{{ $.Values.web.baseNhsAppHelpUrl }}"
        - name: XAMARIN_INITIAL_RELEASE_VERSION
          value: "1.99.0"
        volumeMounts:
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true
        - name: internal-ca-public-key
          mountPath: /usr/local/share/ca-certificates
          readOnly: true
        livenessProbe:
          httpGet:
            port: 8080
            path: /healthz
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 1

        readinessProbe:
          httpGet:
            port: 8080
            path: /login
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 2

      - name: proxy
        image: {{ $.Values.registry }}/{{ $.Values.sidecar_proxy.image }}:{{ $.Values.sidecar_proxy.image_tag }}
        imagePullPolicy: {{ $.Values.sidecar_proxy.imagePullPolicy }}
        lifecycle:
          {{- include "nhsapp.preStopHook" . | indent 12 }}
        ports:
        - containerPort: {{ $.Values.sidecar_proxy.containerPort }}
        resources:
          requests:
            memory: {{ $.Values.sidecar_proxy.memoryRequest }}
            cpu: {{ $.Values.sidecar_proxy.cpuRequest }}
          limits:
            memory: {{ $.Values.sidecar_proxy.memoryLimit }}
            cpu: {{ $.Values.sidecar_proxy.cpuLimit }}
        volumeMounts:
        - name: wildcard-namespace-cert
          mountPath: /etc/nginx/ssl
        - name: wildcard-namespace-cert
          mountPath: /usr/local/share/ca-certificates
          readOnly: true
        - name: sidecar-proxy-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        livenessProbe:
          httpGet:
            scheme: HTTPS
            port: 8443
            path: /healthz
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 1

        readinessProbe:
          httpGet:
            scheme: HTTPS
            port: 8443
            path: /login
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 2

      hostAliases:
      - ip: "{{ trimSuffix "/32" $.Values.clusterIP }}"
        hostnames:
        - "api-{{ $.Values.global.environment }}-{{ .Chart.AppVersion | replace "." "-" }}.{{ $.Values.zone }}.{{ $.Values.domain }}"
        - "www-{{ $.Values.global.environment }}-{{ .Chart.AppVersion | replace "." "-" }}.{{ $.Values.zone }}.{{ $.Values.domain }}"
      imagePullSecrets:
      - name: azure-registry-{{ .Chart.AppVersion }}
      dnsConfig:
        options:
        - name: single-request-reopen
