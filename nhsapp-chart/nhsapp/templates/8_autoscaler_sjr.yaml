---
apiVersion: autoscaling/v2beta2
kind: HorizontalPodAutoscaler
metadata:
  labels:
    app: {{ template "nhsapp.name" . }}-{{ $.Values.sjr.role }}
    role: {{ $.Values.sjr.role }}
    version: {{ .Chart.AppVersion | quote }}
  name: {{ template "nhsapp.name" . }}-{{ $.Values.sjr.role }}-{{ .Chart.AppVersion | replace "." "-" }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ template "nhsapp.name" . }}-{{ $.Values.sjr.role }}-{{ .Chart.AppVersion | replace "." "-" }}
  minReplicas: {{ $.Values.sjr.minReplicas }}
  maxReplicas: {{ $.Values.sjr.maxReplicas }}
  behavior: 
    {{ $.Values.scaling.dotnet | toYaml | indent 4 | trim }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $.Values.sjr.targetCPUUtilizationPercentage }}
