---
apiVersion: v1
kind: ConfigMap
metadata:
  name: iproxy-config-{{ .Chart.AppVersion }}
  namespace: {{ $.Values.global.environment }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
data:
  nginx.conf: |-
    worker_processes  1;
    load_module modules/ngx_http_upstream_jdomain_module.so;
    error_log  /var/log/nginx/error.log warn;
    pid        /var/run/nginx.pid;

    events {
        worker_connections  1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        sendfile        on;
        keepalive_timeout  65;

        server_names_hash_bucket_size 128;

        log_format splunk_logs 'time=$time_iso8601 '
                        'request_method=$request_method '
                        'request_uri="$request_uri" '
                        'status=$status '
                        'response_size_bytes=$bytes_sent '
                        'duration_seconds=$request_time';

        resolver 8.8.8.8 8.8.4.4;

        upstream cid {
            keepalive 32;
            keepalive_requests 100;
            keepalive_timeout 60s;
            hostname {{ $.Values.cidHostname }} port=443;
        }

        upstream nhssearch {
            keepalive 32;
            keepalive_requests 100;
            keepalive_timeout 60s;
            hostname {{ $.Values.nhsSearchHostname }} port=443;
        }

        upstream brothermailer {
            keepalive 32;
            keepalive_requests 100;
            keepalive_timeout 60s;
            hostname {{ $.Values.brotherMailerHostname }} port=443;
        }

{{- if $.Values.econsultEnabled }}

        upstream econsult {
            keepalive 32;
            keepalive_requests 100;
            keepalive_timeout 60s;
            hostname {{ $.Values.eConsult.hostname }} port=443;
        }
{{- end }}
{{- if $.Values.iproxy.n3enabled }}

        upstream n3 {
            keepalive 32;
            keepalive_requests 100;
            keepalive_timeout 60s;
            server {{ $.Values.n3Hostname }}:443;
        }
{{- end }}

        server {
            listen {{ $.Values.iproxy.containerPort }} ssl;
            server_name iproxy-cid-{{ .Chart.AppVersion | replace "." "-" }}.{{ $.Values.global.environment }}.svc.cluster.local;
            ssl_prefer_server_ciphers on;
            ssl_protocols TLSv1.2;
            ssl_certificate     /etc/nginx/ssl/tls.crt;
            ssl_certificate_key /etc/nginx/ssl/tls.key;
            ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256;

            access_log /var/log/nginx/access.log splunk_logs;

            # General Config
            server_tokens off;

            # Proxy Config
            proxy_buffering off;
            proxy_redirect  off;
            proxy_buffer_size 1024k;
            proxy_buffers 4 2048k;
            proxy_busy_buffers_size 2048k;
            proxy_ssl_session_reuse off;
            proxy_ssl_server_name on;
            proxy_http_version 1.1;

            location / {
                set $backend_cid_upstream "{{ $.Values.cidProtocol }}://cid";
                proxy_pass $backend_cid_upstream;
                proxy_set_header Host {{ $.Values.cidHostname }};
                proxy_ssl_name {{ $.Values.cidHostname }};
                proxy_set_header Connection "";
            }
        }

        server {
            listen {{ $.Values.iproxy.containerPort }} ssl;
            server_name iproxy-nhssearch-{{ .Chart.AppVersion | replace "." "-" }}.{{ $.Values.global.environment }}.svc.cluster.local;
            ssl_prefer_server_ciphers on;
            ssl_protocols TLSv1.2;
            ssl_certificate     /etc/nginx/ssl/tls.crt;
            ssl_certificate_key /etc/nginx/ssl/tls.key;
            ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256;

            access_log /var/log/nginx/access.log splunk_logs;

            # General Config
            server_tokens off;

            # Proxy Config
            proxy_buffering off;
            proxy_redirect  off;
            proxy_buffer_size 1024k;
            proxy_buffers 4 2048k;
            proxy_busy_buffers_size 2048k;
            proxy_ssl_session_reuse off;
            proxy_ssl_server_name on;
            proxy_http_version 1.1;

            location / {
                set $backend_nhssearch_upstream "{{ $.Values.nhsSearchProtocol }}://nhssearch";
                proxy_pass $backend_nhssearch_upstream;
                proxy_set_header Host {{ $.Values.nhsSearchHostname }};
                proxy_ssl_name {{ $.Values.nhsSearchHostname }};
                proxy_set_header Connection "";
            }
        }

        server {
            listen {{ $.Values.iproxy.containerPort }} ssl;
            server_name iproxy-brothermailer-{{ .Chart.AppVersion | replace "." "-" }}.{{ $.Values.global.environment }}.svc.cluster.local;
            ssl_prefer_server_ciphers on;
            ssl_protocols TLSv1.2;
            ssl_certificate     /etc/nginx/ssl/tls.crt;
            ssl_certificate_key /etc/nginx/ssl/tls.key;
            ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256;

            access_log /var/log/nginx/access.log splunk_logs;

            # General Config
            server_tokens off;

            # Proxy Config
            proxy_buffering off;
            proxy_redirect  off;
            proxy_buffer_size 1024k;
            proxy_buffers 4 2048k;
            proxy_busy_buffers_size 2048k;
            proxy_ssl_session_reuse off;
            proxy_ssl_server_name on;
            proxy_http_version 1.1;

            location / {
                set $backend_brothermailer_upstream "{{ $.Values.brotherMailerProtocol }}://brothermailer";
                proxy_pass $backend_brothermailer_upstream;
                proxy_set_header Host {{ $.Values.brotherMailerHostname }};
                proxy_ssl_name {{ $.Values.brotherMailerHostname }};
                proxy_set_header Connection "";
            }
        }

{{- if $.Values.econsultEnabled }}

        server {
            listen {{ $.Values.iproxy.containerPort }} ssl;
            server_name iproxy-econsult-{{ .Chart.AppVersion | replace "." "-" }}.{{ $.Values.global.environment }}.svc.cluster.local;
            ssl_prefer_server_ciphers on;
            ssl_protocols TLSv1.2;
            ssl_certificate     /etc/nginx/ssl/tls.crt;
            ssl_certificate_key /etc/nginx/ssl/tls.key;
            ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256;

            access_log /var/log/nginx/access.log splunk_logs;

            # General Config
            server_tokens off;

            # Proxy Config
            proxy_buffering off;
            proxy_redirect  off;
            proxy_buffer_size 1024k;
            proxy_buffers 4 2048k;
            proxy_busy_buffers_size 2048k;
            proxy_ssl_session_reuse off;
            proxy_ssl_server_name on;
            proxy_http_version 1.1;

            location / {
                set $backend_econsult_upstream "{{ $.Values.eConsult.protocol }}://econsult";
                proxy_pass $backend_econsult_upstream;
                proxy_set_header Host {{ $.Values.eConsult.hostname }};
                proxy_ssl_name {{ $.Values.eConsult.hostname }};
                proxy_set_header Connection "";
            }
        }
{{- end }}

{{- if $.Values.iproxy.n3enabled }}

        server {
            listen {{ $.Values.iproxy.containerPort }} ssl;
            server_name iproxy-n3-{{ .Chart.AppVersion | replace "." "-" }}.{{ $.Values.global.environment }}.svc.cluster.local;
            ssl_prefer_server_ciphers on;
            ssl_protocols TLSv1.2;
            ssl_certificate /etc/nginx/ssl/tls.crt;
            ssl_certificate_key /etc/nginx/ssl/tls.key;
            ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256;

            access_log /var/log/nginx/access.log splunk_logs;

            # General Config
            server_tokens off;

            # Proxy Config
            proxy_buffering off;
            proxy_redirect off;
            proxy_buffer_size 1024k;
            proxy_buffers 4 2048k;
            proxy_ssl_session_reuse off;
            proxy_ssl_server_name on;
            proxy_http_version 1.1;

            location / {
                set $backend_n3_upstream "{{ $.Values.n3Protocol }}://n3";
                proxy_pass $backend_n3_upstream;
                proxy_set_header Connection "";
                proxy_ssl_certificate /tmp/spineCrt;
                proxy_ssl_certificate_key /tmp/spineKey;
            }
        }
{{- end }}

        server {
            listen       8080;
            server_name  localhost;
            server_tokens off;

            location = /healthz {
                return 200;
            }
        }

    }
