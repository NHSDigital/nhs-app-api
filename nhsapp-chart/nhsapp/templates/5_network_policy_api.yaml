---
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-cosmosdb-egress-from-api-{{ .Chart.AppVersion }}
  namespace: {{ $.Values.global.environment }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
spec:
  podSelector:
    matchLabels:
      role: {{ $.Values.api.role }}
      version: {{ .Chart.AppVersion | quote }}
  policyTypes:
  - Egress
  egress:
  - to:
{{- range $.Values.cosmosDBIPTrust }}
    - ipBlock:
        cidr: {{ . }}
{{- end }}
    ports:
{{- range $.Values.cosmosDBPortRange }}
      - protocol: TCP
        port: {{ . }}
{{- end }}
---
