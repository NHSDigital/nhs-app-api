---
apiVersion: v1
data:
  key: {{ .Values.cosmosdbKey }}
kind: Secret
metadata:
  name: cosmosdbkey-{{ .Chart.AppVersion }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
type: Opaque
---
apiVersion: v1
data:
  password: {{ .Values.cosmosdbMongoKey }}
kind: Secret
metadata:
  name: cosmosdb-mongo-key-{{ .Chart.AppVersion }}
  labels:
    version: {{ .Chart.AppVersion | quote }}
type: Opaque