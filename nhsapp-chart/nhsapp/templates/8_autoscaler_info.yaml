{{- if $.Values.infoEnabled }}
---
apiVersion: autoscaling/v2beta1
kind: HorizontalPodAutoscaler
metadata:
  labels:
    app: {{ template "nhsapp.name" . }}-{{ $.Values.info.role }}
    role: {{ $.Values.info.role }}
    version: {{ .Chart.AppVersion | quote }}
  name: {{ template "nhsapp.name" . }}-{{ $.Values.info.role }}-{{ .Chart.AppVersion }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1beta1
    kind: Deployment
    name: {{ template "nhsapp.name" . }}-{{ $.Values.info.role }}-{{ .Chart.AppVersion }}
  minReplicas: {{ $.Values.info.minReplicas }}
  maxReplicas: {{ $.Values.info.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        targetAverageUtilization: {{ $.Values.info.targetCPUUtilizationPercentage }}
{{- end }}