name: ${{ parameters.namespace }}-$(Build.SourceBranchName)-$(Date:yyyyMMdd)_$(Rev:r)

trigger: none

pool:
  vmImage: 'ubuntu-18.04'

parameters:
- name: namespace
  displayName: Namespace
  type: string
  default: stubbed
  values:
    - stubbed
    - stubbed2
- name: imageVersionOverride
  displayName: "Optional image version override (develop or tag)"
  type: string
  default: "None"
- name: PERF_WIREMOCK_IMAGE_TAG
  displayName: "Performance Stub (Minimock) Image"
  type: string
  default: latest

variables:
- name: environment
  value: staging
- name: DECODE_PERCENTS
  value: false
- name: helmVersion
  value: 3.2.3
- group: Ops

stages:
- stage: DeployNHSApp
  displayName: Deploy NHS App
  jobs:
  - job:
    displayName: 'Deploy NHS App to ${{ parameters.namespace }}'
    steps:
    - task: Bash@3
      displayName: Set version
      inputs:
        targetType: 'inline'
        script: |
          if [[ "${{ parameters.imageVersionOverride }}" != "None" ]]; then
            echo "Using version override ${{ parameters.imageVersionOverride }}"
            version=${{ parameters.imageVersionOverride }}
            echo "##vso[task.setvariable variable=version]${{ parameters.imageVersionOverride }}"
            echo "$version"
          elif [ "$(Build.SourceBranchName)" == "develop" ]; then
            echo "Versioning for develop"
            version=$(echo "develop")
            echo "##vso[task.setvariable variable=version]$version"
            echo "$version"
          elif [[ "$(Build.SourceBranchName)" =~ ^v[0-9]+\.[0-9]+ ]]; then
            echo "Versioning for tag $(Build.SourceBranchName)"
            version=$(Build.SourceBranchName)
            echo "##vso[task.setvariable variable=version]$version"
          else
            echo "Versioning for pull request (latest git hash) $(Build.SourceBranch)"
            version=$(az repos pr list --source-branch $(Build.SourceBranch) | jq -r '.[].lastMergeCommit.commitId')
            echo "##vso[task.setvariable variable=version]$version"
            echo "$version"
            echo "##vso[task.logissue type=warning]If you have recently pushed a new change to your pull request branch, your pods may be in a failed state while the NHS App CI pipeline builds the images."
          fi
      env:
        AZURE_DEVOPS_EXT_PAT: $(AZURE_DEVOPS_EXT_PAT)
    - task: Bash@3
      displayName: 'Update chart version'
      inputs:
        workingDirectory: $(System.DefaultWorkingDirectory)/nhsapp-chart/nhsapp/
        targetType: 'inline'
        script: sed -i -e "s|APPVERSION|$appImageTag|g" Chart.yaml
      env:
        chartVersion: $(Build.SourceBranchName)
        appImageTag: $(version)
    - task: Bash@3
      displayName: 'Set release name'
      inputs:
        targetType: 'inline'
        script: |
          releaseName=${{ parameters.namespace }}-$(Build.SourceBranchName)

          if [ ${#releaseName} -gt 50 ]; then
            truncatedReleaseName="${releaseName:0:50}-t"
            lowercaseReleaseName=$(echo "$truncatedReleaseName" | tr '[:upper:]' '[:lower:]')
          else
            lowercaseReleaseName=$(echo "$releaseName" | tr '[:upper:]' '[:lower:]')
          fi
          echo $lowercaseReleaseName
          echo "##vso[task.setvariable variable=lowercaseReleaseName]$lowercaseReleaseName"
    - task: HelmInstaller@1
      displayName: 'Install Helm'
      inputs:
        helmVersionToInstall: $(helmVersion)

    - task: HelmDeploy@0
      displayName: Helm Upgrade UKS
      inputs:
        connectionType: Kubernetes Service Connection
        kubernetesServiceEndpoint: nhsapp-staginguks1-${{ parameters.namespace }}
        namespace: ${{ parameters.namespace }}
        command: upgrade
        chartType: filepath
        chartPath: $(System.DefaultWorkingDirectory)/nhsapp-chart/nhsapp/
        releaseName: $(lowercaseReleaseName)
        valueFile: $(System.DefaultWorkingDirectory)/nhsapp-chart/vars/cluster/vars-staginguks1.yaml
        arguments: --set global.environment="${{ parameters.namespace }}"
                   -f $(System.DefaultWorkingDirectory)/nhsapp-chart/vars/zone/$(environment)/vars-$(environment).yaml
                   -f $(System.DefaultWorkingDirectory)/nhsapp-chart/vars/zone/$(environment)/namespace/vars-$(environment)-${{ parameters.namespace }}.yaml
                   --set appImageTag=$(version)
                   --set cid.image_tag=$(version)
                   --set api.image_tag=$(version)
                   --set web.image_tag=$(version)
                   --set cdsswiremock.image_tag=$(version)
                   --set logger.image_tag=$(version)
                   --set sjr.image_tag=$(version)
                   --set sjrconfig.image_tag=$(version)
                   --set stub_loader.image_tag=$(version)
                   --set wiremock.image_tag=$(version)
                   --set users.image_tag=$(version)
                   --set messages.image_tag=$(version)
                   --set info.image_tag=$(version)
                   --set wiremock.image_tag=${{ parameters.PERF_WIREMOCK_IMAGE_TAG }}
                   --reset-values
                   --install
                   --set cosmosDBName=${{ parameters.namespace }}
                   --set region=uksouth
                   --set zone=$(environment)
                   --set clusterIP=51.132.238.224/32
        install: true
        waitForExecution: false

    - task: HelmDeploy@0
      displayName: Helm Upgrade UKW
      inputs:
        connectionType: Kubernetes Service Connection
        kubernetesServiceEndpoint: nhsapp-stagingukw1-${{ parameters.namespace }}
        namespace: ${{ parameters.namespace }}
        command: upgrade
        chartType: filepath
        chartPath: $(System.DefaultWorkingDirectory)/nhsapp-chart/nhsapp/
        releaseName: $(lowercaseReleaseName)
        valueFile: $(System.DefaultWorkingDirectory)/nhsapp-chart/vars/cluster/vars-stagingukw1.yaml
        arguments: --set global.environment="${{ parameters.namespace }}"
                   -f $(System.DefaultWorkingDirectory)/nhsapp-chart/vars/zone/$(environment)/vars-$(environment).yaml
                   -f $(System.DefaultWorkingDirectory)/nhsapp-chart/vars/zone/$(environment)/namespace/vars-$(environment)-${{ parameters.namespace }}.yaml
                   --set appImageTag=$(version)
                   --set cid.image_tag=$(version)
                   --set api.image_tag=$(version)
                   --set web.image_tag=$(version)
                   --set cdsswiremock.image_tag=$(version)
                   --set logger.image_tag=$(version)
                   --set sjr.image_tag=$(version)
                   --set sjrconfig.image_tag=$(version)
                   --set stub_loader.image_tag=$(version)
                   --set wiremock.image_tag=$(version)
                   --set users.image_tag=$(version)
                   --set messages.image_tag=$(version)
                   --set info.image_tag=$(version)
                   --set wiremock.image_tag=${{ parameters.PERF_WIREMOCK_IMAGE_TAG }}
                   --reset-values
                   --install
                   --set cosmosDBName=${{ parameters.namespace }}
                   --set region=ukwest
                   --set zone=$(environment)
                   --set clusterIP=51.141.100.180/32
        install: true
        waitForExecution: false

- stage: runRedirector
  displayName: Run Redirector
  jobs:
  - job:
    displayName: 'Deploy Redirector to ${{ parameters.namespace }}'
    steps:
    - task: Bash@3
      displayName: Set version
      inputs:
        targetType: 'inline'
        script: |
          if [[ "${{ parameters.imageVersionOverride }}" != "None" ]]; then
            echo "Using version override ${{ parameters.imageVersionOverride }}"
            version=${{ parameters.imageVersionOverride }}
            echo "##vso[task.setvariable variable=version]${{ parameters.imageVersionOverride }}"
            echo "$version"
          elif [ "$(Build.SourceBranchName)" == "develop" ]; then
            echo "Versioning for develop"
            version=$(echo "develop")
            echo "##vso[task.setvariable variable=version]$version"
            echo "$version"
          elif [[ "$(Build.SourceBranchName)" =~ ^v[0-9]+\.[0-9]+ ]]; then
            echo "Versioning for tag $(Build.SourceBranchName)"
            version=$(Build.SourceBranchName)
            echo "##vso[task.setvariable variable=version]$version"
          else
            echo "Versioning for pull request (latest git hash) $(Build.SourceBranch)"
            version=$(az repos pr list --source-branch $(Build.SourceBranch) | jq -r '.[].lastMergeCommit.commitId')
            echo "##vso[task.setvariable variable=version]$version"
            echo "$version"
            echo "##vso[task.logissue type=warning]If you have recently pushed a new change to your pull request branch, your pods may be in a failed state while the NHS App CI pipeline builds the images."
          fi
      env:
        AZURE_DEVOPS_EXT_PAT: $(AZURE_DEVOPS_EXT_PAT)

    - task: HelmDeploy@0
      displayName: Helm Deploy Redirector UKS
      inputs:
        connectionType: Kubernetes Service Connection
        kubernetesServiceEndpoint: nhsapp-staginguks1-${{ parameters.namespace }}-redirector
        namespace: ${{ parameters.namespace }}
        command: upgrade
        chartType: filepath
        chartPath: $(System.DefaultWorkingDirectory)/nhsapp-chart/redirector/
        releaseName: defaultingress
        valueFile: $(System.DefaultWorkingDirectory)/nhsapp-chart/vars/zone/$(environment)/namespace/vars-$(environment)-${{ parameters.namespace }}.yaml
        arguments: --set global.environment="${{ parameters.namespace }}"
                   --set appImageTag=$(version)
                   --set cid.version=$(version)
                   --set api.version=$(version)
                   --set web.version=$(version)
                   --set cdsswiremock.version=$(version)
                   --set logger.version=$(version)
                   --set sjr.version=$(version)
                   --set sjrconfig.version=$(version)
                   --set stub_loader.version=$(version)
                   --set wiremock.version=$(version)
                   --set users.version=$(version)
                   --set messages.version=$(version)
                   --set info.version=$(version)
                   --reset-values
                   --install
                   --set region=uksouth
                   --set zone=$(environment)
        install: true
        waitForExecution: false

    - task: HelmDeploy@0
      displayName: Helm Deploy Redirector UKW
      inputs:
        connectionType: Kubernetes Service Connection
        kubernetesServiceEndpoint: nhsapp-stagingukw1-${{ parameters.namespace }}-redirector
        namespace: ${{ parameters.namespace }}
        command: upgrade
        chartType: filepath
        chartPath: $(System.DefaultWorkingDirectory)/nhsapp-chart/redirector/
        releaseName: defaultingress
        valueFile: $(System.DefaultWorkingDirectory)/nhsapp-chart/vars/zone/$(environment)/namespace/vars-$(environment)-${{ parameters.namespace }}.yaml
        arguments: --set global.environment="${{ parameters.namespace }}"
                   --set appImageTag=$(version)
                   --set cid.version=$(version)
                   --set api.version=$(version)
                   --set web.version=$(version)
                   --set cdsswiremock.version=$(version)
                   --set logger.version=$(version)
                   --set sjr.version=$(version)
                   --set sjrconfig.version=$(version)
                   --set stub_loader.version=$(version)
                   --set wiremock.version=$(version)
                   --set users.version=$(version)
                   --set messages.version=$(version)
                   --set info.version=$(version)
                   --reset-values
                   --install
                   --set region=uksouth
                   --set zone=$(environment)
        install: true
        waitForExecution: false