apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: 'true'
  name: nhsonline-backendworker
spec:
  rules:
    - host: api.develop.bitraft.io
      http:
        paths:
          - backend:
              serviceName: nhsonline-backendworker
              servicePort: 80
            path: /
  tls:
    - hosts:
      - "api.develop.bitraft.io"
      secretName: api-develop-bitraft-io
