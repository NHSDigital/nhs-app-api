apiVersion: apps/v1beta1
kind: Deployment
metadata:
  name: nhsonline-backendworker
spec:
  replicas: 1
  template:
    metadata:
      labels:
        app: nhsonline-backendworker
    spec:
      containers:
      - name: nhsonline-backendworker
        image: nhsonline.azurecr.io/nhsonline-backendworker:latest
        ports:
        - containerPort: 5123
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: REDIS_ODSLOOKUP_CONFIG
          value: "redis:6379"
        - name: REDIS_SESSION_CONFIG
          value: "redis2:6379"
        - name: EMIS_BASE_URL
          value: "http://nhsonline-stubs:5123/emis/"
        - name: EMIS_APPLICATION_ID
          value: "D66BA979-60D2-49AA-BE82-AEC06356E41F"
        - name: EMIS_VERSION
          value: "2.1.0.0"
      imagePullSecrets:
       - name: azure-registry
---
apiVersion: apps/v1beta1
kind: Deployment
metadata:
  name: nhsonline-stubs
spec:
  replicas: 1
  template:
    metadata:
      labels:
        app: nhsonline-stubs
    spec:
      containers:
      - name: nhsonline-stubs
        image: nhsonline.azurecr.io/nhsonline-stubs:latest
        ports:
        - containerPort: 5123
        env:
        - name: WIREMOCK_AUTHORITY
          value: "nhsonline-wiremock:8080"
        - name: WAIT_FOR_TIMEOUT
          value: "60"
      imagePullSecrets:
       - name: azure-registry
---
apiVersion: apps/v1beta1
kind: Deployment
metadata:
  name: nhsonline-wiremock
spec:
  replicas: 1
  template:
    metadata:
      labels:
        app: nhsonline-wiremock
    spec:
      containers:
      - name: nhsonline-wiremock
        image: rodolpheche/wiremock
        ports:
        - containerPort: 8080
