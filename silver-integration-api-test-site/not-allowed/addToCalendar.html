<!DOCTYPE html>
<html>
  <head>
    <title>NHS App - Silver Integration JS API test site</title>
    <meta charset="utf-8">

    <link rel="stylesheet" href="https://service-manual.nhs.uk/css/main.css">
    <link rel="stylesheet" href="https://service-manual.nhs.uk/css/design-example-overrides.css">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, minimum-scale=1.0, user-scalable=0">
  </head>
  <body>
    <h1>Add to calendar</h1>

    <div class="nhsuk-back-link">
      <a class="nhsuk-back-link__link" href="../index.html">
        <svg class="nhsuk-icon nhsuk-icon__chevron-left" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8.5 12c0-.3.1-.5.3-.7l5-5c.4-.4 1-.4 1.4 0s.4 1 0 1.4L10.9 12l4.3 4.3c.4.4.4 1 0 1.4s-1 .4-1.4 0l-5-5c-.2-.2-.3-.4-.3-.7z"></path>
        </svg>
        Back</a>
    </div>

    <fieldset>
        <legend>Add appointment details:</legend>
        <label for="subject">Title</label><br>
        <input type="text" id="subject" name="subject"><br>
    
        <label for="body">Notes</label><br>
        <textarea type="text" id="body" name="body" rows="4" cols="50"></textarea><br>
    
        <label for="location">Location</label><br>
        <input type="text" id="location" name="location"><br>
    
        <label for="startDate">Start Date and Time</label><br>
        <small>If no datepicker enter in format YYYY-MM-DD[T]hh:mm</small><br><small>eg 2020-01-31T12:00</small><br>
        <input type="datetime-local" id="startdate" name="startdate"><br>
    
        <label for="endDate">End Date and Time</label><br>
        <small>If no datepicker enter in format YYYY-MM-DD<b>[T]</b>hh:mm</small><br><small>eg 2020-01-31T12:00</small><br>
        <input type="datetime-local" id="enddate" name="enddate"><br><br>
    
        <input class="nhsuk-button" id="testCal" type="button" value="Add To Calendar" onclick="getAppointmentDetails()"/>
    </fieldset>

    <script>
      var script = document.createElement("script");

      var urlParams = new URLSearchParams(window.location.search);
      var env = urlParams.get('env');

      script.src = env + "/js/v1/nhsapp.js";
      document.head.appendChild(script);
      
      function getAppointmentDetails() {
        const subject = document.getElementById("subject").value;
        const body = document.getElementById("body").value;
        const location = document.getElementById("location").value;
        const startDate = document.getElementById("startdate").value.trim();
        const endDate = document.getElementById("enddate").value.trim();
        const startDateTimeEpoch = new Date(startDate).getTime();
        const endDateTimeEpoch = new Date(endDate).getTime();

        nhsapp.storage.addEventToCalendar(subject, body, location, startDateTimeEpoch/1000, endDateTimeEpoch/1000);
      }

    </script>
  </body>
</html>
