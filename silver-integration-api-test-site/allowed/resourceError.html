<!DOCTYPE html>
<html>
  <head>
    <title>NHS App - Silver Integration JS API test site</title>
    <meta charset="utf-8">

    <link rel="stylesheet" href="https://service-manual.nhs.uk/css/main.css">
    <link rel="stylesheet" href="https://service-manual.nhs.uk/css/design-example-overrides.css">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, minimum-scale=1.0, user-scalable=0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
  </head>
  <body>
    <h1>Resource error</h1>

    <div class="nhsuk-back-link">
      <a class="nhsuk-back-link__link" href="../index.html">
        <svg class="nhsuk-icon nhsuk-icon__chevron-left" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8.5 12c0-.3.1-.5.3-.7l5-5c.4-.4 1-.4 1.4 0s.4 1 0 1.4L10.9 12l4.3 4.3c.4.4.4 1 0 1.4s-1 .4-1.4 0l-5-5c-.2-.2-.3-.4-.3-.7z"></path>
        </svg>
        Back</a>
    </div>

    <p id="inNhsApp"></p>
    <p id="NhsAppDeviceType"></p>

    <script>
      var script = document.createElement("script");

      var urlParams = new URLSearchParams(window.location.search);
      var env = urlParams.get('env');

      script.src = env + "/js/xxxxx/nhsapp.js";

      script.onload = function() {
        document.getElementById("inNhsApp").innerHTML = nhsapp.tools.isOpenInNHSApp() ? "Showing in NHS" : "Not showing in NHS";
        document.getElementById("NhsAppDeviceType").innerHTML = "Device Type: " + nhsapp.tools.getAppPlatform();
      };
      document.head.appendChild(script);
    </script>
  </body>
</html>
