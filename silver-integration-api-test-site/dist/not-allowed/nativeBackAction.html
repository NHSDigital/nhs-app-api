<!DOCTYPE html>
<html>
  <head>
    <title>NHS App - Silver Integration JS API test site</title>
    <meta charset="utf-8">

    <link rel="stylesheet" href="https://service-manual.nhs.uk/css/main.css">
    <link rel="stylesheet" href="https://service-manual.nhs.uk/css/design-example-overrides.css">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, minimum-scale=1.0, user-scalable=0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
  </head>
  <body>
    <h1>Native Back Action</h1>

    <div class="nhsuk-back-link">
      <a class="nhsuk-back-link__link" href="../index.html">
        <svg class="nhsuk-icon nhsuk-icon__chevron-left" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8.5 12c0-.3.1-.5.3-.7l5-5c.4-.4 1-.4 1.4 0s.4 1 0 1.4L10.9 12l4.3 4.3c.4.4.4 1 0 1.4s-1 .4-1.4 0l-5-5c-.2-.2-.3-.4-.3-.7z"></path>
        </svg>
        Back</a>
    </div>

    <div>
			<p>Note:
      <br>
      Once set, to trigger your action, either:
      <ul>
        <li>Press the back button on your device</li>
        <li>Press "Simulate back"</li>
      </ul>
      </p>
      <label for="backActionFunctionTextarea">Enter function:</label>
      <br>
      <textarea class="nhsuk-textarea nhsuk-input--width-30" id="backActionFunctionTextarea"></textarea>
      <br />
      <br />
      <input class="nhsuk-button" id="callSetBackAction" type="button" value="Set Back Action" onclick="setBackActionCall()" />
      <br>
      <p>Back Action:</p>
      <code id="backActionFunctionCode">Not Set</code>
      <br>
      <br>
      <input class="nhsuk-button" id="clearSetBackAction" type="button" value="Clear Back Action" onclick="clearBackActionCall()" />
      <br>
      <input class="nhsuk-button" id="callBackAction" type="button" value="Simulate back" onclick="callBackAction()" />
      <br>
    </div>
    <script>
      var script = document.createElement("script");

      var urlParams = new URLSearchParams(window.location.search);
      var env = urlParams.get('env');

      script.src = env + "/js/v1/nhsapp.js";

      this.setBackActionCall = function() {
        var action = document.getElementById("backActionFunctionTextarea");
        if (action.value !== '') {
          var actionFunction = Function(action.value);
          document.getElementById("backActionFunctionCode").innerHTML = actionFunction;
          nhsapp.navigation.setBackAction(actionFunction);
        } else {
          let backActionDefault = () => alert('Default back action');
          nhsapp.navigation.setBackAction(backActionDefault);
        }
      }

      this.clearBackActionCall = function() {
        document.getElementById("backActionFunctionCode").innerHTML = "Not Set";
        document.getElementById("backActionFunctionTextarea").value = "";
        nhsapp.navigation.clearBackAction();
      }

      this.callBackAction = function() {
        nhsapp.callbacks.back();
      }
      

      document.head.appendChild(script);
    </script>
  </body>
</html>
