version: '3'

volumes:
  node_modules:
services:
  nhsonline.web:
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

# Note that the node_modules volume is mapped as above in order to prevent the hosts node_modules being used in the container.
# # See https://stackoverflow.com/a/38601156 for more information
