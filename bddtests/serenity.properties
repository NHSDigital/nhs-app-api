webdriver.provided.browserstack_safari = webdrivers.BrowserstackSafariDriver
webdriver.provided.browserstack_android = webdrivers.BrowserstackAndroidDriver
webdriver.provided.browserstack_ios = webdrivers.BrowserstackIOSDriver
webdriver.provided.appium_ios = webdrivers.AppiumIOSDriver
