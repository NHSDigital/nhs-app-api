version: "3.4"

secrets:
  tpp_cert:
    file: "./bddtests/dummysecrets/tpp_client_cert.pfx"
  tpp_cert_password:
    file: "./bddtests/dummysecrets/tpp_client_cert.password"
  session_encryption_key:
    file: "./bddtests/dummysecrets/session_encryption_key"
  microtest_cert:
    file: "./bddtests/dummysecrets/microtest_client_cert.pfx"
  microtest_cert_password:
    file: "./bddtests/dummysecrets/microtest_client_cert.password"
  spine_cert:
    file: "./bddtests/dummysecrets/spine_client_cert.pfx"
  spine_cert_password:
    file: "./bddtests/dummysecrets/spine_client_cert.password"
  azure_notification_hub_key:
    file: "~/.nhsonline/secrets/azure_notification_hub_key_bdd"

services:

  web.local.bitraft.io:
    env_file:
     - ./bddtests/docker/web.env

  pfs.local.bitraft.io:
    env_file:
      - ./bddtests/docker/brothermailer_connectivity.env
      - ./bddtests/docker/emis_connectivity.env
      - ./bddtests/docker/gplookup_connectivity.env
      - ./bddtests/docker/microtest_connectivity.env
      - ./bddtests/docker/nhslogin_connectivity.env
      - ./bddtests/docker/onlineconsultationsproviders_connectivity.env
      - ./bddtests/docker/organdonation_connectivity.env
      - ./bddtests/docker/session_database.env
      - ./bddtests/docker/spine_connectivity.env
      - ./bddtests/docker/tpp_connectivity.env
      - ./bddtests/docker/vision_connectivity.env
      - ./bddtests/docker/pfs.env
    volumes:
      - ./bddtests/src/main/kotlin/mocking/dummycerts:/app/bddcerts

  cid.local.bitraft.io:
    env_file:
      - ./bddtests/docker/emis_connectivity.env
      - ./bddtests/docker/microtest_connectivity.env
      - ./bddtests/docker/nhslogin_connectivity.env
      - ./bddtests/docker/session_database.env
      - ./bddtests/docker/tpp_connectivity.env
      - ./bddtests/docker/vision_connectivity.env
    volumes:
      - ./bddtests/src/main/kotlin/mocking/dummycerts:/app/bddcerts

  users.local.bitraft.io:
    env_file:
      - ./bddtests/docker/nhslogin_connectivity.env
      - ./bddtests/docker/notificationhub_connectivity.env

  userinfo.local.bitraft.io:
    env_file:
      - ./bddtests/docker/nhslogin_connectivity.env
    volumes:
      - ./bddtests/src/main/kotlin/mocking/dummycerts:/app/bddcerts

  messages.local.bitraft.io:
    env_file:
      - ./bddtests/docker/nhslogin_connectivity.env

  stubs.local.bitraft.io:
    image: ${WIREMOCK_DOCKER_REGISTRY:-nhsapp.azurecr.io}/wiremock:${WIREMOCK_DOCKER_TAG:-2.22.0-alpine}
    command: --local-response-templating
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    tty: true

volumes:
  servicejourneyrules_data:
    driver: local
