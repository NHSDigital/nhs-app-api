buildscript {
    ext.kotlin_version = '1.2.51'
    ext.serenity_version = '1.9.12'

    repositories {
        maven {
            url "https://www-nexus.devuks1.bitraft.io/repository/maven-public/"
            credentials {
                username "developer"
                password '?H96nNh^DRS76bpRbWM6bg2FGct$CMXW'
