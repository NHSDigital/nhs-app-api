version: "3.2"
services:
  nhsonline.mongodb.session:
    image: mongo:latest
  web.local.bitraft.io:
    image: nhsapp.azurecr.io/nhsonline-web:${WEB_TAG}
    env_file:
      - vars_ci.env
    environment:
      - BIOMETRICS_ENABLED=true
  api.local.bitraft.io:
    image: nhsapp.azurecr.io/nhsonline-backendpfsapi:${BACKEND_TAG}
    depends_on:
      - nhsonline.redis.sds
      - nhsonline.redis.session
      - nhsonline.mongodb.session
    env_file:
      - vars_ci.env
    environment:
      - BACKENDWORKER_RUNMODE=pfs
      - ASPNETCORE_URLS=http://*:8082
      - PORT=8082
      - NDOP_CERTIFICATE_PASSWORD=GnewUt4z3y
      - NDOP_CERTIFICATE_PATH=/app/bddcerts/TestCert.pfx
      - VISION_CERT_PATH=/app/bddcerts/TestCert.pfx
      - VISION_CERT_PASSPHRASE=GnewUt4z3y
      - MICROTEST_CERT_PATH=/app/bddcerts/TestCert.pfx
      - MICROTEST_CERT_PASSPHRASE=GnewUt4z3y
      - ConfigurationSettings__CookieDomain=.bitraft.io
      - SESSION_MONGO_DATABASE_HOST=nhsonline.mongodb.session
      - ConfigurationSettings__EmisExtendedHttpTimeoutSeconds=10
      - SESSION_MONGO_DATABASE_PORT=27017
      - SESSION_MONGO_DATABASE_USERNAME=
      - SESSION_MONGO_DATABASE_PASSWORD=
      - ConfigurationSettings__CurrentTermsConditionsEffectiveDate=2018-12-12T00:00:00+00:00
    volumes:
      - ../src/main/kotlin/mocking/dummycerts:/app/bddcerts
  cid.local.bitraft.io:
    image: nhsapp.azurecr.io/nhsonline-backendcidapi:${BACKEND_TAG}
    depends_on:
      - nhsonline.redis.sds
      - nhsonline.redis.session
      - nhsonline.mongodb.session
    env_file:
      - vars_ci.env
    environment:
      - BACKENDWORKER_RUNMODE=cid
      - ASPNETCORE_URLS=http://*:8084
      - PORT=8084
      - NDOP_CERTIFICATE_PASSWORD=GnewUt4z3y
      - NDOP_CERTIFICATE_PATH=/app/bddcerts/TestCert.pfx
      - VISION_CERT_PATH=/app/bddcerts/TestCert.pfx
      - VISION_CERT_PASSPHRASE=GnewUt4z3y
      - MICROTEST_CERT_PATH=/app/bddcerts/TestCert.pfx
      - MICROTEST_CERT_PASSPHRASE=GnewUt4z3y
      - SESSION_MONGO_DATABASE_HOST=nhsonline.mongodb.session
      - SESSION_MONGO_DATABASE_PORT=27017
      - ConfigurationSettings__EmisExtendedHttpTimeoutSeconds=15
      - SESSION_MONGO_DATABASE_USERNAME=
      - SESSION_MONGO_DATABASE_PASSWORD=
    volumes:
      - ../src/main/kotlin/mocking/dummycerts:/app/bddcerts
  stubs.local.bitraft.io:
    image: nhsapp.azurecr.io/wiremock:${WIREMOCK_TAG}
    command: --local-response-templating
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    tty: true
  nhsonline.redis-data.sds:
    image: nhsapp.azurecr.io/nhsonline-redis-data:${REDIS_DATA_TAG}
    environment:
      - MODE=development
      - REDIS_HOST=nhsonline.redis.sds
    depends_on:
      - nhsonline.redis.sds
  nhsonline.redis.sds:
    image: nhsapp.azurecr.io/redis:${REDIS_TAG}
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    volumes:
      - 'redis_data:/bitnami/redis'
  nhsonline.redis.session:
    image: nhsapp.azurecr.io/redis:${REDIS_TAG}
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
  mongo_seed3:
    image: mongo:latest
    links:
      - nhsonline.mongodb.session
    command: /bin/bash -c "sleep 10; mongo --host nhsonline.mongodb.session --eval 'db.session.createIndex({_ts:1},{expireAfterSeconds:60})' development"
    depends_on:
      - nhsonline.mongodb.session
volumes:
  redis_data:
    driver: local
