version: "3.2"
services:
  nhsonline.web:
    image: nhsapp.azurecr.io/nhsonline-web:${WEB_TAG}
    ports:
      - "3000:3000"
    environment:
      - API_HOST=http://localhost:8082
      - CID_REDIRECT_URI=http://localhost:3000/auth-return
      - CID_AUTH_ENDPOINT=http://localhost:8080/citizenid/cicauth/realms/NHS/protocol/openid-connect/auth
      - CID_REGISTER_ENDPOINT=http://localhost:8080/citizenid/cicauth/realms/NHS/protocol/openid-connect/registrations
  nhsonline.backend.worker:
    image: nhsapp.azurecr.io/nhsonline-backendworker:${BACKEND_TAG}
    environment:
      - NHS_WEB_APP_BASE_URL=http://localhost:3000/
      - CORS_AUTHORITY=*
      - CITIZEN_ID_BASE_URL=http://nhsonline.stubs:8080/citizenid/cicauth/realms/NHS/protocol/openid-connect/
      - EMIS_BASE_URL=http://nhsonline.stubs:8080/emis/
      - TPP_BASE_URL=http://nhsonline.stubs:8080/tpp/
      - ASPNETCORE_ENVIRONMENT=Development
      - GP_PROVIDER_ENABLED_EMIS=true
      - GP_PROVIDER_ENABLED_TPP=true
      - GP_PROVIDER_ENABLED_VISION=true
      - GP_PROVIDER_ENABLED_MICROTEST=true
    depends_on:
      - nhsonline.redis.sds
    ports:
      - "8082:8082"
  nhsonline.stubs:
    image: nhsapp.azurecr.io/wiremock:${WIREMOCK_TAG}
    command: --local-response-templating
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8080:8080"
    tty: true
  nhsonline.redis-data.sds:
    image: nhsapp.azurecr.io/nhsonline-redis-data:${REDIS_DATA_TAG}
    environment:
      - REDIS_HOST=nhsonline.redis.sds
    depends_on:
      - nhsonline.redis.sds
  nhsonline.redis.sds:
    image: nhsapp.azurecr.io/redis:${REDIS_TAG}
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    ports:
      - "6379:6379"
    volumes:
      - 'redis_data:/bitnami/redis'
  nhsonline.redis.session:
    image: nhsapp.azurecr.io/redis:${REDIS_TAG}
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    ports:
      - "6380:6379"
volumes:
  redis_data:
    driver: local
