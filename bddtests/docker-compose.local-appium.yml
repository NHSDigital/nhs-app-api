version: "3.2"
services:
  web.local.bitraft.io:
    image: nhsonline.web
    environment:
      - API_PORT=8082
      - API_PORT_SERVER=8082
      - CID_AUTH_ENDPOINT=http://10.0.2.2:8080/citizenid/cicauth/realms/NHS/protocol/openid-connect/auth
      - CID_REGISTER_ENDPOINT=http://10.0.2.2:8080/citizenid/cicauth/realms/NHS/protocol/openid-connect/registrations
  api.local.bitraft.io:
    image: nhsonline.backend.worker
    environment:
      - NHS_WEB_APP_BASE_URL=http://10.0.2.2:3000
      - STUB_TERMS_AND_CONDITIONS=true
