---
registry: nhsapp.azurecr.io
networkPolicyEnabled: true

appImageTag: v1.0.0

clusterIP: ""
global:
  environment: default
dockerRegistrySecret: placeholder


sjr:
  createService: true
  containerPort: 8080
  publicURL: null
  role: sjr
  image: nhsonline-backendservicejourneyrulesapi
  image_tag: latest
  imagePullPolicy: Always
  minAvailable: 0
  minReplicas: 1
  maxReplicas: 1
  memoryRequest: "256Mi"
  memoryLimit: "512Mi"
  cpuRequest: "125m"
  cpuLimit: "250m"
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
  inputPath: /configurations  # From mounted image
  environmentVariables:
  - name: ASPNETCORE_ENVIRONMENT
    value: "Production"

sjrconfig:
  loadFiles: true
  imagePullPolicy: Always
  image: nhsonline-service-journey-dev-config
  image_tag: latest
  mountPath: /configurations
  minAvailable: 0
  minReplicas: 1
  maxReplicas: 1
  memoryRequest: "256Mi"
  memoryLimit: "512Mi"
  cpuRequest: "125m"
  cpuLimit: "250m"
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

sidecar_proxy:
  containerPort: 8443
  memoryRequest: "128Mi"
  memoryLimit: "256Mi"
  cpuRequest: "125m"
  cpuLimit: "250m"
  image: nhsonline-nginx
  image_tag: "v1.16.1"
  imagePullPolicy: IfNotPresent
